  {q: "Nel contesto World ID, 'Face Auth' è:", opts: ["Un meccanismo per verificare che il dispositivo sia ancora in possesso del legittimo proprietario del World ID, senza l'Orb", "Il protocollo di enrollment iniziale che registra il volto dell'utente nell'Orb e genera la prova crittografica", "Il sistema di recupero dell'account World ID che confronta un selfie con l'IrisCode memorizzato sulla blockchain", "Il modulo anti-spoofing integrato nell'Orb che analizza la texture facciale con sensori NIR e di profondità"], ans: 0, expl: "Face Auth verifica il possesso del World ID tramite il volto, senza necessità di tornare all'Orb.", cat: "ITT"},
  {q: "Nella firma dinamica (online), il Dynamic Time Warping (DTW) è necessario perché:", opts: ["Due firme della stessa persona possono avere velocità e ritmi locali diversi pur essendo autentiche", "Le firme tendono a dilatarsi o restringersi globalmente a seconda dello spazio disponibile sulla tavoletta", "La firma è un tratto fisiologico invariante e il DTW compensa solo le differenze di risoluzione del sensore", "Il DTW elimina il rumore ad alta frequenza introdotto dal digitalizzatore hardware durante l'acquisizione"], ans: 0, expl: "La firma varia in velocità e ritmo locale ad ogni esecuzione. Il DTW allinea temporalmente due sequenze con velocità diverse.", cat: "VOCE"},
  {q: "Una firma dinamica acquisisce, oltre alla forma grafica:", opts: ["La postura complessiva della mano e del polso rispetto al piano della tavoletta grafica", "Esclusivamente la traiettoria spaziale 2D e la sequenza dei tratti nell'ordine di esecuzione", "Parametri temporali come velocità, accelerazione, inclinazione e pressione della penna nel tempo", "Le coordinate 3D della punta della penna ricostruite tramite sensori inerziali integrati nello stilo"], ans: 2, expl: "La firma online cattura velocità, accelerazione, inclinazione, pressione, tempo — tutti nel dominio temporale. Molto più ricca della offline.", cat: "VOCE"},
  {q: "Nella firma offline, tecniche come Extended Shadow Code e Adaptive SIFT-SURF servono per:", opts: ["Acquisire la firma in tempo reale dalla tavoletta grafica durante la sessione", "Cifrare il template della firma per garantire la protezione della privacy", "Estrarre feature discriminanti dall'immagine statica della firma", "Convertire la firma offline in una sequenza temporale equivalente alla firma online"], ans: 2, expl: "La firma offline ha solo l'immagine statica: servono tecniche di estrazione feature visive per il matching.", cat: "VOCE"},
  {q: "Voce, mano e firma come tratti biometrici condividono:", opts: ["Alta resistenza allo spoofing grazie alla componente comportamentale difficile da replicare", "Elevata permanenza nel tempo, comparabile a quella dell'iride e delle impronte digitali", "Alta unicità inter-individuale, sufficiente per l'identificazione 1:N anche su database nazionali", "Bassa unicità e permanenza relativa, adatti principalmente ad autenticazione 1:1 o 1:N con N piccolo"], ans: 3, expl: "Sono tratti con discriminatività inferiore a iride/impronta. Adatti a verifica o identificazione su piccola scala, non 1:N con milioni.", cat: "ATK"},
  {q: "La differenza tra identity claim esplicita e implicita è:", opts: ["Non esiste alcuna differenza nel framework biometrico", "L'implicita richiede sempre un documento d'identità", "L'esplicita usa la biometria, l'implicita usa le password", "Nell'esplicita l'utente dichiara la propria identità"], ans: 3, expl: "Esplicita: l'utente fornisce attivamente un identificatore. Implicita: il sistema deduce l'identità senza dichiarazione (es. riconoscimento facciale passivo).", cat: "VOLTO"},
  {q: "Un 'zero-effort impostor attempt' è:", opts: ["Un tentativo in cui un impostore casuale presenta il proprio tratto genuino senza tentare di imitare la vittima", "Un tentativo in cui l'impostore presenta un artefatto biometrico generico non personalizzato sulla vittima", "Un tentativo in cui l'impostore sfrutta una vulnerabilità nota del matcher senza presentare alcun tratto", "Un tentativo in cui l'impostore replica il tratto della vittima usando una tecnica di spoofing a basso costo"], ans: 0, expl: "Zero-effort: l'impostore non fa nulla di speciale, presenta semplicemente il proprio tratto. Active impostor: tenta attivamente di imitare/frodare.", cat: "ITT"},
  {q: "In un sistema biometrico distribuito, il modulo tipicamente remoto è:", opts: ["Il modulo di decisione", "Il display per l'utente", "Il database dei template e/o il modulo di matching", "Il modulo di Feature Extraction, per scaricare il carico computazionale dai client leggeri"], ans: 2, expl: "In sistemi distribuiti, il matching e il DB sono spesso remoti (server). Il sensore è locale dove si trova l'utente.", cat: "SENS"},
  {q: "In un sistema on-card, sulla smart card risiedono:", opts: ["Solo il template, senza capacità di matching", "Template e software di matching solo nel caso specifico Match-on-Card", "Solo il software di matching senza dati biometrici", "Nessun dato biometrico: tutto è nel server centrale"], ans: 0, expl: "Nel sistema on-card generico il template risiede sulla carta; il matching può essere esterno. Quando anche il motore di matching è sulla carta si parla più precisamente di Match-on-Card.", cat: "IMPR"},
  {q: "La differenza tra on-card generico e Match-on-Card specifico è:", opts: ["Sono la stessa cosa: entrambi indicano matching e storage sulla carta", "On-card può significare solo storage del template", "On-card è sempre più sicuro del Match-on-Card grazie alla cifratura HW", "Match-on-Card memorizza il template sul server, non sulla carta stessa"], ans: 1, expl: "On-card = termine generico (almeno il template sulla carta). Match-on-Card = il matching engine è ANCHE sulla carta.", cat: "IMPR"},
  {q: "La differenza tra BrightID, Proof of Humanity e Human Passport è:", opts: ["Tutte si basano sulla scansione dell'iride tramite hardware proprietario per la verifica dell'unicità", "BrightID usa il riconoscimento facciale, Proof of Humanity la voce, Human Passport le impronte digitali", "Usano approcci diversi alla PoP: BrightID si basa su vouching sociale, Proof of Humanity su video+vouching", "Proof of Humanity e Human Passport usano vouching sociale, mentre BrightID si basa su biometria dell'iride"], ans: 2, expl: "Sono tre approcci diversi alla prova di unicità/personhood: BrightID si basa sulla validazione sociale, Proof of Humanity sulla verifica video con controllo della comunità, Human Passport su biometria e crittografia.", cat: "ITT"},
  {q: "L'Orb di WorldCoin effettua la liveness detection usando:", opts: ["L'analisi delle micro-variazioni cromatiche della pelle causate dal flusso sanguigno tramite rPPG", "Sensori NIR e sensori di profondità per verificare la tridimensionalità e la presenza fisica reale del soggetto", "Un protocollo challenge-response che impone all'utente di eseguire un task specifico mostrato sul display", "L'analisi della riflessione speculare e della dilatazione pupillare provocata da un flash visibile pulsato"], ans: 1, expl: "L'Orb usa NIR + sensori di profondità per distinguere un occhio vero (3D, riflessi NIR coerenti) da foto, schermi o protesi.", cat: "POP"},
  {q: "L'Orb di WorldCoin usa specificamente la luce NIR e sensori di profondità perché:", opts: ["Il NIR penetra la cornea raggiungendo la retina, e i sensori di profondità misurano lo spessore del cristallino", "I sensori di profondità ricostruiscono la mappa venosa perioculare e il NIR verifica la vitalità del tessuto", "Il NIR misura la dilatazione pupillare dinamica e i sensori di profondità calcolano la distanza interpupillare", "Il NIR rivela la tessitura dell'iride e i sensori di profondità verificano la tridimensionalità contro foto e schermi piatti"], ans: 3, expl: "NIR = tessitura iride indipendente dal colore. Profondità = 3D → scarta foto, schermi, protesi piatte.", cat: "POP"},
  {q: "Le categorie di metodi per la Proof of Personhood oltre alla biometria includono:", opts: ["Riconoscimento vocale, analisi della firma dinamica, scansione retinica e verifica documentale", "Vouching sociale, challenge comportamentali, dispositivi hardware sicuri, verifica documentale", "Challenge cognitivi, verifica documentale, riconoscimento facciale e analisi della digitazione", "Vouching sociale, riconoscimento dell'iride, challenge comportamentali e token crittografici"], ans: 1, expl: "La PoP combina: biometria, vouching sociale, challenge comportamentali, HW sicuro, verifica documentale.", sel: true, cat: "ITT"},
  {q: "La differenza tra 'decision error rates' e 'matching errors' è:", opts: ["Sono sinonimi perfetti", "I decision errors sono sempre inferiori ai matching errors", "I matching errors includono i FTA, i decision errors no", "I matching errors sono algoritmici (FMR/FNMR)"], ans: 3, expl: "Matching errors = errori algoritmici puri (FMR/FNMR). Decision error rates = nel riconoscimento positivo corrispondono a FAR/FRR. FTA e FTE rientrano in una terza categoria separata: image acquisition errors.", cat: "MET1"},
  {q: "I sistemi biometrici distribuiti sono comuni nell'identificazione e rari nell'autenticazione perché:", opts: ["L'identificazione 1:N richiede accesso a un database centrale ampio", "L'autenticazione richiede sempre più potenza di calcolo", "Non esiste alcuna correlazione tra architettura e modalità operativa", "L'identificazione è sempre più veloce dell'autenticazione"], ans: 0, expl: "1:N necessita del DB completo → tipicamente su server remoto. 1:1 può funzionare con solo il template locale (es. on-card, on-sensor).", cat: "IMPR"},
  {q: "Nel modulo di matching, la decisione a soglia (score ≥ T → accetta) fa parte del matching module stesso?", opts: ["No, la decisione è delegata a un modulo esterno che applica policy di sicurezza contestuali", "No, il matching restituisce solo la lista ordinata dei candidati senza confronto con soglia", "Sì, nel modello classico il modulo di matching comprende anche la decisione basata sulla soglia", "No, il matching calcola solo lo score e la decisione è sempre gestita dal sistema operativo"], ans: 2, expl: "Nel modello classico del corso, il modulo di matching include sia il calcolo dello score sia l'algoritmo di decisione, tipicamente il confronto con una soglia.", cat: "MET1"},
  {q: "La template selection durante l'enrollment differisce dal template update durante l'autenticazione perché:", opts: ["La selection sceglie i campioni migliori alla registrazione", "Sono la stessa operazione eseguita in momenti diversi", "La selection aggiorna i template, l'update li seleziona", "Nessuna delle due è realmente implementata nei sistemi commerciali"], ans: 0, expl: "Selection = enrollment (scegli i migliori campioni iniziali). Update = uso quotidiano (aggiungi nuovi campioni dopo match ad alta confidenza).", cat: "IDAUT"},
  {q: "La differenza tra template update online e offline è:", opts: ["L'online richiede la supervisione di un operatore, l'offline è automatico", "L'offline avviene in tempo reale ad ogni accesso, l'online in batch periodici", "L'update online avviene in tempo reale durante l'uso", "L'online aggiorna solo il template, l'offline riaddestra anche il matcher"], ans: 2, expl: "Online = real-time durante ogni accesso riuscito. Offline = batch periodici, con analisi più approfondita dei nuovi campioni.", cat: "SENS"},
  {q: "La differenza tra approccio supervisionato e semi-supervisionato nel template update è:", opts: ["Nel supervisionato un operatore valida i nuovi campioni", "Il supervisionato non usa mai dati biometrici", "Non esiste alcuna differenza", "Il semi-supervisionato richiede sempre un operatore umano"], ans: 0, expl: "Supervisionato = operatore umano che valida. Semi-supervisionato = auto-update quando lo score supera una soglia molto severa (self-update).", cat: "CNN"},
  {q: "La variabilità intraclasse rappresenta:", opts: ["La differenza tra tratti biometrici di tipo diverso dello stesso individuo", "La somiglianza tra campioni di persone diverse che causa false accettazioni", "La differenza tra più acquisizioni dello stesso tratto della stessa persona", "La variazione del rumore ambientale che influenza la qualità dell'acquisizione"], ans: 2, expl: "Intraclasse = stessa persona, acquisizioni diverse (rumore, posa, invecchiamento). Interclasse = persone diverse che si somigliano.", sel: true, cat: "SENS"},
  {q: "La similitudine interclasse indica:", opts: ["Il livello di correlazione tra le feature estratte da due tratti biometrici diversi della stessa persona", "La variabilità tra acquisizioni dello stesso individuo", "L'elevata somiglianza tra campioni di individui del tutto diversi", "La correlazione tra illuminazione e qualità del template"], ans: 2, expl: "Interclasse = persone diverse ma con tratti simili. Bassa distanza interclasse → difficoltà di discriminazione → più false acceptance.", sel: true, cat: "SENS"},
  {q: "Se il Quality Checker valuta un campione come di qualità insufficiente, il sistema deve:", opts: ["Procedere comunque con il matching usando una soglia più bassa", "Terminare la sessione e bloccare l'utente", "Richiedere all'utente una nuova acquisizione", "Memorizzare il campione nel database per futura analisi"], ans: 2, expl: "Se la qualità è insufficiente → riacquisizione. Usare un campione scadente aumenterebbe FMR e FNMR.", cat: "MET1"},
  {q: "Il volto è un tratto difficile da riconoscere in modo robusto perché:", opts: ["Subisce forti variazioni per illuminazione, posa, espressione, invecchiamento e occlusioni", "Ha un numero di feature discriminanti troppo elevato per i classificatori lineari standard", "La distanza interclasse è troppo alta e causa un eccesso sistematico di falsi rifiuti", "I sensori RGB richiedono calibrazioni frequenti che degradano la ripetibilità dell'acquisizione"], ans: 0, expl: "Il volto varia enormemente per illuminazione, posa, espressione, invecchiamento, accessori. Alta variabilità intraclasse.", cat: "VOLTO"},
  {q: "L'anti-spoofing con dilatazione pupillare è un metodo con:", opts: ["Iride statica e imaging attivo", "Iride dinamica e imaging attivo", "Iride statica e imaging passivo", "Iride dinamica e imaging passivo"], ans: 1, expl: "Dinamica (osserva cambiamento pupilla nel tempo) + imaging attivo (illuminazione variata per provocare la dilatazione).", cat: "ATK"},
  {q: "L'analisi FFT di una singola immagine per rilevare pattern Moiré è un metodo con:", opts: ["Iride statica e imaging attivo", "Iride statica e imaging passivo", "Iride dinamica e imaging attivo", "Iride dinamica e imaging passivo"], ans: 1, expl: "Statica (singola immagine) + passivo (nessuno stimolo al soggetto). Le micro-saccadi invece sarebbero dinamiche+passive.", cat: "ATK"},
  {q: "Le GAN (Generative Adversarial Networks) in biometria possono:", opts: ["Solo attaccare i sistemi esistenti", "Solo difendere i sistemi dagli attacchi", "Generare dati sintetici per arricchire i dataset di training", "Sostituire completamente l'estrattore di feature tradizionale con un classificatore puramente generativo"], ans: 2, expl: "Le GAN generano volti sintetici realistici per simulare condizioni difficili e arricchire i dataset di addestramento.", cat: "ATK"},
  {q: "I pericoli di riutilizzare modelli pre-addestrati in biometria includono:", opts: ["Nessun pericolo: è sempre vantaggioso", "Il degrado inaccettabile della velocità di elaborazione durante la fase di inference in tempo reale", "L'impossibilità matematica di applicare la loss ArcFace su pesi pre-addestrati con Softmax", "L'importazione di bias intrinseci e la potenziale vulnerabilità ad attacchi avversari mirati"], ans: 3, expl: "Bias del dataset originale (accuratezza disomogenea per etnia/età) + vulnerabilità ad Adversarial Attacks.", cat: "ATK"},
  {q: "La Sicurezza e la Privacy in un sistema biometrico sono:", opts: ["Concetti sovrapposti: la Privacy include autenticazione e la Sicurezza include il consenso", "Concetti distinti: la Sicurezza garantisce autenticazione e integrità", "Concetti complementari: la Sicurezza protegge i dati e la Privacy ne regola l'accesso fisico", "Concetti equivalenti: entrambe mirano a impedire l'accesso non autorizzato al template"], ans: 1, expl: "Sicurezza = autenticazione, integrità, confidenzialità, non ripudio. Privacy = in più: protezione dati personali + controllo/consenso.", cat: "PRIV"},
  {q: "Lo Sharenting è un rischio biometrico perché:", opts: ["I minori usano i dispositivi biometrici dei genitori creando conflitti nei template del sistema", "I genitori iscrivono i figli a servizi che richiedono enrollment biometrico senza il loro consenso", "Le app di parental control acquisiscono e memorizzano dati biometrici dei minori senza cifratura", "La pubblicazione compulsiva di foto dei figli sui social espone i loro dati biometrici fin dalla nascita"], ans: 3, expl: "Foto ad alta risoluzione sui social = dataset gratuiti per IA biometriche. Sharenting espone l'identità dei minori.", cat: "ITT"},
  {q: "I dati di processo aziendali (timestamp, velocità, errori) possono diventare tracciamento biometrico illegale quando:", opts: ["Vengono usati esclusivamente per report mensili aggregati senza riferimento a singoli dipendenti", "Sono condivisi internamente in riunione di team per analisi collettiva delle prestazioni di gruppo", "Vengono aggregati e confrontati nel tempo per profilare un singolo individuo in modo occulto", "L'analisi comportamentale sul posto di lavoro è sempre esclusa dal GDPR indipendentemente dall'uso"], ans: 2, expl: "Se usati per profilare/monitorare la produttività individuale in modo occulto → tracciamento biometrico illegale.", cat: "MET2"},
  {q: "Il framework classico degli attacchi biometrici distingue tra:", opts: ["Attacchi diretti al sensore e attacchi indiretti al database", "Attacchi al sistema e attacchi sugli ingressi", "Attacchi cooperativi e attacchi non cooperativi", "Attacchi passivi di intercettazione e attacchi attivi di iniezione"], ans: 1, expl: "Due pilastri: attacchi al sistema (DoS, manomissione HW, violazione rete) e attacchi sugli ingressi (spoofing/PAD, adversarial).", cat: "ATK"},
  {q: "L'evoluzione degli standard video H.264 → H.265 → H.266 punta a:", opts: ["Aumentare la risoluzione massima supportata mantenendo lo stesso bitrate e la stessa CPU", "Spostare l'elaborazione del codec interamente lato server per alleggerire le telecamere edge", "Dimezzare il bitrate a parità di qualità, a costo di maggiore potenza di calcolo", "Ridurre i costi hardware dei decoder eliminando la necessità di GPU dedicate per la decodifica"], ans: 2, expl: "Ogni generazione dimezza circa il bitrate mantenendo la qualità, ma richiede CPU/GPU più potenti per la decodifica.", cat: "SENS"},
  {q: "OSNet (Omni-Scale Network) è un'architettura progettata specificamente per:", opts: ["Il riconoscimento dell'iride tramite filtri multi-scala adattati alla texture locale", "Il rilevamento e tracciamento di veicoli in scenari di sorveglianza autostradale", "La Person Re-ID, catturando informazioni a scale multiple contemporaneamente", "La generazione di embedding vocali robusti per la verifica del parlante in ambienti rumorosi"], ans: 2, expl: "OSNet cattura dettagli locali e globali simultaneamente per generare un embedding vettoriale per la Re-ID.", cat: "IRIDE"},
  {q: "Lo standard ONVIF serve per:", opts: ["Standardizzare il formato dei template biometrici per l'interscambio tra database governativi", "Definire le metriche di qualità delle immagini biometriche acquisite da sensori certificati", "Garantire interoperabilità tra dispositivi di sicurezza su rete di produttori diversi", "Cifrare i template biometrici in transito tra il sensore e il server di matching remoto"], ans: 2, expl: "ONVIF = standard universali per interoperabilità tra telecamere, sensori e sistemi di accesso di vendor diversi.", cat: "SENS"},
  {q: "L'Intelligent Face Compression applica:", opts: ["Solo compressione dello sfondo, lasciando il volto non compresso", "Nessuna compressione: trasmette l'immagine raw", "Compressione minore sui volti e maggiore sullo sfondo", "Compressione uniforme su tutta l'immagine"], ans: 2, expl: "Mantiene alta qualità sui volti (dettagli cruciali) e comprime lo sfondo statico per risparmiare banda.", cat: "VOLTO"},
  {q: "La strategia 'Zero Trust' per la prevenzione frodi si basa su:", opts: ["Mai fidarsi, verificare sempre lungo tutto il ciclo di vita del cliente", "Usare esclusivamente biometria fisiologica", "Bloccare tutti gli accessi esterni alla rete", "Affidarsi esclusivamente alla crittografia end-to-end senza controlli sui client"], ans: 0, expl: "Validazione continua dell'identità, biometria comportamentale per bot, IA per anomalie invisibili all'occhio umano.", cat: "ITT"},
  {q: "Il rischio 'Harvest Now, Decrypt Later' riguarda:", opts: ["La raccolta di dati cifrati oggi per decifrarli con futuri computer quantistici", "L'uso di template biometrici estratti da volti pre-puberali che cambieranno crescendo", "L'obsolescenza programmata dei sensori biometrici", "L'accumulo di template in formato non crittografato su server cloud insicuri"], ans: 0, expl: "Attaccanti archiviano dati criptati oggi, in attesa che i computer quantistici rompano la crittografia attuale.", cat: "ITT"},
  {q: "L'autenticazione acustica (VoiceGesture, LipPass) usa lo smartphone come:", opts: ["Sonar Doppler che emette suoni ad alta frequenza e analizza i riflessi dei movimenti labiali", "Telecamera frontale per analizzare il movimento labiale e confrontarlo con un modello visivo registrato", "Microfono direzionale per registrare e confrontare le caratteristiche spettrali della voce dell'utente", "Altoparlante che emette una sequenza challenge audio e microfono che verifica la risposta vocale corretta"], ans: 0, expl: "Emette suoni ~20kHz e analizza i riflessi dal microfono durante il parlato → mappa i gesti articolatori unici.", cat: "VOCE"},
  {q: "Qual è la differenza tra un 'genuine attempt' e un 'impostor attempt'?", opts: ["Il genuine è più lento dell'impostor", "L'autenticazione è intrinsecamente più vulnerabile agli attacchi di spoofing su rete pubblica", "Sono la stessa cosa: entrambi sono tentativi legittimi", "Nel genuine l'utente presenta il proprio tratto reale"], ans: 3, expl: "Genuine = utente legittimo che presenta il proprio tratto. Impostor = qualcuno che (intenzionalmente o meno) presenta un tratto che non corrisponde al template.", cat: "ITT"},
  {q: "Le tre fasi di test standardizzate per valutare un sistema biometrico sono:", opts: ["Training, Validation, Testing", "Enrollment, Verification, Identification", "Technology, Scenario, Operational", "Accuracy, Speed, Security"], ans: 2, expl: "Technology (algoritmi), Scenario (simulazioni controllate), Operational (valutazione reale sul campo).", sel: true, cat: "IDAUT"},
  {q: "Lo Zoo di Doddington: le 'Capre' (Goats) causano:", opts: ["Molti falsi rifiuti a causa di alta variabilità intraclasse", "Nessun problema di riconoscimento", "False accettazioni per somiglianza con altri", "Saturazione del database a causa della continua necessità di template update"], ans: 0, expl: "Pecore = ideali. Capre = molti falsi rifiuti. Agnelli = false accettazioni passive. Lupi = manipolazione attiva.", cat: "ZOO"},
  {q: "Nello Zoo di Doddington, gli Agnelli (Lambs) causano false accettazioni perché:", opts: ["Presentano alta variabilità intraclasse che confonde il matcher durante il confronto con la gallery", "Manipolano intenzionalmente il proprio tratto biometrico per impersonare un altro utente registrato", "Hanno un tratto biometrico instabile che produce score molto diversi a ogni acquisizione successiva", "Hanno bassa distanza interclasse naturale, risultando simili ad altri per caso"], ans: 3, expl: "Lamb = naturalmente simile ad altri → false acceptance senza intenzione fraudolenta. I Lupi invece frodano attivamente.", cat: "ZOO"},
  {q: "Nello Zoo di Doddington, i Lupi (Wolves):", opts: ["Hanno bassa variabilità intraclasse", "Manipolano intenzionalmente il tratto per frodare il sistema", "Generano molti falsi rifiuti per variabilità", "Sfruttano vulnerabilità del software di matching per forzare un buffer overflow"], ans: 1, expl: "I Lupi manipolano attivamente il tratto (soprattutto comportamentale) per impersonare un altro utente.", cat: "ZOO"},
  {q: "Il Rank-1 nella curva CMC indica:", opts: ["La percentuale di volte in cui l'identità corretta è al primo posto della lista", "La probabilità di trovare l'identità corretta tra le prime 5 posizioni", "Il rapporto percentuale tra false accettazioni e tentativi genuini al primo tentativo", "La soglia ottimale per il sistema"], ans: 0, expl: "Rank-1 = identità corretta al primo posto. Rank-5 = tra le prime cinque posizioni.", cat: "MET1"},
  {q: "Nella rivendicazione d'identità, la Positiva e la Negativa differiscono perché:", opts: ["Nella Positiva l'utente dichiara di essere registrato", "La Negativa è sempre più veloce della Positiva", "La Positiva usa la biometria, la Negativa le password", "Sono la stessa cosa con nomi diversi"], ans: 0, expl: "Positiva: 'sono nel sistema, fatemi entrare'. Negativa: 'non sono nel sistema, non ho già richiesto questo servizio'.", sel: true, cat: "IDAUT"},
  {q: "Il Penetration Rate in un algoritmo di Binning indica:", opts: ["Il tasso di errore del classificatore nella fase iniziale di assegnazione al bin", "La percentuale del database che deve essere scansionata per completare una ricerca", "La velocità di acquisizione del sensore misurata in campioni elaborati al secondo", "Il rapporto tra falsi rifiuti e false accettazioni all'interno di un singolo bin"], ans: 1, expl: "Rate basso = sistema veloce. Si valuta come il rapporto tra confronti necessari e dimensione totale del DB.", cat: "IMPR"},
  {q: "Le minutiae più utilizzate nei sistemi automatici di impronte (Livello II) sono:", opts: ["Core e Delta", "Arch, Loop e Whorl", "Terminazioni e biforcazioni", "L'orientamento globale dei ridge e la frequenza spaziale"], ans: 2, expl: "Ne esistono 150+ tipologie, ma i sistemi automatici (FBI) usano principalmente terminazioni e biforcazioni.", cat: "IMPR"},
  {q: "Il Crossing Number CN=1 in un'immagine binarizzata di impronta indica:", opts: ["Una biforcazione", "Un punto su un ridge normale", "Un poro sudoriparo isolato dal resto della cresta", "Una terminazione (fine cresta)"], ans: 3, expl: "CN=1 → terminazione. CN=2 → ridge normale (nessuna minutia). CN=3 → biforcazione.", cat: "IMPR"},
  {q: "Il Crossing Number CN=2 indica:", opts: ["Un delta, ovvero il punto di divergenza tra tre creste papillari", "Un punto su un ridge normale, non una minutia", "Una minutia complessa formata da due biforcazioni adiacenti sullo stesso ridge", "Una biforcazione, ovvero il punto in cui un ridge si divide in due rami"], ans: 1, expl: "CN=2 = punto su ridge normale, NON è una minutia. Trappola: lo studente potrebbe pensare che ogni CN sia una minutia.", cat: "IMPR"},
  {q: "Le tre macro-categorie di classificazione delle impronte al Livello I (globale) sono:", opts: ["Minutia, Ridge, Valley", "Arch, Loop, Whorl", "Core, Delta, Ridge", "Terminazione, Biforcazione, Punto isolato"], ans: 1, expl: "Arch (arco), Loop (cappio), Whorl (vortice). La A è Livello II.", cat: "IMPR"},
  {q: "Il Livello III dell'impronta (pori, conformazioni intra-cresta) richiede una risoluzione minima di:", opts: ["Qualsiasi risoluzione è sufficiente", "1000 DPI", "500 DPI", "250 DPI"], ans: 1, expl: "Dettagli microscopici → sensori ottimi e almeno 1000 DPI. Il 500 DPI è sufficiente per il Livello II (minutiae).", sel: true, cat: "IMPR"},
  {q: "Il Quality Checker nel flusso biometrico si posiziona:", opts: ["Subito dopo l'acquisizione, per verificare la bontà del campione prima dell'estrazione delle feature", "Tra l'estrazione delle feature e il matching, per filtrare i vettori con entropia insufficiente", "Prima dell'acquisizione, per calibrare automaticamente i parametri del sensore sul soggetto", "Dopo il matching, per scartare gli score generati da campioni con rapporto segnale/rumore basso"], ans: 0, expl: "Il Quality Checker valuta il campione appena acquisito. Se la qualità è insufficiente → riacquisizione.", cat: "SENS"},
  {q: "La funzione di attivazione ReLU in una CNN:", opts: ["Converte l'output dell'ultimo strato in probabilità percentuali normalizzate per ogni classe", "Azzera i valori negativi mantenendo intatti i positivi, velocizzando l'addestramento", "Moltiplica tutti i valori per un fattore di scala appreso durante la fase di backpropagation", "Normalizza l'output tra 0 e 1 per facilitare la convergenza della loss function durante il training"], ans: 1, expl: "ReLU = max(0, x). Semplifica l'apprendimento. Non confondere con Softmax (probabilità) o Pooling (riduzione dimensione).", cat: "CNN"},
  {q: "La funzione Softmax nell'ultimo strato di una CNN serve per:", opts: ["Azzezzare i valori negativi", "Convertire i valori grezzi in probabilità percentuali per ogni classe", "Ridurre la dimensionalità dei dati", "Massimizzare la distanza inter-classe e minimizzare la distanza intra-classe nell'embedding"], ans: 1, expl: "Softmax trasforma il vettore di output in probabilità (somma = 100%) per decretare la classe vincente.", sel: true, cat: "CNN"},
  {q: "Il Pooling (Max-Pooling) in una CNN serve per:", opts: ["Convertire l'immagine in scala di grigi prima di passarla ai filtri di convoluzione", "Estrarre feature di livello superiore combinando i risultati di più filtri convoluzionali", "Ridurre le dimensioni spaziali e rendere il sistema invariante a piccole traslazioni", "Applicare i filtri di convoluzione con stride variabile per aumentare il campo recettivo"], ans: 2, expl: "Pooling riduce dimensioni, abbatte parametri, e dà robustezza a piccoli spostamenti dell'oggetto nell'immagine.", sel: true, cat: "CNN"},
  {q: "L'architettura dominante per i tratti fisiologici basati su immagini (volto, iride, impronta) è:", opts: ["SVM (Support Vector Machines) con kernel RBF radiale", "CNN (Reti Neurali Convoluzionali)", "KNN (K-Nearest Neighbors)", "RNN (Reti Neurali Ricorrenti)"], ans: 1, expl: "Le CNN sono lo standard assoluto per elaborare immagini: filtri spaziali + pooling codificano pattern locali e globali.", cat: "IRIDE"},
  {q: "AlexNet è storicamente importante perché:", opts: ["È l'unica rete convoluzionale che non richiede operazioni di pooling spaziale", "È stata progettata specificamente per l'estrazione di minutiae dalle impronte digitali", "Riesce a completare l'addestramento su ImageNet senza l'uso di schede video (GPU)", "È una CNN pre-addestrata su oltre 1 milione di immagini, usata come base per Transfer Learning"], ans: 3, expl: "AlexNet: riconosce 1000 categorie, storicamente uno dei modelli più usati come punto di partenza per il TL.", cat: "IMPR"},
  {q: "L'approccio 'Dividi et Impera' nel Deep Learning consiste nel:", opts: ["Usare solo metà dei layer della rete", "Frammentare il problema usando più reti a cascata", "Usare una singola rete enorme per risolvere tutto in un colpo", "Dividere il dataset in parti uguali"], ans: 1, expl: "NON dare un'immagine gigante a una sola rete. Usare reti in cascata per sotto-problemi specifici.", cat: "CNN"},
  {q: "La differenza tra un Image Classifier e un Object Detector è:", opts: ["Il Classifier non può elaborare immagini", "Il Classifier dà un'etichetta globale", "Sono la stessa cosa con nomi diversi", "L'Object Detector è sempre più lento"], ans: 1, expl: "Classifier = 'Cane: Sì/No'. Object Detector = 'Cane presente alle coordinate (x1,y1,x2,y2)'.", cat: "CNN"},
  {q: "Gli Autoencoders sono architetture usate in apprendimento non supervisionato con struttura:", opts: ["Lineare, senza strati nascosti", "Ricorrente, con memoria interna", "A stella: un nodo centrale distribuisce le informazioni a più decoder specializzati", "A clessidra: encoder comprime, decoder ricostruisce l'input"], ans: 3, expl: "Encoder comprime → rappresentazione latente → Decoder ricostruisce. Scopre pattern salienti senza etichette.", cat: "CNN"},
  {q: "Le lacune principali del deep learning nei sistemi biometrici reali includono:", opts: ["Solo il costo dell'energia elettrica", "Solo la lentezza del training", "Mancanza di dati realistici, risorse limitate su mobile", "L'impossibilità di usare la distanza Coseno sugli embedding generati dall'ultimo strato"], ans: 2, expl: "Tre criticità: dati realistici scarsi, modelli pesanti per mobile, scalabilità 1:N su milioni di identità.", cat: "CNN"},
  {q: "Le telecamere PTZ (Pan-Tilt-Zoom) rispetto alle fisse:", opts: ["Possono ruotare, inclinare e zoomare per seguire attivamente soggetti sospetti", "Offrono un campo visivo più ampio ma non supportano l'analisi video con algoritmi AI", "Costano significativamente meno delle fisse grazie alla minore complessità ottica", "Richiedono connessioni analogiche dedicate per gestire la latenza dei motori interni"], ans: 0, expl: "PTZ = motorizzate: rotazione 360°, inclinazione, zoom per seguire un soggetto da lunghe distanze.", cat: "SENS"},
  {q: "Nei decibel (dB) per telecamere di sorveglianza, il rapporto si esprime come:", opts: ["20 × log₁₀(I₁/I₀) per segnali video", "10 × log₁₀(I₁/I₀)", "I₁ / I₀ senza logaritmo", "L'integrale del rapporto segnale/rumore sull'intero spettro visibile"], ans: 0, expl: "Per i segnali video: 20 × log₁₀(I₁/I₀). Scala logaritmica perché l'illuminazione varia di molti ordini di grandezza.", cat: "SENS"},
  {q: "Il Fraud-as-a-Service (FaaS) consiste in:", opts: ["Un servizio bancario antifrode che analizza le transazioni sospette dei clienti in tempo reale", "Gruppi criminali che vendono strumenti di frode AI-ready, tutorial e dati rubati nel Dark Web", "Una piattaforma cloud certificata per la validazione sicura e distribuita dei template biometrici", "Un programma governativo di formazione sulla sicurezza biometrica destinato agli operatori di frontiera"], ans: 1, expl: "FaaS abbassa la barriera d'ingresso: anche frodatori dilettanti possono lanciare attacchi sofisticati su larga scala.", cat: "ATK"},
  {q: "Secondo il materiale del corso, la differenza tra identificazione positiva e negativa è:", opts: ["La positiva verifica l'appartenenza a una lista di abilitati, la negativa controlla che il soggetto non sia in blacklist o non usi identità multiple", "La positiva confronta il campione con un singolo template dichiarato in modalità 1:1, la negativa confronta con l'intero database in modalità 1:N", "La negativa usa sempre database di dimensioni ridotte rispetto alla positiva per velocizzare la ricerca tramite binning gerarchico", "Non esiste alcuna differenza operativa tra le due: sono nomi intercambiabili per lo stesso processo di confronto biometrico 1:N"], ans: 0, expl: "Nel corso, identificazione positiva e negativa sono due usi diversi dell'identificazione. La conferma di un'identità dichiarata ('sei chi dici?') appartiene invece all'autenticazione/verifica 1:1, come nell'esempio del bancomat.", cat: "IMPR"},
  {q: "Nel sistema biometrico, il 'Genuino' e l''Impostore' si distinguono perché:", opts: ["Sono entrambi utenti autorizzati con livelli di accesso diversi", "Il genuino è l'utente legittimo", "Il genuino usa password, l'impostore usa biometria", "Non esiste una distinzione formale nel framework biometrico"], ans: 1, expl: "Genuino = utente con i requisiti per accedere. Impostore = utente non autorizzato.", cat: "ITT"},
  {q: "La regola di decisione fondamentale in un sistema di verifica biometrica è:", opts: ["Se il match score è positivo, accetta; se negativo, rifiuta", "Se il match score S ≥ soglia T, accetta come genuino", "Il sistema accetta sempre e registra gli score per analisi offline", "Se l'immagine è a fuoco, accetta; se sfocata, rifiuta"], ans: 1, expl: "Score ≥ T → Genuino (accettato). Score < T → Impostore (rifiutato). La soglia T determina il bilanciamento FMR/FNMR.", cat: "MET1"},
  {q: "Un template biometrico è:", opts: ["L'immagine grezza del tratto biometrico memorizzata nel database dopo la compressione", "Il vettore dei pesi della rete neurale addestrata specificamente sul tratto dell'utente", "La rappresentazione matematica sintetica delle feature estratte dal dato biometrico", "L'insieme dei parametri di calibrazione del sensore associati a ciascun utente registrato"], ans: 2, expl: "Template = rappresentazione compatta e matematica (es. IrisCode, coordinate minuzie). Non è l'immagine grezza.", cat: "IRIDE"},
  {q: "Le due macro-fasi operative di un sistema biometrico sono:", opts: ["Input dei dati grezzi e Output della decisione finale del sistema", "Training del modello di matching e Testing sulle nuove acquisizioni", "Estrazione delle feature e classificazione vettoriale nello spazio latente", "Enrollment (registrazione) e Riconoscimento (matching + decisione)"], ans: 3, expl: "Enrollment = registrazione iniziale con salvataggio in galleria. Riconoscimento = acquisizione probe + matching + decisione.", cat: "IDAUT"},
  {q: "I 4 moduli di un sistema biometrico completo sono:", opts: ["Sensore, Estrazione Feature, Matcher, Decisione", "Sensore, Quality Checker, Matcher, Database", "Acquisizione, Normalizzazione, Classificatore, Logger", "Enrollment, Estrazione Feature, Matching, Logging"], ans: 0, expl: "Sensore (acquisizione) → Feature Extraction → Matcher (confronto probe/gallery) → Decisione (score vs soglia).", cat: "MULTI"},
  {q: "L'architettura Match-on-Sensor (Match-in-Sensor) si distingue perché:", opts: ["Il sensore acquisisce e trasmette il template cifrato al microcontrollore host per il matching sicuro", "Il template risiede nel Secure Element della smart card e il sensore esegue solo l'acquisizione grezza", "Il matching avviene nel server remoto ma il sensore esegue localmente l'estrazione delle feature e il QC", "Il matching avviene localmente nel sensore, riducendo l'esposizione dei dati biometrici verso l'esterno"], ans: 3, expl: "Nel Match-in-Sensor il confronto biometrico viene eseguito nel sensore stesso. Non è corretto far dipendere la definizione dal fatto che anche crittografia e anti-spoofing avvengano sempre tutti internamente.", cat: "ITT"},
  {q: "La variabilità intraclasse è causata da fattori come:", opts: ["Somiglianza morfologica tra individui diversi della stessa etnia o fascia d'età", "Invecchiamento, diversa posa, rumore del sensore e variazioni ambientali", "Variazioni sistematiche introdotte dalla calibrazione periodica del sensore", "Differenze nella risoluzione e nel tipo di compressione dei template nel database"], ans: 1, expl: "Intraclasse = stessa persona in acquisizioni diverse. Causata da invecchiamento, posa, rumore, ambiente.", sel: true, cat: "SENS"},
  {q: "I punti di forza dell'impronta digitale come tratto biometrico includono:", opts: ["Assoluta stabilità nel tempo e immunità alle alterazioni dovute a lavori manuali usura", "Alta accuratezza, facilità di acquisizione, tecnologia matura e possibilità di usare più dita", "Minima variabilità intraclasse e impossibilità totale di acquisizione latente", "Uso di fotocamere commerciali RGB a basso costo invece di sensori ottici dedicati"], ans: 1, expl: "Quattro punti di forza. Debolezza principale: ~4% della popolazione non fornisce impronte leggibili.", cat: "POP"},
  {q: "Le debolezze dell'impronta digitale includono il fatto che circa il 4% della popolazione:", opts: ["Ha creste papillari con orientamento troppo uniforme per il classificatore", "Presenta impronte con frequenza di ridge fuori dal range dei sensori standard", "Genera template con entropia insufficiente per un matching discriminativo", "Non riesce a fornire un'impronta leggibile"], ans: 3, expl: "Il 4% non può fornire impronte leggibili (FTE). Inoltre: possibile degrado nel tempo e disagio psicologico (associazione forense).", cat: "POP"},
  {q: "I principali punti di forza dell'iride come tratto biometrico sono:", opts: ["Massima accuratezza dopo il DNA, altissima stabilità nel tempo e acquisizione contactless", "Robustezza totale allo spoofing e nessuna occlusione", "Acquisizione sempre cooperativa che elimina il problema dei falsi rifiuti e dello spoofing", "Facilità di acquisizione e alta velocità di matching"], ans: 0, expl: "Iride = tratto più accurato dopo DNA. Pattern stabili dal secondo anno di età. Contactless. Ma: percepita come invasiva.", cat: "ATK"},
  {q: "Le principali sfide dell'acquisizione dell'iride includono:", opts: ["Target piccolo (~1 cm), in movimento, dietro cornea curva e bagnata, spesso occluso da ciglia/palpebre", "L'altissima variabilità strutturale dell'iride durante i periodi di forte stress emotivo", "La necessità di usare potenti laser NIR che possono danneggiare la retina se non calibrati", "L'impossibilità di distinguere la texture iridea dai riflessi ambientali sulla cornea in luce NIR"], ans: 0, expl: "L'iride è piccola, in movimento, dietro la cornea. Deformazione elastica con dilatazione pupillare. Percepita come invasiva.", cat: "ATK"},
  {q: "La privacy dell'iride ad alta risoluzione è a rischio perché:", opts: ["Fotocamere ad altissima risoluzione possono catturare la texture dell'iride da foto pubbliche o a grande distanza", "L'IrisCode contiene nativamente informazioni genetiche decodificabili sulla salute dell'individuo", "I sensori NIR moderni salvano automaticamente i dati biometrici su database governativi centralizzati", "La crittografia omomorfica usata per l'IrisCode è stata recentemente bucata dai computer quantistici"], ans: 0, expl: "Foto ad alta risoluzione (selfie, social) → texture iride catturabile nel visibile anche a distanza → rischio di tracking non consenziente.", cat: "ITT"},
  {q: "Le caratteristiche hardware minime di un sensore per l'iride includono:", opts: ["Un sensore CCD monocromatico IR con risoluzione minima 640×480 e raggio iride di 70-140 pixel", "Un sensore CCD monocromatico IR con risoluzione minima 320×240 e raggio iride di 30-50 pixel", "Un sensore CMOS RGB con risoluzione minima 1280×720 e raggio iride di 200-300 pixel", "Un sensore CCD monocromatico IR con risoluzione minima 1920×1080 e raggio iride di 150-200 pixel"], ans: 0, expl: "CCD monocromatico sensibile IR. Risoluzione minima 640×480. Raggio iride almeno 70-140 pixel. Ottiche variabili/motorizzate.", cat: "IRIDE"},
  {q: "I filtri ottici (es. passa-banda) nei sensori biometrici servono per:", opts: ["Aumentare la risoluzione spaziale del sensore filtrando le frequenze spaziali più basse", "Aumentare il contrasto dei micro-dettagli della pelle tramite polarizzazione della luce incidente", "Bloccare le lunghezze d'onda indesiderate, ad es. la luce solare in un sistema IR per iride", "Ridurre il consumo energetico del sensore limitando la quantità di fotoni che raggiungono il chip"], ans: 2, expl: "Es. in un sistema iride: il filtro fa passare solo l'IR, bloccando la luce visibile che causerebbe riflessi sulla cornea.", cat: "IRIDE"},
  {q: "Come si classificano le vulnerabilità degli e-Gate?", opts: ["Non esiste una classificazione standard", "Solo in base alla nazionalità dell'attaccante", "In attacchi Diretti e Indiretti", "Solo in base al costo dell'attacco"], ans: 2, expl: "Diretti = presentazione di tratti falsi al sensore. Indiretti = conoscenza dell'architettura per intercettare canali interni.", cat: "SENS"},
  {q: "La sensibilità ISO in un sensore biometrico influisce sulla qualità perché:", opts: ["ISO bassi riducono il framerate rallentando in modo inaccettabile il throughput del varco", "ISO alti permettono di acquisire al buio ma introducono rumore che degrada le feature biometriche", "La sensibilità ISO non ha alcun effetto sulla biometria", "ISO alti migliorano sempre la qualità dell'immagine senza compromessi"], ans: 1, expl: "ISO alti = più luminosità in condizioni scure ma più rumore elettronico → distrugge micro-dettagli → FNMR aumenta.", cat: "MET1"},
  {q: "Secondo il materiale del corso, come si classificano questi errori biometrici?", opts: ["Image acquisition errors = FTA/FTE; matching errors = FMR/FNMR; decision error rates = FAR/FRR nel riconoscimento positivo", "Image acquisition errors = FMR/FNMR; matching errors = FTA/FTE; decision error rates = EER al punto di equilibrio", "Image acquisition errors e matching errors sono categorie equivalenti; i decision errors includono solo i Failure To Enroll", "Image acquisition errors = errori del sensore ottico; matching errors = errori di trasmissione; decision errors = errori umani"], ans: 0, expl: "Il corso distingue le categorie image acquisition errors, matching errors e decision error rates. FTA/FTE appartengono agli errori di acquisizione; FMR/FNMR agli errori di matching; FAR/FRR sono i nomi usati nel riconoscimento positivo per i tassi di decisione alla soglia.", cat: "MET1"},
  {q: "Nella classificazione globale delle impronte (Livello I), Core e Delta sono:", opts: ["Tipi di pori sudoripari visibili solo al Livello III con risoluzione ≥1000 DPI", "Tipi di minutiae locali estratte al Livello II (terminazioni e biforcazioni)", "Zone danneggiate in cui il rumore ha distrutto le creste rendendo impossibile l'estrazione", "Punti singolari che determinano la classificazione in Arch, Loop e Whorl"], ans: 3, expl: "Core = centro del pattern. Delta = punto di divergenza. La loro presenza e posizione determinano Arch/Loop/Whorl.", cat: "IMPR"},
  {q: "Il matching basato sulle minutiae è complesso a causa di:", opts: ["Rotazioni, traslazioni, distorsioni elastiche della pelle e minutiae falsamente rilevate o mancanti", "La natura puramente analogica dei sensori capacitivi moderni che introduce rumore termico", "L'impossibilità di estrarre minutiae da immagini digitali", "L'impossibilità di usare algoritmi euristici per allineare rapidamente template di dimensioni diverse"], ans: 0, expl: "La corrispondenza richiede tolleranza su distanza spaziale e angolo di direzione, compensando deformazioni e artefatti.", cat: "IMPR"},
  {q: "Il vantaggio principale del calcolo degli score Offline rispetto all'Online è:", opts: ["Permette di generare un numero enorme di confronti impostori senza coinvolgere continuamente gli utenti", "Offre maggiore sicurezza impedendo agli attaccanti di intercettare il template durante l'uso", "Non richiede alcuna memorizzazione dei dati biometrici, garantendo la privacy by design", "Elimina la necessità di calibrare la soglia operativa del sistema in base allo scenario d'uso"], ans: 0, expl: "Offline = salvi le immagini → confronto esaustivo successivo → molti più confronti impostori per statistiche affidabili.", cat: "MET1"},
  {q: "Nel contesto della firma biometrica, la differenza tra firma online (dinamica) e offline (statica) è:", opts: ["Non c'è alcuna differenza pratica", "L'offline è sempre più accurata dell'online", "L'online acquisisce la sequenza temporale (velocità, pressione, inclinazione)", "L'online richiede algoritmi Deep Learning, mentre l'offline si basa esclusivamente su filtri matematici classici"], ans: 2, expl: "Online = tavoletta grafica che cattura tutto il dominio temporale. Offline = solo l'immagine finale della firma (meno informativa).", cat: "VOCE"},
  {q: "Il matching basato sulle minutiae è complesso a causa di problematiche legate a:", opts: ["Il numero estremamente ridotto di minutiae presenti nelle impronte della maggior parte della popolazione", "Rotazioni, traslazioni, distorsioni elastiche della pelle e minutiae falsamente rilevate", "La necessità di ricostruire l'impronta 3D completa prima di procedere al confronto vettoriale", "La limitata potenza di calcolo dei microcontrollori inseriti nelle moderne smart card biometriche"], ans: 1, expl: "Il matching deve tollerare rotazioni, traslazioni, distorsioni elastiche e minutiae spurie o mancanti.", cat: "POP"},
  {q: "Le tecniche utilizzate per migliorare il flusso nel processing biometrico includono:", opts: ["Regressione, Normalizzazione, Convoluzione", "Solo Regressione e Normalizzazione", "Nessuna delle precedenti", "Solo Regressione"], ans: 0, expl: "Nel flusso biometrico, regressione (ricostruzione dati mancanti), normalizzazione (uniformare contrasto/illuminazione) e convoluzione (filtraggio spaziale) sono tutte tecniche di processing.", sel: true, cat: "CNN"},
  {q: "L'art. 612-quater c.p. prevede per chi diffonde contenuti generati o alterati con IA senza consenso:", opts: ["Reclusione da 1 a 5 anni", "Solo una sanzione amministrativa pecuniaria", "Reclusione da 6 mesi a 2 anni", "Nessuna conseguenza penale se il contenuto non è sessuale"], ans: 0, expl: "L'art. 612-quater prevede reclusione da 1 a 5 anni, fino a 6 con aggravanti, fino a 12 per abuso di informazioni privilegiate. Procedibilità a querela, d'ufficio se collegato ad altro reato perseguibile d'ufficio o contro incapaci, minori, infermi o pubbliche autorità.", sel: true, cat: "IDAUT"},
  {q: "Quale delle seguenti NON è una tecnica di Proof of Personhood?", opts: ["Verifica sociale dove persone già verificate garantiscono per i nuovi membri", "Challenge comportamentali come pattern motori e digitazione", "Confronto diretto tra due template biometrici per verifica 1:1", "Scansione biometrica dell'iride per verifica dell'unicità"], ans: 2, expl: "La PoP verifica che sei un umano unico e reale, non chi sei. La verifica 1:1 è autenticazione biometrica classica. Il materiale elenca: biometria, challenge comportamentali, verifica sociale, dispositivi HW sicuri, verifica documentale.", sel: true, cat: "POP"},
  {q: "Un attaccante inserisce campioni manipolati nel dataset di addestramento di una rete neurale, alterandone il comportamento futuro. Questo è un attacco di tipo:", opts: ["Evasione, perché modifica l'input durante il deployment del sistema", "Avvelenamento, perché corrompe i dati di addestramento del modello", "Estrazione, perché sonda il modello per rubarne una copia sostitutiva", "Inferenza, perché inverte il flusso per acquisire dati privati degli utenti"], ans: 1, expl: "Il corso elenca 4 tipi: Evasione (deployment), Avvelenamento/Poisoning (training), Estrazione (furto modello), Inferenza (violazione privacy).", sel: true, cat: "ATK"},
  {q: "Il False Non-Match è classificato come errore di:", opts: ["Tipo II, mancato allarme", "Tipo I, falso allarme", "Tipo III, errore di classificazione", "Nessun tipo standard, dipende dalla soglia operativa"], ans: 1, expl: "False Non-Match (genuino rifiutato) = Tipo I (falso allarme). False Match (impostore accettato) = Tipo II (mancato allarme).", cat: "MET1"},
  {q: "Nel Piggybacking, l'intruso supera il varco:", opts: ["Senza che l'utente autorizzato se ne accorga in alcun modo", "Con il consenso o la consapevolezza dell'utente autorizzato", "Usando credenziali biometriche clonate dall'utente autorizzato", "Forzando fisicamente la porta dopo la chiusura automatica del varco"], ans: 1, expl: "Piggybacking = con consenso/consapevolezza. Tailgating = furtivo, senza che l'autorizzato se ne accorga.", cat: "SENS"},
  {q: "La curva CMC è uno strumento di valutazione specifico per:", opts: ["Sistemi di verifica biometrica 1:1 con soglia fissa", "Sistemi di identificazione 1:N, dove misura la probabilità che l'identità corretta sia nei primi K risultati", "La calibrazione della soglia operativa in sistemi multimodali", "La misurazione del Failure To Enroll durante la fase di registrazione"], ans: 1, expl: "CMC = Cumulative Matching Characteristic, per identificazione 1:N. Rank-1 = identità corretta al primo posto. Rank-10 = entro i primi dieci.", sel: true, cat: "MULTI"},
  {q: "Quale delle seguenti è una caratteristica della Match-on-Card?", opts: ["Il template e il motore di matching risiedono nel Secure Element della carta", "La carta è alimentata da una batteria interna ricaricabile via NFC", "Il matching avviene nel terminale POS, la carta contiene solo il template", "Tutte le precedenti"], ans: 0, expl: "Nel materiale del corso, il MoC ha: Secure Element (template + motore di matching), Contactless Functionality che alimenta la carta con energia dal terminale — nessuna batteria necessaria. Nessun segreto lascia mai la carta.", sel: true, cat: "IMPR"},
  {q: "BeCAPTCHA utilizza le GAN per:", opts: ["Generare puzzle visivi sempre più complessi da sottoporre all'utente", "Produrre traiettorie sempre più naturali per addestrare la rete di detezione dei bot", "Ricostruire il volto dell'utente tramite modello generativo 3D", "Cifrare i dati comportamentali raccolti durante la sessione di verifica"], ans: 1, expl: "Il materiale dice che BeCAPTCHA impiega reti GAN per produrre traiettorie sempre più naturali, per poi addestrare le reti per la detezione dell'attacco.", sel: true, cat: "ITT"},
  {q: "reCAPTCHA v3 restituisce:", opts: ["Un esito binario pass/fail dopo la risoluzione di un puzzle visivo", "Un punteggio continuo da 0.0 a 1.0 che rappresenta la probabilità che l'utente sia umano", "Un certificato crittografico che autentica il browser dell'utente", "Un hash del comportamento dell'utente confrontato con un database di profili noti"], ans: 1, expl: "reCAPTCHA v3 lavora in background e restituisce uno score continuo (0.0 = sospetto bot, 1.0 = molto probabilmente umano). Permette logiche personalizzate: blocco sotto 0.3, MFA tra 0.3-0.6, ok sopra 0.6.", sel: true, cat: "ITT"},
  {q: "Nella fusione a livello feature di un sistema multimodale, cosa viene combinato?", opts: ["I vettori di feature estratti dai diversi tratti prima del matching", "Gli score numerici prodotti dai singoli matcher dopo il confronto", "Le decisioni binarie accetta/rifiuta di ciascun sottosistema", "Le immagini grezze acquisite dai sensori prima dell'estrazione"], ans: 0, expl: "Fusione a livello feature = combinazione vettori prima del matching. Livello score = score post-matching. Livello decisione = decisioni binarie. Livello sensore = dati grezzi.", cat: "MULTI"},
  {q: "Nello Zoo di Doddington, le Goats sono utenti che generano un alto tasso di:", opts: ["False acceptance, perché il loro tratto è naturalmente simile a quello di altri", "False rejection, perché il loro tratto ha alta variabilità tra acquisizioni", "Spoofing, perché il loro tratto è facile da replicare con artefatti", "Failure to enroll, perché il sensore non riesce ad acquisire il loro tratto"], ans: 1, expl: "Goats = alta variabilità intraclasse → false rejection. Lambs = bassa distanza interclasse → false acceptance. Wolves = manipolazione attiva.", sel: true, cat: "ZOO"},
  {q: "Quale modulo in una CNN può annullare il gradiente per i valori negativi, semplificando l'apprendimento?", opts: ["Softmax", "Sigmoid", "Tanh", "ReLU"], ans: 3, expl: "La ReLU azzera i valori negativi (gradiente = 0 per input < 0), semplificando e velocizzando l'addestramento rispetto a Sigmoid e Tanh che soffrono di vanishing gradient.", sel: true, cat: "CNN"},
  {q: "In un'immagine binarizzata e scheletrizzata di un'impronta, un pixel nero è circondato da 7 pixel bianchi nel suo intorno 3×3. Questo corrisponde a:", opts: ["Un punto su un ridge normale", "Una biforcazione", "Una terminazione di cresta", "Un punto di massima curvatura del ridge"], ans: 2, expl: "In un intorno 3×3, un pixel nero con 7 bianchi significa un solo vicino nero → CN=1 → terminazione. CN=2 = ridge normale, CN=3 = biforcazione.", sel: true, cat: "IMPR"},
  {q: "In una CNN usata in biometria, negli strati finali le feature map vengono trasformate in un unico vettore monodimensionale. Questa operazione si chiama:", opts: ["Pooling", "Flatten", "Dropout", "Batch normalization"], ans: 1, expl: "Il flatten converte le feature map multidimensionali in un vettore 1D che viene poi passato agli strati fully connected finali per la classificazione o la generazione dell'embedding.", sel: true, cat: "CNN"},
  {q: "Il riconoscimento tramite iride pone seri problemi di privacy perché:", opts: ["L'IrisCode richiede troppa memoria per essere protetto con crittografia standard", "L'elevata accuratezza e la velocità del matching rendono possibile il tracciamento su larga scala", "Il pattern irideo cambia frequentemente rendendo necessario un re-enrollment continuo", "I sensori NIR danneggiano la retina con esposizioni ripetute nel tempo"], ans: 1, expl: "L'iride ha accuratezza altissima e il matching con Distanza di Hamming è estremamente veloce. Questo rende tecnicamente possibile il tracciamento massivo non consenziente.", sel: true, cat: "ITT"},
  {q: "In un filtraggio adattivo contestuale applicato alle impronte, il filtro:", opts: ["Usa parametri fissi calcolati una volta sull'intera immagine e poi applicati uniformemente", "Stima parametri locali da porzioni dell'immagine e adatta la maschera in base ad essi", "Applica una soglia globale di binarizzazione prima dell'estrazione delle minutiae", "Esegue un'equalizzazione dell'istogramma seguita da un filtro mediano fisso"], ans: 1, expl: "Il filtraggio adattivo contestuale stima parametri locali (orientamento e frequenza dei ridge) e adatta i parametri del filtro (es. Gabor) zona per zona.", sel: true, cat: "IMPR"},
  {q: "Un attaccante sonda un modello biometrico con input diversi per derivare proprietà dei dati di addestramento e identificare informazioni private degli utenti. Questo è un attacco di tipo:", opts: ["Evasione, perché modifica l'input per ingannare il classificatore", "Avvelenamento, perché corrompe i dati di addestramento del modello", "Estrazione, perché ricostruisce una copia funzionale del modello target", "Inferenza, perché inverte il flusso per acquisire dati privati non previsti"], ans: 3, expl: "I 4 tipi dal corso: Evasione (deployment), Avvelenamento (training), Estrazione (furto modello), Inferenza (dati privati).", sel: true, cat: "ATK"},
  {q: "Il FNMR alla soglia T si calcola come:", opts: ["FNMT / Totale confronti genuini", "FNMT / Totale confronti impostori", "FNMT × FMR / 100", "1 − FMR(T)"], ans: 0, expl: "FNMR(T) = numero di false non-match alla soglia T diviso il totale dei confronti genuini. Non è il complemento di FMR, sono calcolati su popolazioni diverse.", sel: true, cat: "POP"},
  {q: "Il FMR alla soglia T si calcola come:", opts: ["FM(T) diviso il totale dei confronti genuini", "FM(T) moltiplicato per il totale degli impostori", "FM(T) diviso il totale dei confronti impostori", "FM(T) sommato al totale dei confronti genuini"], ans: 2, expl: "FMR(T) = numero di false match alla soglia T diviso il totale dei confronti impostori. Il denominatore sono gli impostori, non i genuini.", sel: true, cat: "MET1"},
  {q: "Secondo la ISO/IEC 19795, la strategia di valutazione Technology prevede di:", opts: ["Testare gli algoritmi su database pubblici di campioni biometrici, senza coinvolgere utenti reali", "Allestire stanze con diverse tecnologie candidate provate da un gruppo ristretto di volontari", "Installare il sistema tarato nell'applicazione finale con utenti che firmano un consenso", "Pubblicare un bando tecnico ai produttori per raccogliere offerte economiche comparabili"], ans: 0, expl: "Technology evaluation = test algoritmici offline su dataset pubblici (es. FVC, NIST). Non si testa l'hardware né gli utenti reali, solo la bontà dell'algoritmo di matching. Scenario = stanze con volontari. Operational = sistema sul campo.", sel: true, cat: "MET2"},
  {q: "Nella curva DET, le applicazioni forensi nelle fasi iniziali di indagine si posizionano nella regione:", opts: ["Basso FNMR e alto FMR", "Alto FNMR e basso FMR", "FNMR e FMR entrambi medi, vicino all'EER", "FNMR e FMR entrambi bassi, vicino all'origine"], ans: 0, expl: "In forense non si vuole perdere nessun sospetto (FNMR basso). Si accettano molti falsi match (FMR alto) che l'esperto filtra manualmente.", sel: true, cat: "MET1"},
  {q: "Avendo M=2 immagini per individuo e N=100 individui, il numero di comparazioni genuine possibili è:", opts: ["200", "100", "400", "Non è possibile realizzare comparazioni genuine con solo 2 immagini"], ans: 1, expl: "Le comparazioni genuine confrontano immagini della stessa persona. Per calcolarle: prendi M immagini di un individuo e conta le coppie possibili con C(M,2). Esempio con M=4: le coppie sono 1-2, 1-3, 1-4, 2-3, 2-4, 3-4 = 6 coppie. Se hai N=100 individui con M=4, il totale genuine è 6 × 100 = 600. Nel nostro caso M=2: le coppie per persona sono C(2,2)=1 (solo la coppia 1-2). Quindi con N=100: 1 × 100 = 100 comparazioni genuine.", sel: true, cat: "MET1"},
  {q: "Le distribuzioni di Bernoulli sono utili per descrivere gli errori nei sistemi biometrici di autenticazione e identificazione:", opts: ["Falso, si applicano solo ai sistemi di identificazione 1:N", "Falso, si usano solo per modellare il Failure To Enroll", "Vero, descrivono la probabilità di errore per singolo confronto", "Vero, ma solo se il sistema opera alla soglia EER"], ans: 2, expl: "Il processo di Bernoulli B(n,p) modella gli errori sia in autenticazione sia in identificazione: ogni confronto ha probabilità p di errore.", sel: true, cat: "CNN"},
  {q: "Quale tecnica di difesa migliora la robustezza di un modello biometrico agli attacchi avversari?", opts: ["Aumentare il numero di parametri addestrabili nel modello", "Inserire esempi avversari nei dati di addestramento per correggere le vulnerabilità", "Aumentare il numero di strati nascosti mantenendo gli stessi dati di training", "Addestrare esclusivamente su dataset molto ampi senza alcuna augmentation"], ans: 1, expl: "L'addestramento avversario (adversarial training) inserisce esempi perturbati nel training set, costringendo il modello a imparare a riconoscerli e resistere.", sel: true, cat: "ATK"},
  {q: "La relazione tra la curva ROC e la curva DET è:", opts: ["ROC è il complemento aritmetico di DET, quindi ROC = 1 − DET", "Non esiste alcuna relazione matematica tra le due curve", "Contengono le stesse informazioni con rappresentazione grafica diversa", "ROC è più informativa perché include anche il tasso di Failure To Enroll"], ans: 2, expl: "ROC e DET mostrano le stesse informazioni (FMR vs FNMR) con rappresentazioni grafiche diverse. La DET usa scala logaritmica/deviazione normale, la ROC scala lineare.", sel: true, cat: "MET1"},
  {q: "Le soluzioni di protezione della privacy mediante crittosistemi biometrici sono tipicamente realizzate come:", opts: ["Crittazione tradizionale a chiave asimmetrica applicata direttamente al template grezzo", "Conversione del template mediante funzione di hash crittografico irreversibile", "Sistemi di key binding o key generation che legano una chiave crittografica al tratto biometrico", "Isolamento fisico del template su server air-gapped senza alcuna trasformazione matematica"], ans: 2, expl: "I crittosistemi biometrici si dividono in key binding (chiave legata al template tramite helper data) e key generation (chiave derivata dal tratto). Non usano hash né crittazione tradizionale.", sel: true, cat: "ITT"},
  {q: "Il wobble (jello effect) nei sensori CMOS è causato da:", opts: ["Il campionamento riga per riga che, con movimento della camera, deforma l'immagine come gelatina", "La differenza di sensibilità tra pixel adiacenti che crea bande orizzontali nell'immagine", "L'interferenza tra la frequenza del sensore e la frequenza della luce artificiale ambientale", "La saturazione dei pixel nella zona centrale del sensore durante esposizioni lunghe"], ans: 0, expl: "Il rolling shutter legge riga per riga. Se la camera si muove durante la lettura, righe diverse vedono posizioni diverse → effetto gelatina/wobble.", sel: true, cat: "SENS"},
  {q: "La skew nel contesto del rolling shutter è:", opts: ["L'immagine si piega in diagonale quando fotocamera o soggetto si spostano lateralmente", "I pixel verticali vengono campionati violando il teorema del campionamento per movimento troppo rapido", "L'immagine presenta bande orizzontali di luminosità alternata causate da luce fluorescente", "L'immagine risulta sfocata uniformemente per vibrazione ad alta frequenza del sensore"], ans: 0, expl: "La skew è la storta: l'immagine si inclina in diagonale perché righe successive vengono lette in momenti diversi mentre il soggetto o la camera si muovono lateralmente.", sel: true, cat: "SENS"},
  {q: "Quale applicazione di sicurezza richiede il frame rate più elevato nel sistema di visione?", opts: ["Monitoraggio di un parcheggio per rilevare veicoli in sosta", "Riconoscimento facciale di persone in coda a un varco", "Lettura delle targhe di veicoli in transito in videosorveglianza", "Controllo accessi biometrico con impronta a contatto"], ans: 2, expl: "La lettura targhe richiede il frame rate più alto perché i veicoli passano a velocità elevata e il sistema deve catturare un'immagine nitida della targa in movimento.", sel: true, cat: "IMPR"},
  {q: "Il Moiré pattern in un sensore biometrico si verifica quando:", opts: ["La scena contiene dettagli ripetitivi che superano la risoluzione del sensore causando artefatti visivi", "Il flash si attiva solo per una parte del tempo di esposizione creando bande di illuminazione", "Il sensore satura per sovraesposizione creando aloni bianchi attorno ai bordi dell'oggetto", "La lente introduce distorsione radiale ai bordi dell'immagine deformando le linee rette"], ans: 0, expl: "Il Moiré è un artefatto che si genera quando pattern ripetitivi nella scena (linee, griglie) hanno frequenza spaziale vicina o superiore alla risoluzione del sensore.", sel: true, cat: "MET2"},
  {q: "I sistemi Match-on-Card per impronte su smart card sono ancora in fase di prototipazione e non disponibili commercialmente:", opts: ["Vero, nessun sistema MoC è ancora certificato per l'uso commerciale", "Vero, la tecnologia esiste ma le card non supportano il matching on-board", "Falso, sono già presenti sul mercato in programmi come Mastercard Biometric Checkout", "Falso, ma solo per applicazioni governative e non per pagamenti commerciali"], ans: 2, expl: "Il materiale del corso presenta il programma Mastercard Global Biometric Checkout con sensori ultrasottili, Secure Element e contactless. Sono già sul mercato.", sel: true, cat: "IMPR"},
  {q: "Il sistema AFIS italiano realizza funzioni di identificazione:", opts: ["Solo preventiva, per il controllo dei precedenti penali", "Solo giudiziaria, per la raccolta delle prove in tribunale", "Sia preventiva sia giudiziaria, coprendo entrambi gli ambiti", "Né preventiva né giudiziaria, solo per il rilascio dei documenti"], ans: 2, expl: "L'AFIS italiano svolge sia funzione preventiva (schedatura, controllo precedenti) sia giudiziaria (identificazione da tracce sulla scena del crimine).", sel: true, cat: "IMPR"},
  {q: "Su un sensore CMOS, un'illuminazione improvvisa o sfarfallante causa principalmente:", opts: ["Spatial aliasing per battimento tra griglia pixel e pattern della scena", "Temporal aliasing perché la luce varia a frequenza simile al frame rate del sensore", "Wobble/jello effect per deformazione geometrica dell'immagine", "Moiré pattern per interferenza tra frequenze spaziali della scena e del sensore"], ans: 1, expl: "Luce fluorescente o flash parziale durante l'esposizione rolling shutter → temporal aliasing. Lo spatial aliasing è un problema spaziale (griglia pixel vs pattern scena).", sel: true, cat: "SENS"},
  {q: "Un sistema AFIS nazionale tipicamente contiene immagini dell'iride:", opts: ["Vero, i sistemi AFIS moderni integrano sia impronte sia iridi nello stesso database", "Vero, ma solo per i soggetti classificati ad alto rischio di recidiva criminale", "Falso, l'AFIS contiene esclusivamente dati relativi alle impronte digitali", "Falso, l'AFIS contiene impronte e volti ma non iridi né altre biometrie"], ans: 2, expl: "AFIS = Automated Fingerprint Identification System. Contiene impronte digitali, non immagini iridee. L'iride è gestita da sistemi separati.", sel: true, cat: "IRIDE"},
  {q: "Un criminale combina il movimento del proprio volto con l'aspetto del volto di un'altra persona per creare un video sintetico. Questa tecnica si chiama:", opts: ["Face reenactment, manipolazione delle espressioni", "Talking face generation, sintesi audio-visiva", "Face swap, sostituzione dell'identità facciale", "Facial attribute editing, modifica di singoli tratti"], ans: 2, expl: "Face swap = sostituzione dell'identità del volto combinando aspetto di una persona con movimento/posa di un'altra. Face reenactment = stessa identità, espressioni manipolate.", sel: true, cat: "DEEP"},
  {q: "Le tecniche di protezione della privacy del template basate su feature transformation o biocrittazione:", opts: ["Partono dalla crittazione tradizionale a chiave asimmetrica e operano nel dominio crittato", "Si basano esclusivamente su funzioni di hash applicate al template grezzo", "Non possono usare crittazione tradizionale perché questa impedisce il calcolo delle distanze per il matching", "Richiedono l'isolamento fisico del server senza alcuna trasformazione matematica del template"], ans: 2, expl: "La crittazione tradizionale distrugge la geometria del template impedendo il matching. Le feature transformation (es. salting, biometria cancellabile) e la biocrittazione (key binding/generation) risolvono questo problema.", sel: true, cat: "ITT"},
  {q: "Le feature biometriche estratte dalla voce per l'identificazione vengono tipicamente ricavate:", opts: ["Analizzando l'energia del segnale in particolari bande dello spettro sonoro", "Misurando la frequenza fondamentale e solo quella del parlato continuo", "Confrontando la forma d'onda grezza con un database di template audio campione", "Estraendo le pause tra le parole e la velocità di eloquio come unici parametri"], ans: 0, expl: "Le feature vocali (es. MFCC) analizzano l'energia in bande specifiche dello spettro, catturando le caratteristiche del tratto vocale del parlante.", sel: true, cat: "VOCE"},
  {q: "La tecnica di Direct Gray Extraction si applica:", opts: ["Solo a immagini di impronte digitali a colori per separare i canali cromatici", "A tutte le biometrie basate su immagini per la normalizzazione del contrasto", "Alle impronte digitali in toni di grigio per estrarre le minutiae direttamente", "Solo alle immagini binarizzate dopo la fase di scheletrizzazione"], ans: 2, expl: "La Direct Gray Extraction lavora direttamente sull'immagine in scala di grigi dell'impronta per trovare le minutiae, senza passare per binarizzazione e scheletrizzazione.", sel: true, cat: "IMPR"},
  {q: "Per una maggiore nitidezza dei ridge di palmi e impronte senza contatto, la luce più efficace è:", opts: ["Luce verde a banda stretta", "Luce infrarossa NIR standard", "Luce ultravioletta a onda corta", "Luce bianca a banda larga"], ans: 0, expl: "La luce verde aumenta il contrasto dei ridge nelle acquisizioni contactless perché viene assorbita in modo diverso dalla pelle nelle zone di cresta rispetto alle valli.", sel: true, cat: "IMPR"},
  {q: "La tecnica Fingercoding per l'estrazione di feature dalle impronte digitali opera a:", opts: ["Livello 1", "Livello 2", "Livello 3", "Su più livelli contemporaneamente"], ans: 0, expl: "Fingercoding (FingerCode) usa filtri di Gabor sull'immagine globale dell'impronta per creare un descrittore compatto. Opera a Livello 1 (globale), non a livello delle singole minutiae (Livello 2).", sel: true, cat: "ITT"},
  {q: "Un sistema di videosorveglianza aeroportuale controlla se un individuo appartiene a una lista di persone potenzialmente terroriste. Si tratta di:", opts: ["Autenticazione positiva", "Identificazione positiva", "Identificazione negativa", "Autenticazione negativa"], ans: 1, expl: "Il sistema confronta il volto con una watchlist per verificare se la persona è tra i soggetti ricercati → identificazione positiva 1:N.", sel: true, cat: "VOLTO"},
  {q: "Nell'Inverse Turing Test la macchina deve determinare:", opts: ["Se un umano è in grado di distinguere due macchine diverse", "Se l'interlocutore è un umano o un bot, senza identificarne l'identità", "Quale specifico utente sta interagendo tra quelli registrati nel sistema", "Se il contenuto multimediale presentato è autentico o generato artificialmente"], ans: 1, expl: "ITT = cosa sei? (umano o bot), non chi sei?. È classificazione binaria: P(umano|X) > T. Non va confuso con la Deepfake Detection che analizza i media.", sel: true, cat: "ITT"},
  {q: "La differenza fondamentale tra il Turing Test classico (1950) e l'Inverse Turing Test è:", opts: ["Nel classico un umano valuta se parla con una macchina; nell'ITT la macchina valuta se interagisce con un umano", "Nel classico la macchina valuta l'umano; nell'ITT un umano valuta se la macchina è intelligente", "Il classico si applica al testo scritto e alla conversazione; l'ITT si applica solo alla biometria vocale", "Non c'è alcuna differenza sostanziale: sono due nomi diversi usati per lo stesso identico concetto"], ans: 0, expl: "Turing Test (1950) = un umano giudica se parla con un umano o una macchina. ITT = la macchina giudica se interagisce con un umano o un bot.", sel: true, cat: "ITT"},
  {q: "Il passaggio dai CAPTCHA visivi classici ai test comportamentali è avvenuto perché:", opts: ["I CAPTCHA visivi richiedevano troppa banda di rete per caricare le immagini", "Gli utenti li trovavano troppo lenti e li abbandonavano prima del completamento", "Le CNN e i Vision Transformer riescono a risolvere i puzzle visivi aggirando il test", "Le normative sulla privacy hanno vietato l'uso di immagini nei sistemi di verifica"], ans: 2, expl: "Con l'avanzamento di CNN e Vision Transformer, molti CAPTCHA visivi sono diventati aggirabili. Per questo si è passati a test comportamentali dove conta come ti comporti, non il puzzle.", sel: true, cat: "ITT"},
  {q: "L'ITT può essere formalizzato come un problema di classificazione binaria dove:", opts: ["P(umano|X) > T, con X = osservazioni comportamentali e T = soglia di decisione", "P(identità|X) > T, con X = template biometrico e T = soglia FAR", "P(deepfake|X) > T, con X = frame video e T = soglia di confidenza della rete", "P(spoofing|X) > T, con X = immagine del sensore e T = soglia PAD"], ans: 0, expl: "L'ITT risponde a umano o bot? con P(umano|X) > T. Non identifica chi sei (biometria classica), non valuta se un media è sintetico (deepfake detection), non rileva artefatti al sensore (PAD).", sel: true, cat: "ITT"},
  {q: "Secondo ISO 30107, i livelli di Presentation Attack Instrument sono classificati per:", opts: ["Costo e realismo dell'artefatto: Level 1/A, Level 2/B, Level 3/C", "Modalità biometrica attaccata: Level 1 impronte, Level 2 volto, Level 3 iride", "Numero di tentativi effettuati: Level 1 singolo, Level 2 ripetuti, Level 3 coordinati", "Canale del sistema attaccato: Level 1 sensore, Level 2 comunicazione, Level 3 database"], ans: 0, expl: "Level 1/A = foto, video, maschere di carta. Level 2/B = maschere in resina/lattice/silicone sotto $300. Level 3/C = maschere su misura ultra-realistiche fino a $3000.", sel: true, cat: "ATK"},
  {q: "Un dipendente appoggia il dito su un lettore e dichiara il proprio ID per accedere al terminale aziendale. Il sistema confronta l'impronta con il template associato a quell'ID. Si tratta di:", opts: ["Identificazione positiva 1:N", "Autenticazione 1:1", "Identificazione negativa", "Screening biometrico passivo"], ans: 1, expl: "L'utente dichiara la propria identità (identity claim) e il sistema verifica confrontando 1:1 con il template associato. È autenticazione/verifica.", sel: true, cat: "IMPR"},
  {q: "In una CNN, se si applica un Max-Pooling 2×2 con stride 2 a una feature map di dimensione 16×16, la dimensione dell'output sarà:", opts: ["8×8", "16×16", "4×4", "32×32"], ans: 0, expl: "Max-Pooling 2×2 con stride 2 dimezza entrambe le dimensioni: 16/2 = 8. La feature map passa da 16×16 a 8×8.", sel: true, cat: "CNN"},
  {q: "La Regola del 3 in biometria stabilisce che per affermare con il 95% di confidenza che il tasso di errore è inferiore a p, servono almeno:", opts: ["3/p test indipendenti", "3×p test indipendenti", "30/p test indipendenti", "p/3 test indipendenti"], ans: 0, expl: "Regola del 3: N ≥ 3/p per stimare un tasso p con confidenza 95%. Per stimare un FAR di 10⁻⁶ servono almeno 3.000.000 di confronti impostori.", cat: "MET1"},
  {q: "La distanza di Hamming tra due IrisCode A e B con maschere MA e MB si calcola come:", opts: ["(A XOR B) AND MA AND MB, diviso il numero di bit dove entrambe le maschere valgono 1", "(A AND B) diviso il numero totale di bit di A", "(A XOR B) diviso il numero totale di bit di A senza considerare le maschere", "(A OR B) AND MA AND MB, diviso il numero di bit dove almeno una maschera vale 1"], ans: 0, expl: "XOR trova i bit diversi tra i due codici. AND con le maschere esclude i bit non validi (occlusioni, riflessi). Si divide per il numero di bit validi in comune (dove entrambe le maschere valgono 1).", sel: true, cat: "IRIDE"},
  {q: "Il modulo di quality assessment in un sistema biometrico serve a:", opts: ["Valutare la qualità del campione e decidere se accettarlo o richiederne uno nuovo", "Confrontare il template acquisito con il database e restituire uno score di matching", "Crittografare il template prima della sua memorizzazione permanente nel database centrale", "Normalizzare gli score provenienti da matcher diversi in un sistema biometrico multimodale"], ans: 0, expl: "Il quality checker valuta il campione acquisito (illuminazione, risoluzione, nitidezza, posizione). Se la qualità è sotto soglia, chiede una nuova acquisizione prima di procedere all'estrazione.", cat: "ITT"},
  {q: "L'analisi di un singolo frame per rilevare un deepfake può basarsi su:", opts: ["Transizioni di colore nette ai bordi del volto, artefatti negli accessori e incongruenze nello sfondo", "Assenza del segnale pulsatile del sangue nella pelle del soggetto inquadrato", "Analisi del flusso ottico tra frame consecutivi per rilevare movimenti innaturali", "Verifica della sincronia tra audio del parlato e movimento delle labbra nel video"], ans: 0, expl: "Su singolo frame: transizioni di colore ai bordi (face swap), artefatti negli occhiali, sfondo incoerente (StyleGAN), aspetto innaturale degli occhi. rPPG e flusso ottico richiedono video.", cat: "DEEP"},
  {q: "La deepfake detection su video senza audio sfrutta:", opts: ["La pletismografia remota e il flusso ottico per rilevare l'assenza di segnali biologici", "L'analisi spettrale della voce per verificare la coerenza con il movimento labiale", "Il confronto del template facciale con un database di identità note", "La verifica della firma digitale del file video tramite standard C2PA"], ans: 0, expl: "Su video senza audio: rPPG (micro-variazioni colore della pelle = battito cardiaco) e flusso ottico (variazioni non conformi a un volto reale). L'audio richiede analisi aggiuntive.", cat: "DEEP"},
  {q: "Un e-Passport conforme agli standard ICAO contiene:", opts: ["Un chip RFID con dati biometrici del titolare accessibili tramite protocolli di sicurezza", "Solo una foto stampata sulla pagina dati senza alcun componente elettronico", "Un sensore di impronte integrato nella copertina per autenticazione on-the-spot", "Una smart card rimovibile con motore di matching biometrico integrato"], ans: 0, expl: "L'e-Passport ICAO contiene un chip RFID con la foto del volto e facoltativamente impronte e iride. L'accesso è protetto da protocolli come BAC/PACE e RBAC/EAC.", cat: "IRIDE"},
  {q: "Un morphing attack sui documenti di identità consiste nel:", opts: ["Fondere due volti diversi in un'unica immagine che superi il matching con entrambi i soggetti", "Sostituire il chip RFID dell'e-Passport con uno programmato con dati falsi", "Presentare una maschera 3D realistica al sensore per superare la liveness detection", "Iniettare un template sintetico nel canale di comunicazione tra sensore e database"], ans: 0, expl: "Il morphing fonde il volto di due persone creando un'immagine che assomiglia abbastanza a entrambi. Se usata nel documento, entrambi possono superare il controllo facciale.", cat: "DEEP"},
