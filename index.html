  {q: "Le lenti asferiche nei sistemi biometrici sono vantaggiose perché:", opts: ["Possono sostituire un sistema multi-lente riducendo ingombro e costo del dispositivo", "Necessitano di rivestimenti anti-riflesso più complessi rispetto alle sferiche tradizionali", "Sono compatibili esclusivamente con sensori CCD ad alta risoluzione nativa", "Eliminano completamente la necessità di calibrazione del sistema ottico finale"], ans: 0, expl: "Nel materiale del corso: una singola lente asferica può rimpiazzare un sistema molto più complesso multi-lente. Il dispositivo risultante è più piccolo, leggero e meno costoso.", cat: "SENS"},
  {q: "Le lenti liquide utilizzate in biometria funzionano grazie a:", opts: ["Un gel fotosensibile che cambia indice di rifrazione se esposto a luce NIR", "Un cristallo piezoelettrico che modifica fisicamente la curvatura della lente", "Un sistema di micro-pompe che regola lo spessore del fluido nella cavità ottica", "Due fluidi isodensi la cui curvatura cambia in base alla tensione elettrica applicata"], ans: 3, expl: "Nel materiale: obiettivo con due fluidi isodensi che modificano la curvatura a seconda della tensione elettrica, risolvendo la messa a fuoco in ottiche piccole.", cat: "SENS"},
  {q: "Per correggere l'aberrazione sferica in un sistema ottico biometrico si può:", opts: ["Aumentare i bit per pixel del sensore e applicare deconvoluzione software al frame", "Sostituire il sensore CMOS con un CCD a global shutter di pari risoluzione nativa", "Chiudere il diaframma, inserire lenti correttive o utilizzare lenti asferiche", "Applicare filtri anti-aliasing digitali in post-elaborazione sul frame acquisito finale"], ans: 2, expl: "Dal materiale: A) chiudendo il diaframma, B) inserendo lenti correttive, C) usando lenti asferiche.", cat: "SENS"},
  {q: "La differenza fondamentale tra zoom ottico e zoom digitale è che:", opts: ["Lo zoom ottico funziona esclusivamente con focali fisse mentre il digitale è continuo", "Lo zoom digitale produce immagini più nitide grazie all'interpolazione sub-pixel avanzata", "Lo zoom ottico richiede sensori CCD mentre il digitale funziona solo su sensori CMOS", "Lo zoom ottico modifica la focale aggiungendo informazione reale all'immagine catturata"], ans: 3, expl: "Lo zoom ottico ingrandisce realmente modificando la focale. Lo zoom digitale scala l'immagine senza aggiungere informazione.", cat: "SENS"},
  {q: "Chiudere il diaframma di un sistema ottico biometrico comporta:", opts: ["Solo un aumento della profondità di campo senza ulteriori effetti sul sistema ottico", "Una riduzione della profondità di campo con miglioramento della nitidezza al centro", "Più profondità di campo, meno luce entrante e riduzione dell'aberrazione sferica", "Solo una riduzione della luce entrante senza effetti sulla profondità di campo acquisita"], ans: 2, expl: "Chiudere il diaframma: 1) aumenta profondità di campo, 2) riduce la luce entrante, 3) riduce l'aberrazione sferica usando solo la parte centrale dell'ottica.", cat: "SENS"},
  {q: "Per la videosorveglianza biometrica (es. riconoscimento volto) la focale necessaria è:", opts: ["Molto più corta della VS classica per catturare il maggior numero di soggetti possibile", "Uguale o leggermente maggiore rispetto a un sistema di videosorveglianza classica", "Almeno 200 mm per ottenere un ingrandimento sufficiente del tratto biometrico facciale", "Irrilevante, poiché lo zoom digitale compensa qualsiasi scelta di focale iniziale"], ans: 1, expl: "Un sistema di VS biometrica necessita di una focale uguale o leggermente maggiore rispetto a un normale sistema di VS.", cat: "SENS"},
  {q: "La selezione del ROI (Region of Interest) nel sensore migliora le prestazioni perché:", opts: ["Aumenta automaticamente la risoluzione del sensore nell'area selezionata dal sistema", "Attiva l'interpolazione sub-pixel esclusivamente nella regione di interesse selezionata", "Riduce il rumore termico concentrando la dissipazione su un numero minore di fotodiodi", "Riduce i dati da elaborare, aumentando framerate e velocità degli algoritmi di analisi"], ans: 3, expl: "ROI: più framerate, meno errori di processing, algoritmi più veloci. Si parte da sensore CMOS alta risoluzione e si imposta il ROI in base a inquadratura e funzione.", cat: "SENS"},
  {q: "L'architettura VGG16 è nota nella biometria per:", opts: ["Utilizzare kernel convoluzionali molto grandi (11×11) per catturare pattern globali", "Operare esclusivamente su immagini in scala di grigi senza alcun supporto per il colore", "Essere la prima rete ad eliminare completamente gli strati fully-connected finali", "Essere una rete a 16 strati di peso che usa filtri piccoli 3×3 ripetuti in sequenza"], ans: 3, expl: "VGG16: 16 strati di peso, usa filtri piccoli 3×3 ripetuti. Approccio opposto ad AlexNet (che usava kernel grandi 11×11).", cat: "CNN"},
  {q: "Il modello Haar Cascade (Viola-Jones) in biometria viene usato per:", opts: ["La detection di volti nelle immagini come primo passo della catena di elaborazione", "La generazione di template biometrici robusti a variazioni di illuminazione ambientale", "Il riconoscimento dell'identità del soggetto tramite confronto diretto con il database", "La compressione lossy dei template facciali per ridurre lo spazio occupato nel database"], ans: 0, expl: "Haar Cascade (Viola-Jones): modello di ML non-deep per la face detection. È il primo passo nella catena di elaborazione biometrica del volto.", cat: "CNN"},
  {q: "Il modello del neurone artificiale (perceptron) funziona calcolando:", opts: ["Il prodotto tensoriale degli input e selezionando il valore massimo risultante ottenuto", "La trasformata di Fourier degli input per estrarre le componenti frequenziali dominanti", "La somma ponderata dei segnali in ingresso e confrontando il risultato con una soglia", "La distanza euclidea tra il vettore di input e un prototipo di riferimento memorizzato"], ans: 2, expl: "Il neurone calcola la somma ponderata dei segnali in ingresso e confronta il risultato con una soglia. Se supera la soglia, si attiva.", cat: "CNN"},
  {q: "L'overfitting in un modello di ML biometrico si verifica quando:", opts: ["Il dataset di training contiene un numero eccessivo di classi da discriminare correttamente", "La funzione di costo converge troppo lentamente durante la fase di ottimizzazione dei pesi", "Il modello ha troppo pochi parametri per rappresentare la complessità reale del problema", "Il modello si adatta troppo ai dati di training e generalizza male su dati nuovi non visti"], ans: 3, expl: "Overfitting: il modello è troppo strettamente adattato ai dati di training, alta precisione sui casi noti ma si comporta male con dati non visti.", cat: "CNN"},
  {q: "Le soft biometrics (altezza, genere, età, colore dei capelli) in un sistema biometrico:", opts: ["Vengono acquisite esclusivamente da sensori dedicati separati dal sistema principale", "Sono utilizzabili solo in sistemi di identificazione negativa e non per la verifica 1:1", "Non possiedono tutte le 7 proprietà ma possono essere usate in aggiunta ai primari", "Possiedono tutte le 7 proprietà del tratto biometrico e possono sostituire i primari"], ans: 2, expl: "Le soft biometrics non possiedono tutte le 7 caratteristiche necessarie ma possono essere usate in aggiunta (genere, colore pelle/capelli/occhi, peso, altezza).", cat: "MULTI"},
  {q: "L'integrazione delle soft biometrics nel sistema biometrico avviene correttamente:", opts: ["In sostituzione del modulo di matching primario per ridurre la complessità del sistema", "A valle del modulo biometrico primario, come informazione aggiuntiva allo score", "Esclusivamente a livello di fusione delle feature prima dell'estrazione del template", "A monte del sensore per filtrare i soggetti prima dell'acquisizione del tratto principale"], ans: 1, expl: "L'integrazione corretta delle soft-biometrics è a valle del modulo biometrico primario.", cat: "MULTI"},
  {q: "Un vantaggio del gait recognition rispetto ad altri tratti biometrici è che:", opts: ["Raggiunge un'accuratezza superiore al riconoscimento facciale in ogni condizione operativa", "È completamente invariante rispetto all'abbigliamento e alle condizioni fisiche del soggetto", "Non richiede alcun algoritmo di elaborazione essendo direttamente confrontabile visivamente", "Il pattern della camminata si estrae da video acquisibili a distanza con telecamere normali"], ans: 3, expl: "Il gait pattern può essere estratto da frame sequences acquisite a distanza e con telecamere di bassa qualità, estraendo la silhouette dell'individuo.", cat: "SENS"},
  {q: "Speech recognition e speaker recognition sono:", opts: ["La stessa tecnologia applicata a contesti operativi diversi con gli stessi algoritmi base", "Due nomi diversi per la stessa funzione di autenticazione vocale biometrica del parlante", "Due task diversi: il primo riconosce cosa viene detto, il secondo chi lo sta dicendo", "Entrambi sistemi di identificazione biometrica basati sulle stesse feature spettrali MFCC"], ans: 2, expl: "Speech Recognition: riconosce ciò che viene detto. Speaker Recognition: riconosce l'identità della persona che parla. Task diversi con metodi diversi.", cat: "VOCE"},
  {q: "Esistono sistemi biometrici multimodali integrati su scala nazionale:", opts: ["No, la complessità infrastrutturale li rende irrealizzabili su larga scala attualmente", "Solo in fase prototipale in laboratori di ricerca universitari europei selezionati", "Solo per applicazioni militari e di intelligence con livello di accesso classificato", "Sì, sono stati implementati in diversi paesi per applicazioni di identità civile"], ans: 3, expl: "Esistono sistemi multimodali integrati su scala nazionale per applicazioni di identità civile.", cat: "MULTI"},
  {q: "L'impronta contactless (senza contatto) rispetto a quella a contatto:", opts: ["Elimina le deformazioni elastiche e consente l'osservazione di core, ridge e minutiae", "Non permette di osservare alcuna minutia a causa della distanza tra dito e sensore", "Richiede sempre illuminazione a infrarosso lontano per penetrare sotto la superficie", "Produce template incompatibili con i database AFIS esistenti per impronte a contatto"], ans: 0, expl: "L'impronta contactless elimina le deformazioni elastiche del dito. Si possono osservare: core visibile, direzione ridge, fine riga e biforcazioni.", cat: "IMPR"},
  {q: "Un sistema AFIS moderno è in grado di raggiungere:", opts: ["Non più di 10.000 comparazioni al secondo per la complessità del matching minutiae", "Circa 100 milioni di comparazioni di impronte al secondo in condizioni operative", "Circa 1 milione di comparazioni di impronte al secondo in condizioni operative", "Velocità variabile dipendente esclusivamente dalla larghezza di banda della rete"], ans: 1, expl: "Un sistema AFIS moderno raggiunge circa 100 milioni di comparazioni al secondo.", cat: "IMPR"},
  {q: "Nel sistema WorldCoin, il dispositivo Orb esegue:", opts: ["Una scansione facciale 2D confrontata con un database governativo centralizzato", "Un test comportamentale basato sul movimento degli occhi durante la lettura di un testo", "Una scansione dell'iride con liveness detection e generazione di un IrisCode su blockchain", "Un'acquisizione dell'impronta digitale tramite sensore capacitivo integrato nel dispositivo"], ans: 2, expl: "WorldCoin/World ID: l'Orb esegue scansione biometrica dell'iride, genera un IrisCode memorizzato su blockchain, con liveness detection (infrarosso, sensing 3D, micro-dettagli).", cat: "POP"},
  {q: "Tra gli usi legittimi dei deepfake riconosciuti nel materiale del corso ci sono:", opts: ["Sostituzione completa degli attori umani nella produzione di contenuti pubblicitari", "Data augmentation, test di sistemi anti-spoofing e correzione del contatto visivo", "Generazione automatica di documenti d'identità per rifugiati senza documenti validi", "Esclusivamente applicazioni di intrattenimento cinematografico con attori deceduti"], ans: 1, expl: "Usi legittimi dei deepfake: intrattenimento, data augmentation, test di sistemi anti-spoofing, correzione del contatto visivo (es. NVIDIA Eye Contact).", cat: "DEEP"},
  {q: "L'accuratezza media degli esseri umani nel riconoscere deepfake moderni di alta qualità:", opts: ["Supera il 95%, poiché l'occhio umano coglie facilmente ogni artefatto impercettibile", "È circa dell'80%, superiore a qualsiasi sistema automatico attualmente disponibile", "Varia dal 50 al 65%, spesso vicina al caso per deepfake di alta qualità prodotti", "È inferiore al 30%, rendendo gli umani completamente inadatti a questo tipo di compito"], ans: 2, expl: "L'accuratezza media umana nel riconoscere deepfake moderni varia dal 50 al 65%, spesso vicina al caso per deepfake di alta qualità.", cat: "DEEP"},
  {q: "I 4 livelli di privacy biometrica descritti nel corso partono da:", opts: ["Template cifrato, template in chiaro, template distribuito, template eliminato dal sistema", "Consenso esplicito, consenso implicito, obbligo legale, interesse vitale dell'utente finale", "Livello hardware, livello software, livello rete, livello utente del sistema biometrico", "Applicazioni privacy-protective fino ad applicazioni che compromettono la privacy"], ans: 3, expl: "4 livelli di privacy biometrica: dal livello 1 (privacy-protective) al livello 4 (applicazioni che compromettono la privacy).", cat: "PRIV"},
  {q: "La raccolta dati (data collection) in un sistema biometrico rispetto alla privacy:", opts: ["Non incide sulla privacy se i dati biometrici restano esclusivamente sul dispositivo locale", "Incide sulla privacy dell'utente indipendentemente dalla modalità di memorizzazione", "È neutra dal punto di vista della privacy se il sistema opera in modalità verifica 1:1", "Rappresenta un rischio solo per sistemi con database centralizzati oltre 10.000 utenti"], ans: 1, expl: "La data collection incide sulla privacy dell'utente indipendentemente da come vengono memorizzati i dati.", cat: "PRIV"},
  {q: "La differenza tra trasformazione non invertibile e salting nella protezione dei template è:", opts: ["Il salting è non invertibile mentre la trasformazione non invertibile è reversibile con chiave", "Entrambi usano funzioni non invertibili ma il salting opera nel dominio cifrato del template", "Il salting non dipende da alcuna chiave mentre la non invertibile richiede una chiave pubblica", "Il salting usa una funzione invertibile con chiave, la trasformazione non invertibile è one-way"], ans: 3, expl: "Salting (bio-hashing): la funzione è invertibile, la sicurezza dipende dalla chiave. Trasformazione non invertibile: funzione one-way, anche con la chiave non si risale al template.", cat: "PRIV"},
  {q: "Nello Zoo di Doddington, le Pecore (Sheep) sono utenti caratterizzati da:", opts: ["Feature molto distintive e bassa variabilità, con bassi tassi sia di FM che di FNM", "Alta variabilità intraclasse che causa numerosi falsi rifiuti al sistema biometrico", "Bassa distanza interclasse che li rende facilmente confondibili con altri utenti registrati", "Capacità di manipolare il tratto biometrico per impersonare attivamente altri soggetti"], ans: 0, expl: "Sheep: utenti con features molto distintive e bassa variabilità intraclasse → bassi FMR e FNMR. Sono gli utenti ideali.", cat: "ZOO"},
  {q: "La distribuzione di Sheep, Goats, Lambs e Wolves nella popolazione degli utenti:", opts: ["È uniforme e prevedibile, con percentuali fisse in ogni popolazione biometrica testata", "Dipende esclusivamente dal tipo di sensore utilizzato e non dalla popolazione stessa", "Influenza la dimensione del test necessaria e la stima dell'affidabilità del sistema", "È rilevante solo per sistemi di identificazione e mai per quelli di verifica biometrica"], ans: 2, expl: "La distribuzione di Sheep, Goats, Lambs e Wolves nella popolazione influenza la dimensione del test necessaria e la stima dell'affidabilità.", cat: "ZOO"},
  {q: "Per la videosorveglianza grandangolare si utilizzano focali:", opts: ["Inferiori o uguali a 20 mm, che permettono FOV fino a 180° per coprire ampie aree", "Superiori a 200 mm per catturare dettagli a grande distanza dal soggetto inquadrato", "Comprese tra 50 e 100 mm per bilanciare copertura dell'area e risoluzione del dettaglio", "Fisse a 35 mm che replicano esattamente il campo visivo dell'occhio umano binoculare"], ans: 0, expl: "Con focali basse (≤20 mm) si raggiungono FOV di 180°. In videosorveglianza si usano per coprire ampie aree come corridoi e incroci.", cat: "SENS"},
  {q: "La correzione del contatto visivo (es. NVIDIA Eye Contact) è un esempio di:", opts: ["Sistema anti-spoofing che verifica la direzione dello sguardo per la liveness detection", "Algoritmo di tracking oculare per l'autenticazione biometrica basata sullo sguardo", "Uso legittimo della tecnologia deepfake per migliorare le videoconferenze a distanza", "Tecnica forense per rilevare la manipolazione dei video nelle indagini giudiziarie"], ans: 2, expl: "NVIDIA Eye Contact: uso legittimo della tecnologia deepfake per correggere il contatto visivo nelle videoconferenze.", cat: "DEEP"},
  {q: "La tecnica rPPG (remote photoplethysmography) applicata alla deepfake detection funziona:", opts: ["Rilevando micro-variazioni di colore della pelle sincronizzate con il battito cardiaco, assenti nei video sintetici", "Misurando la distanza interpupillare per verificare la coerenza tridimensionale del volto", "Analizzando la frequenza di battito delle palpebre confrontandola con modelli statistici", "Confrontando lo spettro audio della voce con il movimento labiale per verificare la sincronia"], ans: 0, expl: "La rPPG rileva il segnale pulsatile del sangue attraverso micro-variazioni di colore della pelle. Nei deepfake questo segnale biologico è assente. Intel FakeCatcher si basa su rPPG + eye gaze detection.", sel: true, cat: "DEEP"},
  {q: "Le tecniche di challenge-response contro i deepfake includono:", opts: ["Pronunciare numeri casuali durante il video e verificare la sincronia parlato-labbra", "Inserire un watermark invisibile nell'immagine del sensore prima dell'analisi", "Applicare filtri di Gabor al volto per estrarre le minutiae facciali", "Confrontare l'embedding del volto con un database di volti sintetici noti"], ans: 0, expl: "Challenge-response: chiedere di compiere azioni specifiche (pronunciare numeri, muovere la testa) e verificare sincronia e coerenza. Un deepfake in tempo reale fatica a rispondere a challenge casuali.", sel: true, cat: "DEEP"},
  {q: "Secondo la ISO/IEC 19795, la strategia di valutazione Scenario prevede di:", opts: ["Testare gli algoritmi su database pubblici di campioni biometrici senza utenti reali", "Allestire stanze attrezzate con diverse tecnologie candidate provate da un gruppo ristretto di volontari", "Installare il sistema già tarato nell'applicazione finale con utenti che firmano un consenso", "Pubblicare un bando tecnico ai produttori per raccogliere offerte economiche comparabili"], ans: 1, expl: "Scenario = stanze dedicate con diverse tecnologie candidate, piccolo gruppo di volontari, ambiente controllato che simula l'applicazione. Serve per scegliere la tecnologia migliore prima del deploy. Technology = solo algoritmi su DB pubblici. Operational = sistema installato sul campo.", cat: "MET2"},
  {q: "Secondo la ISO/IEC 19795, la strategia di valutazione Operational prevede di:", opts: ["Testare gli algoritmi su database pubblici di campioni biometrici senza utenti reali", "Allestire stanze attrezzate con diverse tecnologie candidate provate da un gruppo ristretto di volontari", "Installare il sistema già tarato nell'applicazione finale con utenti che firmano un apposito consenso", "Pubblicare un bando tecnico ai produttori per raccogliere offerte economiche comparabili"], ans: 2, expl: "Operational = test sul campo con sistema completo installato dove verrà usato davvero. Utenti reali firmano un modulo informativo. È la valutazione più realistica ma anche più rischiosa perché il sistema è già in produzione.", cat: "MET2"},
  {q: "Nel machine learning, il processo di generalizzare da un insieme di esempi specifici per formulare una regola generale si chiama:", opts: ["Deduzione, applicazione di regole generali a casi specifici in un sistema rule-based", "Trasduzione, mappatura diretta da un caso specifico a un caso specifico senza modello", "Induzione, generalizzazione di un modello a partire da un insieme di esempi di training", "Astrazione, eliminazione dei dettagli irrilevanti per focalizzarsi sulle feature essenziali"], ans: 2, expl: "Induzione = da casi specifici a regola generale (training di un modello ML). Deduzione = da regola generale a caso specifico (sistemi rule-based). Trasduzione = da caso specifico a caso specifico senza modello generale intermedio.", cat: "ITT"},
  {q: "Un modello come ChatGPT, durante la fase di addestramento, rientra concettualmente in quale paradigma di ragionamento?", opts: ["Deduzione, perché applica regole predefinite ai prompt dell'utente in input", "Induzione, perché generalizza una regola da un grande insieme di dati testuali", "Trasduzione, perché mappa direttamente un singolo prompt a una singola risposta", "Abduzione, perché genera ipotesi plausibili a partire dall'output osservato"], ans: 1, expl: "In training i LLM sono fondamentalmente induttivi: generalizzano un modello a partire da dati testuali. Una volta addestrato, in inference il modello può anche essere visto come trasduttore (mappa prompt → risposta).", cat: "ITT"},
  {q: "Gli Eager Learners si distinguono dai Lazy Learners perché:", opts: ["Memorizzano tutti i dati e rimandano il calcolo al momento della classificazione", "Non richiedono una fase di training ma solo una fase di inferenza in tempo reale", "Funzionano solo con dataset di piccole dimensioni già etichettati manualmente", "Costruiscono un modello compatto durante il training, più sintetico dei dati originali"], ans: 3, expl: "Eager (Decision Tree, NN, Rule-based) = creano modello esplicito e sintetico in training, più complesso da allenare. Lazy (k-NN) = memorizzano tutto e lavorano a runtime, costoso in memoria e calcolo.", cat: "ITT"},
  {q: "Nel 5×2 Cross Validation, lo schema consiste in:", opts: ["Dividere il dataset in 5 partizioni uguali e ruotarne 2 come test a ogni iterazione", "Ripetere 5 volte una 2-fold CV, ottenendo 10 valutazioni di errore totali aggregate", "Dividere il dataset in 2 partizioni A/B e alternarle come train/test per 5 iterazioni", "Applicare una 5-fold CV e ripeterla 2 volte aggregando gli errori medi finali"], ans: 1, expl: "5×2 CV = si divide in 2 partizioni A e B, si fa training su A e test su B, poi inverso → 2 errori. Si ripete 5 volte con partizioni casuali diverse → 10 errori totali. Si calcolano media e deviazione standard.", cat: "CNN"},
  {q: "In un sistema biometrico, la differenza critica tra Cross-Validation classica e Leave N People Out (LNPO) è che:", opts: ["LNPO tiene fuori dal training interi gruppi di persone mai viste dal modello in validazione", "LNPO usa N campioni per validazione mentre la CV classica ne usa sempre solo uno", "LNPO è applicabile solo quando il dataset contiene un numero pari di identità diverse", "LNPO richiede un numero di fold k proporzionale alla dimensione totale del dataset"], ans: 0, expl: "Con k-FCV classico lo stesso soggetto può apparire in train e test con foto diverse → la rete impara caratteristiche non biometriche (colore pelle, barba) e l'EER scende fittiziamente. LNPO separa le persone: gruppi interi usati solo in validazione, mai in training.", cat: "CNN"},
  {q: "In deep learning, il termine 'backbone' indica:", opts: ["La funzione di loss che guida l'ottimizzazione dei pesi durante il training", "L'ultimo strato fully-connected che produce la classificazione finale di identità", "Il meccanismo di regolarizzazione che previene l'overfitting sui dati di training", "La parte della rete che estrae rappresentazioni generali riutilizzabili in più task"], ans: 3, expl: "Backbone = parte iniziale/centrale della rete profonda che estrae feature generali dai dati, riutilizzabile come base per diversi compiti applicativi (transfer learning). ResNet è la backbone più diffusa in biometria moderna.", cat: "CNN"},
  {q: "Un layer ResNet apprende:", opts: ["Una rappresentazione completa dei dati in ingresso sostituendo quella dei layer precedenti", "Una trasformazione lineare pura senza funzioni di attivazione non-lineari intermedie", "Una proiezione dei dati in uno spazio di dimensione inferiore tramite PCA apprendibile", "Una funzione residua che corregge e migliora la rappresentazione già esistente"], ans: 3, expl: "F_nuove = F_originali + ΔF(F_originali). Il layer impara il 'delta' (ciò che cambia), non una nuova rappresentazione completa. Le skip connections facilitano il flusso del gradiente e attenuano il vanishing gradient.", cat: "CNN"},
  {q: "Lo ZeroFMR di un sistema biometrico rappresenta:", opts: ["Il punto della curva DET in cui le due distribuzioni (genuini/impostori) si intersecano", "La soglia minima al di sotto della quale il sistema rifiuta automaticamente ogni utente", "La frazione di genuini rifiutati quando la soglia viene alzata fino ad avere FMR nullo", "La percentuale di impostori che il sistema classifica correttamente come tali"], ans: 2, expl: "ZeroFMR = FNMR(T) quando T è così alta che FMR=0 (nessun impostore passa). Misura quanti genuini sacrifichi per avere sicurezza massima. Corrisponde al funzionamento ad alta security. Lo speculare è ZeroFNMR (alta convenience).", cat: "MET1"},
  {q: "Il meccanismo di biometria cancellabile applicato all'IrisCode mediante permutazioni sfrutta:", opts: ["Una cifratura AES-256 applicata ai 256 byte del template prima della memorizzazione", "Una funzione hash unidirezionale che genera un digest di lunghezza fissa dal codice", "Una chiave privata K che definisce uno schema di permutazione tra 256! ≈ 10^506 possibili", "Un rumore gaussiano aggiunto al template per impedirne la ricostruzione esatta"], ans: 2, expl: "256! ≈ 10^506 schemi di permutazione possibili, selezionati via chiave privata K. Lo XOR (usato nella Distanza di Hamming) non risente delle permutazioni → stesso matcher classico. Se il template trasformato viene rubato, basta cambiare K per generarne uno nuovo.", cat: "IRIDE"},
  {q: "La biometria cancellabile applicata all'IrisCode tramite permutazioni preserva la compatibilità con il matcher standard perché:", opts: ["Le permutazioni conservano la distribuzione statistica dei bit dentro il codice", "Le maschere di occlusione vengono ricalcolate dinamicamente sulla versione permutata", "Lo XOR fra due stringhe è invariante se si applica la stessa permutazione a entrambe", "Il matcher viene riaddestrato sulla distribuzione dei codici permutati con chiave K"], ans: 2, expl: "L'operatore XOR (⊗) usato nella distanza di Hamming è invariante per permutazioni: se permuto A e B con la stessa K, il numero di bit in disaccordo non cambia. Quindi lo stesso matcher classico funziona anche sui codici permutati, senza modifiche.", cat: "IRIDE"},
  {q: "La Silent Authentication avanzata su smartphone identifica l'utente sfruttando segnali come:", opts: ["Password digitate, PIN numerici e risposte a domande di sicurezza personalizzate", "Scansione dell'iride in background tramite la fotocamera frontale IR dello smartphone", "Impronte digitali acquisite ogni volta che l'utente tocca lo schermo capacitivo", "Modalità d'uso del telefono, gait, segnali WiFi circostanti e geolocalizzazione"], ans: 3, expl: "Silent authentication avanzata = apprendimento automatico continuo, analizza segnali impliciti come modo di usare il telefono, andatura (gait), WiFi circostanti, geolocalizzazione. Non richiede azioni esplicite dell'utente. Usata in consegne eCommerce e drone delivery.", cat: "ITT"},
  {q: "Secondo lo standard ISO/IEC 30107-1:2016, il termine Presentation Attack Instrument (PAI) indica:", opts: ["La caratteristica biometrica o l'oggetto fisico usato nel tentativo di attacco", "L'algoritmo software che rileva automaticamente un tentativo di attacco al sensore", "Il modulo hardware del sistema biometrico bersagliato dall'attacco avversario", "La presentazione legittima effettuata dall'utente durante l'uso normale del sistema"], ans: 0, expl: "PAI = Presentation Attack Instrument = caratteristica biometrica o oggetto usato nell'attacco (es. maschera, foto, dito finto, iride stampata). PAD = il modulo che rileva (Presentation Attack Detection). Bona Fide Presentation = uso normale del sistema, non un attacco.", cat: "ATK"},
  {q: "Un cheapfake si distingue da un deepfake sofisticato perché:", opts: ["Usa reti GAN più semplici rispetto al deepfake, ma con qualità visiva comparabile", "È crudamente incollato senza usare modelli AI per fondere e morph-are i volti", "Manipola solo l'audio del video mantenendo le immagini originali completamente invariate", "Richiede hardware più potente rispetto ai deepfake sofisticati per essere prodotto bene"], ans: 1, expl: "Cheapfake = volto crudamente pastato sopra il target senza uso di AI per fonderlo. Il deepfake vero usa AI per morph-are e blend-are i volti in modo realistico. Il risultato del cheapfake è visivamente grezzo e rilevabile a occhio.", cat: "ATK"},
  {q: "Confrontando le metriche CMC e mAP per sistemi di Re-Identification:", opts: ["CMC e mAP sono metriche equivalenti ma espresse su scale numeriche differenti", "mAP vale solo per verifica 1:1 mentre CMC è specifica per identificazione 1:N", "CMC vale solo se i crop sono auto-labellati; mAP non richiede ground truth etichettata", "CMC misura la probabilità di trovare la persona; mAP misura la qualità dell'ordinamento"], ans: 3, expl: "CMC (Cumulative Match Characteristic) = probabilità che l'identità corretta appaia entro il Rank-k, valuta SE il sistema trova la persona. mAP (mean Average Precision) = metrica che misura la qualità COMPLESSIVA dell'ordinamento: per ogni query calcola la precisione media considerando TUTTE le occorrenze corrette nel ranking (non solo la prima), poi fa la media su tutte le query. mAP alto = il sistema non solo trova la persona, ma mette tutte le sue immagini in cima al ranking.", cat: "MULTI"},
  {q: "Un pooling 3×3 applicato a una feature map produce una compressione di:", opts: ["3:1, riducendo ogni dimensione di un fattore tre ma mantenendo la profondità", "6:1, combinando linearmente le 9 celle di input in 1 o 2 valori di output", "9:1, riducendo 9 celle di input a una singola cella di output dimensionale", "27:1, applicando il pooling su tre dimensioni contemporaneamente della feature map"], ans: 2, expl: "Pooling k×k comprime k² celle in 1 → 3×3 = 9:1. Un 2×2 comprime 4:1. Il pooling riduce la risoluzione spaziale, rende i dati invarianti a piccoli shift traslazionali e diminuisce il numero di parametri da calcolare negli strati successivi.", cat: "CNN"},
  {q: "Avendo un insieme di M × N immagini di volti composto da M = 2 immagini dello stesso individuo e N = 100 individui, quale è il numero di comparazioni di impostori che è possibile realizzare?", opts: ["2 × 100, una coppia per individuo sommata al numero totale di individui", "4 × (100 × 100 − 100), tutte le coppie tra individui diversi moltiplicate per M²", "4 × 100, il numero di individui moltiplicato per il quadrato dei campioni", "100, un confronto per ogni singolo individuo presente nel dataset totale"], ans: 1, expl: "Formula esatta come da esame: con M campioni per individuo e N individui, i confronti impostori sono M² × N × (N−1) che equivale a M² × (N² − N) = 4 × (100 × 100 − 100) = 4 × 9.900 = 39.600. Il fattore M² considera che ogni coppia di individui diversi ha M×M confronti incrociati possibili tra i loro campioni.", cat: "MET1"},
  {q: "L'esposizione multipla (multiple exposure) in un sensore per immagini permette di:", opts: ["Acquisire lo stesso frame N volte consecutive per mediare il rumore termico del sensore", "Acquisire simultaneamente due immagini con tempo di esposizione diverso su stessa scena", "Applicare automaticamente N filtri diversi alla stessa immagine in tempo reale hardware", "Sovrapporre N frame successivi creando un effetto di movimento persistente sull'output"], ans: 1, expl: "Multiple exposure = acquisizione simultanea (o quasi) di due immagini con tempi di esposizione diversi. Utile per scene complesse con presenza di sole/ombre, illuminazione notturna, più soggetti. Le due immagini possono essere fuse per migliorare la gamma dinamica (base concettuale dell'HDR).", cat: "SENS"},
  {q: "L'inferenza statistica è il procedimento con cui:", opts: ["Si misura la percentuale di dati privati rivelabili da un modello ML già addestrato", "Si deducono regole specifiche a partire da principi generali noti e consolidati", "Si inducono le caratteristiche di una popolazione osservando un suo sottoinsieme campione", "Si ottimizzano i pesi di una rete neurale minimizzando una funzione di perdita globale"], ans: 2, expl: "Inferenza statistica = indurre proprietà di una popolazione da un campione, mediante esperimento casuale (aleatorio). Base teorica di tutto il biometric testing. ATTENZIONE: diversa dall'attacco di inferenza in ML (anche se il nome è simile).", cat: "MET1"},
  {q: "La probabilità totale di errore di un sistema biometrico è definita come:", opts: ["p(errore) = P(FM(T)) + P(FNM(T)), somma delle probabilità dei due tipi di errore", "p(errore) = P(FM(T)) × P(FNM(T)), prodotto delle due probabilità indipendenti", "p(errore) = P(FM(T)) AND P(FNM(T)), intersezione logica degli eventi di errore", "p(errore) = max(P(FM(T)), P(FNM(T))), il peggiore dei due errori commessi"], ans: 0, expl: "La probabilità di errore è la SOMMA dei due contributi: o il sistema sbaglia accettando un impostore (FM), o sbaglia rifiutando un genuino (FNM). Sono eventi mutuamente esclusivi. Formula standard del corso: p = P(errore) = P(FM(T)) + P(FNM(T)). Stima: p = (FM+FNM)/TOTALE.", cat: "MET1"},
  {q: "Nel k-Fold Cross Validation, i valori più comuni per k scelti in base alla dimensione del dataset sono:", opts: ["3 per dataset piccoli e 5 per dataset estesi, per ridurre i tempi di training", "5 per dataset piccoli e 10 per dataset estesi, come regola di buon senso", "2 per dataset piccoli e 20 per dataset estesi, per massimizzare la robustezza", "10 per qualsiasi dataset, indipendentemente dalla sua dimensione complessiva"], ans: 1, expl: "Di solito si usano valori di k fra 5 e 10-12. Regole di buon senso: se il dataset è esteso si usa la 10-FCV; se è piccolo si usa spesso la 5-FCV. k troppo piccolo → stima rumorosa; k troppo grande → costoso e si avvicina al LOO.", cat: "CNN"},
  {q: "Nel k-Fold Cross Validation, il dataset originale viene:", opts: ["Diviso casualmente in k partizioni uguali, usando a turno una come test e k−1 come training", "Suddiviso in k partizioni di dimensione crescente, ruotando n partizioni come validation", "Aumentato di fattore k tramite data augmentation prima della suddivisione train/test", "Partizionato in due soli sottoinsiemi A/B e ricampionato k volte con bootstrap casuale"], ans: 0, expl: "k-FCV standard: dataset diviso casualmente in k partizioni uguali. A ogni iterazione una partizione fa da test e le altre k-1 da training. Il processo si ripete k volte, usando a turno ciascuna partizione come test. Alla fine si mediano gli errori ottenuti.", cat: "CNN"},
  {q: "I Data Set Partitioning in machine learning servono principalmente a:", opts: ["Ridurre lo spazio occupato nel DB memorizzando solo un sottoinsieme rappresentativo", "Facilitare la ricerca dei template biometrici tramite indicizzazione delle partizioni", "Accelerare il training della rete neurale eseguendo batch paralleli sulle partizioni", "Valutare le prestazioni del modello su dati non visti, stimando la generalizzazione"], ans: 3, expl: "I partizionamenti (CV, LOO, LOPO, LNPO) servono a stimare quanto bene il modello generalizza a dati nuovi e sconosciuti, evitando overfitting. Senza validazione non si sa come si comporta il modello su dati futuri. NON servono per ridurre spazio o velocizzare.", cat: "CNN"},

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleOptions(questions) {
  return questions.map(q => {
    const correctText = q.opts[q.ans];
    const indices = Array.from({length: q.opts.length}, (_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    const newOpts = indices.map(i => q.opts[i]);
    const newAns = newOpts.indexOf(correctText);
    return { ...q, opts: newOpts, ans: newAns };
  });
}

            {/* RIPASSO + SALVATE — layout dinamico */}
            {ripassoCount > 0 && savedCount > 0 && (
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button onClick={startRipasso}
                  style={{flex:1,padding:"14px 12px",background:"transparent",border:"2px solid #00cc66",color:"#00cc66",fontSize:12,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s"}}

                  onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="#00cc66"}}>
                  {"RIPASSO (" + ripassoCount + ")"}
                </button>
                <button onClick={startSaved}
                  style={{flex:1,padding:"14px 12px",background:"transparent",border:"2px solid #ff7733",color:"#ff7733",fontSize:12,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="#ff7733";e.currentTarget.style.color="#0a0a0f"}}
                  onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="#ff7733"}}>
                  {"SALVATE (" + savedCount + ")"}
                </button>
              </div>
            )}
            {ripassoCount > 0 && savedCount === 0 && (
              <button onClick={startRipasso}
                style={{padding:"14px 20px",background:"transparent",border:"2px solid #00cc66",color:"#00cc66",fontSize:13,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s",marginTop:4}}
                onMouseEnter={e=>{e.currentTarget.style.background="#00cc66";e.currentTarget.style.color="#0a0a0f"}}
                onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="#00cc66"}}>
                {"RIPASSO (" + ripassoCount + " domande da rivedere)"}
              </button>
            )}
            {ripassoCount === 0 && savedCount > 0 && (
              <button onClick={startSaved}
                style={{padding:"14px 20px",background:"transparent",border:"2px solid #ff7733",color:"#ff7733",fontSize:13,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s",marginTop:4}}
                onMouseEnter={e=>{e.currentTarget.style.background="#ff7733";e.currentTarget.style.color="#0a0a0f"}}
                onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="#ff7733"}}>
                {"SALVATE (" + savedCount + " domande flaggate)"}
              </button>
            )}
          </div>

          {/* Unified stats box */}
          <div style={{marginTop:20,padding:"12px 16px",background:T.cardBg2,borderRadius:6,border:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:11,color:T.textMuted}}>Domande apprese</span>
              <span style={{fontSize:13,fontWeight:900,color: masteredCount >= QUESTIONS.length ? "#00ff88" : masteredCount >= QUESTIONS.length*0.75 ? "#44aaff" : masteredCount >= QUESTIONS.length*0.5 ? "#ff8800" : "#ff4444"}}>{masteredCount}/{QUESTIONS.length}</span>
            </div>
            <div style={{height:6,background:darkMode?"#1a1a2e":"#ddd",borderRadius:3,overflow:"hidden",marginBottom: (streak > 0 || bestStreak > 0) ? 8 : 0}}>
              <div style={{height:"100%",borderRadius:3,transition:"width 0.5s ease",width:`${(masteredCount/QUESTIONS.length)*100}%`,background: masteredCount >= QUESTIONS.length ? "#00ff88" : masteredCount >= QUESTIONS.length*0.75 ? "#44aaff" : masteredCount >= QUESTIONS.length*0.5 ? "#ff8800" : "#ff4444"}}/>
            </div>
            {streak > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom: bestStreak > 0 ? 4 : 0}}>
                <span style={{fontSize:11,color:T.textMuted}}>Streak attuale</span>
                <span style={{fontSize:12,fontWeight:700,color:"#ff8800"}}>{getStreakFires(streak)} {streak}</span>
              </div>
            )}
            {bestStreak > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:T.textMuted}}>Miglior streak</span>
                <span style={{fontSize:12,fontWeight:700,color:"#e07020"}}>{getStreakFires(bestStreak)} {bestStreak}</span>
              </div>
            )}
          </div>

          {/* Reset — ghost button, very discreet */}
          {masteredCount > 0 && (
            <p onClick={() => setShowResetConfirm(true)} style={{color:darkMode?"#2a2a2a":"#ccc",fontSize:9,marginTop:12,cursor:"pointer",transition:"color 0.2s"}} onMouseEnter={e=>e.target.style.color=darkMode?"#555":"#888"} onMouseLeave={e=>e.target.style.color=darkMode?"#2a2a2a":"#ccc"}>Reset progresso</p>
          )}

          {/* Reset confirm — step 1 */}
          {showResetConfirm && !showResetFinal && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:T.cardBg,border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
                <p style={{fontSize:13,marginBottom:6,color:"#ff8888",fontWeight:700}}>Attenzione</p>
                <p style={{fontSize:12,marginBottom:16,color:T.textSoft}}>Stai per cancellare tutto il progresso: domande apprese, domande da ripassare, streak attuale e record streak. Questa azione è irreversibile.</p>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={() => setShowResetFinal(true)} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>CONTINUA</button>
                  <button onClick={() => {setShowResetConfirm(false);setShowResetFinal(false);}} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>ANNULLA</button>
                </div>
              </div>
            </div>
          )}

          {/* Reset confirm — step 2 (final) */}
          {showResetConfirm && showResetFinal && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:T.cardBg,border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
                <p style={{fontSize:13,marginBottom:6,color:"#ff4444",fontWeight:700}}>Sei davvero sicuro?</p>
                <p style={{fontSize:12,marginBottom:16,color:T.textSoft}}>Perderai {masteredCount} domande apprese, {ripassoCount} domande nel ripasso, {savedCount} domande salvate e il tuo record streak di {bestStreak}. Non si può tornare indietro.</p>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={resetAllProgress} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>SÌ, CANCELLA TUTTO</button>
                  <button onClick={() => {setShowResetConfirm(false);setShowResetFinal(false);}} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>ANNULLA</button>
                </div>
              </div>
            </div>
          )}


          {/* Certificate modal */}
          {showCert && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
              {/* Confetti */}
              {[...Array(40)].map((_,i) => (
                <div key={i} style={{
                  position:"fixed",
                  top:"-10px",
                  left: `${Math.random()*100}%`,
                  width: `${6+Math.random()*8}px`,
                  height: `${6+Math.random()*8}px`,
                  background: ["#ff4444","#ffd700","#00ff88","#44aaff","#aa44ff","#ff8800","#ff69b4","#00ccff"][i%8],
                  borderRadius: Math.random()>0.5 ? "50%" : "2px",
                  animation: `confetti-fall ${2+Math.random()*3}s linear ${Math.random()*2}s infinite, confetti-sway ${1+Math.random()*2}s ease-in-out ${Math.random()}s infinite alternate`,
                  zIndex:1001,
                  pointerEvents:"none"
                }}/>
              ))}

              <div style={{background:T.bg,borderRadius:12,padding:0,maxWidth:420,width:"100%",position:"relative",zIndex:1002}}>
                {!certGenerated ? (
                  <div style={{padding:32,textAlign:"center"}}>
                    <p style={{fontSize:40,marginBottom:8}}>🏆</p>
                    <h2 style={{color:"#ffd700",fontSize:20,marginBottom:8,fontFamily:"inherit"}}>HAI COMPLETATO TUTTO!</h2>
                    <p style={{color:T.textMuted,fontSize:12,marginBottom:24}}>{"Tutte le " + QUESTIONS.length + " domande apprese. Inserisci il tuo nome per generare il certificato."}</p>
                    <input
                      type="text"
                      value={certName}
                      onChange={e => setCertName(e.target.value)}
                      placeholder="Il tuo nome"
                      style={{width:"100%",padding:"10px 14px",background:T.inputBg,border:`1px solid ${T.borderLight}`,borderRadius:4,color:T.text,fontSize:14,fontFamily:"inherit",outline:"none",textAlign:"center",marginBottom:16}}
                    />
                    <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                      <button onClick={() => {if(certName.trim()){try{localStorage.setItem("biometria_cert_name",certName.trim())}catch(e){} setCertGenerated(true);}}}
                        style={{padding:"10px 24px",background: certName.trim()?"#ffd700":"#333",color:certName.trim()?"#0a0a0f":"#666",border:"none",borderRadius:4,fontWeight:700,cursor:certName.trim()?"pointer":"default",fontFamily:"inherit",fontSize:13,transition:"all 0.2s"}}>
                        GENERA CERTIFICATO
                      </button>
                      <button onClick={() => setShowCert(false)}
                        style={{padding:"10px 24px",background:"transparent",color:"#555",border:"1px solid #333",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
                        CHIUDI
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{padding:0}}>
                    {/* Certificate */}
                    <div style={{
                      margin:20,
                      padding:32,
                      border:"2px solid #ffd700",
                      borderRadius:8,
                      background:"linear-gradient(145deg, #0d0d14, #111122)",
                      animation:"cert-glow 3s ease-in-out infinite",
                      textAlign:"center"
                    }}>
                      <p style={{fontSize:10,color:"#ffd700",letterSpacing:4,marginBottom:16,textTransform:"uppercase"}}>Certificato di Preparazione</p>
                      <div style={{width:40,height:1,background:"#ffd700",margin:"0 auto 16px",opacity:0.5}}/>
                      <p style={{fontSize:12,color:"#888",marginBottom:8,lineHeight:1.6}}>Si attesta che</p>
                      <p style={{fontSize:22,color:"#fff",fontWeight:900,marginBottom:8}}>{certName}</p>
                      <p style={{fontSize:12,color:"#888",lineHeight:1.6,marginBottom:16}}>
                        ha completato con successo tutte le <span style={{color:"#ffd700",fontWeight:700}}>{QUESTIONS.length}</span> domande del
                      </p>
                      <p style={{fontSize:14,color:"#ff4444",fontWeight:700,marginBottom:16}}>Super Test di Tecniche e Applicazioni Biometriche</p>
                      <div style={{width:40,height:1,background:"#ffd700",margin:"0 auto 20px",opacity:0.5}}/>
                      <p style={{fontSize:10,color:"#666",marginBottom:4}}>Firmato</p>
                      <p style={{fontSize:14,color:"#ccc",fontStyle:"italic"}}>Gabriele Lannutti</p>
                      <p style={{fontSize:9,color:"#444",marginTop:16}}>{new Date().toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})}</p>
                    </div>
                    <div style={{textAlign:"center",padding:"0 20px 20px"}}>
                      <button onClick={() => setShowCert(false)}
                        style={{padding:"10px 24px",background:"transparent",color:"#ffd700",border:"1px solid #ffd700",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
                        CHIUDI
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // STUDY MODE
  if (mode === "study") {
    const CAT_ORDER = [
      {code:"MET1", name:"Metriche: FMR, FNMR, EER, Soglia"},
      {code:"MET2", name:"Metriche: CMC, DET, ROC, Valutazione"},
      {code:"ZOO", name:"Zoo di Doddington"},
      {code:"CNN", name:"CNN e Deep Learning"},
      {code:"MULTI", name:"Multimodale"},
      {code:"VOLTO", name:"Volto"},
      {code:"SENS", name:"Sensori e Ottiche"},
      {code:"PRIV", name:"Privacy e Template Protection"},
      {code:"IDAUT", name:"Identificazione, Autenticazione e Normativa"},
      {code:"IRIDE", name:"Iride"},
      {code:"ATK", name:"Attacchi e Anti-spoofing"},
      {code:"IMPR", name:"Impronte"},
      {code:"VOCE", name:"Voce e Firma"},
      {code:"ITT", name:"ITT e CAPTCHA"},
      {code:"POP", name:"Proof of Personhood e WorldCoin"},
      {code:"DEEP", name:"Deepfake"},
    ];
    const LETTERS = ["A","B","C","D","E"];
    const grouped = {};
    QUESTIONS.forEach(q => {
      if (!grouped[q.cat]) grouped[q.cat] = [];
      grouped[q.cat].push(q);
    });
    return (
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono','Fira Code',monospace",padding:16,overflowY:"auto"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h1 style={{fontSize:18,color:"#44aaff",margin:0}}>MODALITÀ STUDIO</h1>
            <button onClick={()=>setMode("menu")} style={{background:"transparent",border:"1px solid "+T.border,color:T.textMuted,fontSize:11,padding:"6px 14px",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>TORNA AL MENU</button>
          </div>
          <p style={{color:T.textMuted,fontSize:11,marginBottom:20}}>{QUESTIONS.length} domande organizzate in {CAT_ORDER.length} categorie. Tocca una categoria per espanderla.</p>
          {(() => {
            const savedSet = getSavedSet();
            const savedQs = [...savedSet].map(i => QUESTIONS[i]).filter(Boolean);
            if (savedQs.length === 0) return null;
            return (
              <details key="saved-category" style={{marginBottom:8}} open>
                <summary style={{cursor:"pointer",padding:"10px 14px",background:T.cardBg,border:"2px solid #ff7733",borderRadius:4,fontSize:12,fontWeight:700,color:"#ff7733",listStyle:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{display:"flex",alignItems:"center",gap:8}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#ff7733" xmlns="http://www.w3.org/2000/svg">
                      <path d="M4 2h16v20l-8-5-8 5V2z" stroke="#ff7733" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    SALVATE
                  </span>
                  <span style={{color:T.textMuted,fontWeight:400,fontSize:11}}>{savedQs.length} domande</span>
                </summary>
                <div style={{borderLeft:"2px solid #ff7733",marginLeft:8,paddingLeft:12,marginTop:4}}>
                  {savedQs.map((q,i) => (
                    <div key={i} style={{background:T.cardBg,borderRadius:4,padding:12,marginBottom:6,fontSize:11,border:"1px solid "+T.border}}>
                      <p style={{color:T.text,fontWeight:600,marginBottom:8,lineHeight:1.4}}>{q.q}</p>
                      <p style={{color:"#00cc66",fontWeight:700,marginBottom:4}}>{q.opts[q.ans]}</p>
                      <p style={{color:T.textMuted,fontStyle:"italic",lineHeight:1.4,fontSize:10}}>{q.expl}</p>
                    </div>
                  ))}
                </div>
              </details>
            );
          })()}
          {CAT_ORDER.map(cat => {
            const qs = grouped[cat.code] || [];
            if (qs.length === 0) return null;
            return (
              <details key={cat.code} style={{marginBottom:8}}>
                <summary style={{cursor:"pointer",padding:"10px 14px",background:T.cardBg,border:"1px solid "+T.border,borderRadius:4,fontSize:12,fontWeight:700,color:"#44aaff",listStyle:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{cat.name}</span>
                  <span style={{color:T.textMuted,fontWeight:400,fontSize:11}}>{qs.length} domande</span>
                </summary>
                <div style={{borderLeft:"2px solid #44aaff",marginLeft:8,paddingLeft:12,marginTop:4}}>
                  {qs.map((q,i) => (
                    <div key={i} style={{background:T.cardBg,borderRadius:4,padding:12,marginBottom:6,fontSize:11,border:"1px solid "+T.border}}>
                      <p style={{color:T.text,fontWeight:600,marginBottom:8,lineHeight:1.4}}>{q.q}</p>
                      <p style={{color:"#00cc66",fontWeight:700,marginBottom:4}}>{q.opts[q.ans]}</p>
                      <p style={{color:T.textMuted,fontStyle:"italic",lineHeight:1.4,fontSize:10}}>{q.expl}</p>
                    </div>
                  ))}
                </div>
              </details>
            );
          })}
          <button onClick={()=>setMode("menu")} style={{display:"block",margin:"20px auto",padding:"12px 30px",background:"#44aaff",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>TORNA AL MENU</button>
        </div>
      </div>
    );
  }

  // RESULTS
  if (mode === "results") {
    const pct = Math.round((score/questions.length)*100);
    const grade = calcGrade(score, questions.length);
    const gradeLabel = isSimulation ? (grade >= 18 ? `VOTO STIMATO: ${grade >= 31 ? "30 e Lode" : grade}/30` : `VOTO STIMATO: ${grade}/30 (INSUFFICIENTE)`) : null;
    const pctColor = pct>=90?"#00ff88":pct>=75?"#44aaff":pct>=60?"#ff8800":"#ff4444";
    const verdict = pct>=90?"ECCELLENTE":pct>=75?"BUONO":pct>=60?"SUFFICIENTE":"INSUFFICIENTE";
    return (
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono',monospace",padding:20,overflowY:"auto"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <h1 style={{color:pctColor,fontSize:28,textAlign:"center"}}>{verdict}</h1>
          {isSimulation && grade !== null && <p style={{textAlign:"center",fontSize:20,color:grade>=18?"#00ff88":"#ff4444",fontWeight:900}}>{gradeLabel}</p>}
          <div style={{textAlign:"center",marginBottom:20}}>
            <span style={{fontSize:44,color:pctColor,fontWeight:900}}>{score}/{questions.length}</span>
            <span style={{color:T.textMuted,fontSize:13,display:"block"}}>({pct}%) — Tempo: {formatTime(elapsed)}</span>
          </div>
          {wrong.length>0&&(<div>
            <h2 style={{color:"#ff4444",fontSize:15,borderBottom:`1px solid ${T.borderLight}`,paddingBottom:8}}>ERRORI DA RIPASSARE ({wrong.length})</h2>
            {wrong.map((w,i)=>(
              <div key={i} style={{background:T.cardBg,borderLeft:"3px solid #ff4444",padding:12,marginBottom:10,borderRadius:4,fontSize:11}}>
                <p style={{color:"#ff8888",fontWeight:700,marginBottom:6}}>{w.q}</p>
                <p style={{color:"#00ff88"}}>{w.opts[w.ans]}</p>
                <p style={{color:T.textMuted,fontStyle:"italic",marginTop:4}}>{w.expl}</p>
              </div>
            ))}
          </div>)}
          <button onClick={()=>setMode("menu")} style={{display:"block",margin:"20px auto",padding:"12px 30px",background:"#ff4444",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>TORNA AL MENU</button>
        </div>
      </div>
    );
  }

  // QUIZ
  const q = questions[current];
  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono',monospace",display:"flex",flexDirection:"column"}}>
      {showExitConfirm && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:T.cardBg,border:`1px solid ${isCleanExit ? "#44aaff" : "#ff4444"}`,borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
            <p style={{fontSize:14,marginBottom:16,color:T.text}}>{isCleanExit
              ? "Vuoi tornare al menu? La tua streak è al sicuro."
              : "Vuoi davvero abbandonare? Hai una domanda aperta — la streak verrà azzerata."
            }</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={confirmExit} style={{padding:"8px 20px",background:isCleanExit?"#44aaff":"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{isCleanExit ? "TORNA AL MENU" : "SÌ, ESCI"}</button>
              <button onClick={cancelExit} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>ANNULLA</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${T.border}`,fontSize:12}}>
        <span style={{color:"#ff4444",fontWeight:700}}>{current+1}/{questions.length}</span>
        <div style={{display:"flex",gap:16}}>
          <span style={{color:"#00ff88"}}>✓ {score}</span>
          <span style={{color:"#ff4444"}}>✗ {wrong.length}</span>
          {streak > 0 && <span style={{color:"#ff8800"}}>{getStreakFires(streak)} {streak}</span>}
        </div>
        <span style={{color: isSimulation && (2400-elapsed)<300 ? "#ff4444" : T.textMuted}}>{isSimulation ? formatCountdown(elapsed) : formatTime(elapsed)}</span>
        <button onClick={handleExit} style={{background:"transparent",border:`1px solid ${T.textFaint}`,color:T.textMuted,fontSize:10,padding:"4px 10px",borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>ESCI</button>
      </div>
      <div style={{height:3,background:darkMode?"#1a1a2e":"#ddd"}}><div style={{height:"100%",background: isSimulation?"#ff4444":"#44aaff",width:`${((current+1)/questions.length)*100}%`,transition:"width 0.3s"}}/></div>
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:16,maxWidth:700,margin:"0 auto",width:"100%"}}>
        <p style={{fontSize:14,lineHeight:1.5,color:T.text,fontWeight:600,marginBottom:20,minHeight:50}}>{q.q}</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,flex:1}}>
          {q.opts.map((opt,i)=>{
            let bg="transparent",border=T.borderLight,col=T.textSoft;
            if(revealed){
              if(i===q.ans){bg=darkMode?"#0a2e0a":"#e6f9ed";border="#00ff88";col=darkMode?"#00ff88":"#007a3d"}
              else if(i===selected){bg=darkMode?"#2e0a0a":"#fde8e8";border="#ff4444";col="#ff4444"}
            } else if(i===selected){bg=darkMode?"#1a1a3e":"#e8eeff";border="#44aaff";col="#44aaff"}
            return(
              <button key={i} onClick={()=>handleSelect(i)}
                style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:bg,border:`1.5px solid ${border}`,color:col,fontSize:12,fontFamily:"inherit",cursor:revealed?"default":"pointer",borderRadius:4,textAlign:"left",lineHeight:1.4,transition:"all 0.15s"}}>
                <span style={{fontWeight:900,minWidth:18,color:border===T.borderLight?T.textFaint:col}}>{LETTERS[i]}.</span>
                <span>{opt}</span>
              </button>
            );
          })}
        </div>
        {/* Bandierina SALVA — sotto le opzioni, allineata a destra */}
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
          <button onClick={() => toggleSaved(q.q)}
            style={{background:"transparent",border:"none",cursor:"pointer",padding:6,color:currentQuestionSaved?"#ff7733":T.textFaint,transition:"color 0.2s",display:"flex",alignItems:"center",gap:6,fontSize:11,fontFamily:"inherit",fontWeight:700}}
            title={currentQuestionSaved?"Rimuovi dalle salvate":"Salva questa domanda"}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill={currentQuestionSaved?"#ff7733":"none"} xmlns="http://www.w3.org/2000/svg">
              <path d="M4 2h16v20l-8-5-8 5V2z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            <span>{currentQuestionSaved?"SALVATA":"SALVA"}</span>
          </button>
        </div>
        {/* Streak toast — above explanation */}
        {streakToast && (
          <div style={{
            display:"flex",
            justifyContent:"center",
            marginTop:8,
            animation: "toast-in 0.3s ease-out"
          }}>
            <div style={{
              padding: streakToast.style==="skull" ? "16px 24px" : streakToast.style==="epic" ? "12px 20px" : "10px 18px",
              background: streakToast.style==="skull" ? "rgba(100,0,180,0.95)" : streakToast.style==="epic" ? "rgba(170,68,255,0.2)" : "rgba(255,136,0,0.15)",
              border: streakToast.style==="skull" ? "2px solid #aa44ff" : streakToast.style==="epic" ? "1px solid rgba(170,68,255,0.5)" : "1px solid rgba(255,136,0,0.3)",
              borderRadius:8,
              textAlign:"center",
              animation: streakToast.style==="skull" ? "toast-skull-shake 0.8s ease-in-out" : streakToast.style==="epic" ? "toast-epic-pulse 1.5s ease-in-out infinite" : "toast-glow-pulse 1.5s ease-in-out infinite"
            }}>
              <p style={{
                fontSize: streakToast.style==="skull" ? 18 : streakToast.style==="epic" ? 15 : 14,
                fontWeight:700,
                color: streakToast.style==="skull" ? "#fff" : streakToast.style==="epic" ? "#aa44ff" : "#ff8800",
                fontFamily:"inherit",
                margin:0
              }}>
                {streakToast.fires} {streakToast.msg}
              </p>
            </div>
          </div>
        )}
        {revealed&&(
          <div style={{background:T.cardBg3,border:`1px solid ${T.borderLight}`,borderRadius:4,padding:12,marginTop:12,fontSize:11,lineHeight:1.5}}>
            <span style={{color:selected===q.ans?"#00ff88":"#ff4444",fontWeight:900}}>{selected===q.ans?"✓ CORRETTO":"✗ SBAGLIATO"}</span>
            <p style={{color:T.textMuted,marginTop:6}}>{q.expl}</p>
          </div>
        )}
        <div style={{marginTop:12,display:"flex",gap:10}}>
          {!revealed?(
            <button onClick={handleConfirm} disabled={selected===null}
              style={{flex:1,padding:"12px",background:selected!==null?"#44aaff":(darkMode?"#222":"#ddd"),color:selected!==null?"#000":(darkMode?"#555":"#999"),border:"none",fontSize:14,fontWeight:900,cursor:selected!==null?"pointer":"default",borderRadius:4,fontFamily:"inherit",transition:"all 0.2s"}}>
              CONFERMA
            </button>
          ):(
            <button onClick={handleNext}
              style={{flex:1,padding:"12px",background:"#ff4444",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>
              {current+1>=questions.length?"VEDI RISULTATI":"PROSSIMA →"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(BiometriaQuiz));
  </script>
</body>
</html>
