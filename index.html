<head>
  <meta charset="UTF-8">

  <title>Super Test Biometria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0f; overflow-x: hidden; }
    #root { min-height: 100vh; min-height: 100dvh; }
    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    @keyframes confetti-sway {
      0%, 100% { margin-left: 0; }
      50% { margin-left: 50px; }
    }
    @keyframes cert-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
      50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
    }
    @keyframes toast-in {
      0% { transform: translateY(-30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes toast-out {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-20px); opacity: 0; }
    }
    @keyframes toast-glow-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255,136,0,0.3); }
      50% { box-shadow: 0 0 25px rgba(255,136,0,0.6); }
    }
    @keyframes toast-epic-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(170,68,255,0.4); transform: scale(1); }
      50% { box-shadow: 0 0 40px rgba(170,68,255,0.8); transform: scale(1.02); }
    }
    @keyframes toast-skull-shake {
      0%, 100% { transform: scale(1) rotate(0deg); }
      10% { transform: scale(1.05) rotate(-2deg); }
      20% { transform: scale(1.05) rotate(2deg); }
      30% { transform: scale(1.05) rotate(-2deg); }
      40% { transform: scale(1.05) rotate(2deg); }
      50% { transform: scale(1.05) rotate(0deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

const QUESTIONS = [
  {q: "Un sistema di controllo frontiere scansiona l'iride di un viaggiatore e la confronta con un database di 10 milioni di persone senza che il viaggiatore dichiari la propria identità. Si tratta di:", opts: ["Autenticazione, perché il viaggiatore è fisicamente presente", "Identificazione, perché il sistema confronta con tutto il DB senza identità dichiarata", "Identificazione positiva, perché il viaggiatore dichiara esplicitamente la propria identità prima del confronto", "Autenticazione, perché il sistema usa un tratto biometrico forte"], ans: 1, expl: "Non c'è identity claim: il sistema confronta la probe con l'intero database, quindi si tratta di identificazione 1:N. In questa formulazione la risposta corretta è Identificazione."},
  {q: "Un sistema controlla che nessuno si iscriva due volte al welfare usando identità diverse. È un esempio di:", opts: ["Verifica biometrica con blacklist", "Autenticazione 1:1", "Identificazione negativa", "Identificazione positiva"], ans: 2, expl: "Si vuole impedire che una persona usi più identità → Identificazione Negativa. 'Negativa' non significa rifiuto ma 'verificare che NON sia già presente con un'altra identità'."},
  {q: "Il False Match (impostore accettato) è classificato come errore di:", opts: ["Tipo II (mancato allarme)", "Non è classificabile nei tipi standard", "Tipo III", "Tipo I (falso allarme)"], ans: 0, expl: "Controintuitivo: il False Match è Tipo II (mancato allarme — il sistema non rileva l'impostore). Il False Non-Match è Tipo I (falso allarme — rifiuta un genuino)."},
  {q: "Le 7 proprietà di un tratto biometrico includono la 'Performabilità'. Questa misura:", opts: ["La facilità con cui il tratto può essere misurato quantitativamente", "L'accuratezza dell'identificazione in condizioni operative reali", "La velocità di acquisizione del sensore", "La resistenza del tratto ai tentativi di spoofing"], ans: 1, expl: "Misurabilità = il sensore riesce a catturare il tratto. Performabilità = le prestazioni del sistema in condizioni reali. La D è la Circonvenzione."},
  {q: "Il Binning Error nel contesto delle impronte comporta tipicamente:", opts: ["Con alta probabilità un mancato match del genuino perché viene cercato nel bin sbagliato", "Un aumento del False Match Rate per eccesso di confronti tra template di classi diverse", "Una riduzione della qualità del template estratto", "Un aumento del tempo complessivo di ricerca nel database"], ans: 0, expl: "Nel materiale del corso, se il classificatore sbaglia bin e l'utente era registrato, con alta probabilità non si avrà match perché i template corretti sono in un bin diverso. La formulazione 'inevitabilmente' o 'certo' era troppo assoluta."},
  {q: "La sequenza corretta dei moduli durante la fase di Enrollment è:", opts: ["Acquisizione → Creazione template → Feature Extraction → Database", "Database → Acquisizione → Feature Extraction → Creazione template", "Acquisizione → Feature Extraction → Creazione template → Database", "Feature Extraction → Acquisizione → Creazione template → Database"], ans: 2, expl: "Prima si acquisisce, poi si estraggono le feature, poi si crea il template, infine si memorizza nel database."},
  {q: "In un sistema di videosorveglianza, il frame attualmente acquisito dalla telecamera è:", opts: ["La Probe", "Un template di enrollment", "La Gallery", "Un campione di riferimento"], ans: 0, expl: "Il frame corrente è la Probe (ciò che arriva adesso). La Gallery è il database dei template già registrati."},
  {q: "Se il match score tra probe e template memorizzato risulta perfettamente uguale (distanza nulla), il sistema dovrebbe:", opts: ["Richiedere una seconda acquisizione con un sensore diverso", "Abbassare la soglia per i confronti successivi", "Accettare immediatamente l'utente con massima confidenza", "Segnalare un'anomalia perché potrebbe essere un replay attack"], ans: 3, expl: "Due acquisizioni fisiche non sono MAI identiche (rumore, posa, illuminazione). Distanza nulla = probabile replay attack."},
  {q: "La funzione HDR in un sistema di visione biometrica serve per:", opts: ["Aumentare la risoluzione spaziale del sensore via software", "Ridurre il rumore elettronico tramite averaging temporale su frame consecutivi", "Estendere la gamma di contrasti visibili combinando esposizioni multiple", "Aumentare il frame rate in condizioni di scarsa illuminazione"], ans: 2, expl: "Dalla simulazione del prof: l'HDR serve per la gamma di contrasti, NON per la risoluzione spaziale (che è fissa nell'hardware)."},
  {q: "La scelta di una telecamera con doppio tempo di esposizione è utile con:", opts: ["Soggetti in movimento in regioni con forte contrasto di luminosità", "Un singolo soggetto in ambiente uniformemente illuminato", "Soggetti in rapido movimento in condizioni uniformi", "Più soggetti fermi in regioni con luminosità estremamente diversa"], ans: 3, expl: "Dalla simulazione: il doppio tempo è utile solo con soggetti FERMI. Con soggetti in movimento il frame a esposizione lunga li sfoca."},
  {q: "Il Ridge Counting è classificato come feature di:", opts: ["Livello I (globale)", "Livello III (ultra-fine/pori)", "Non rientra in nessun livello della classificazione standard", "Livello II (locale/minutiae)"], ans: 0, expl: "Trappola classica: si calcola a partire dalle minutiae (Livello II) ma porta informazione NON localizzata → è Livello I."},
  {q: "I filtri di Gabor applicati alle impronte digitali si adattano a:", opts: ["Sia l'orientamento sia la frequenza locale dei ridge", "La luminosità globale dell'immagine", "Solo la frequenza (distanza) locale dei ridge", "Solo l'orientamento locale dei ridge, trascurando la frequenza spaziale per ridurre il carico computazionale"], ans: 0, expl: "Dalla simulazione del prof: orientamento E frequenza sono entrambi parametri del filtro di Gabor (filtro adattativo più efficace per le impronte)."},
  {q: "Un sensore restituisce immagini a 3 canali × 8 bit per pixel. I colori rappresentabili sono:", opts: ["8 milioni, calcolati usando una singola matrice di Bayer per l'interpolazione cromatica", "768", "256", "16,7 milioni (256³)"], ans: 3, expl: "256³ = 16.777.216 ≈ 16,7 milioni. La A sarebbe vera solo con 1 canale. 768 = 3×256 è un errore di moltiplicazione."},
  {q: "L'acquisizione multispettrale per le impronte digitali:", opts: ["Richiede necessariamente luce UV per eccitare i pigmenti della pelle e rivelare le creste papillari", "Funziona solo con sensori capacitivi di ultima generazione che rilevano la conducibilità a più frequenze", "È possibile con sensori avanzati e permette di leggere sotto la superficie della pelle", "È limitata ai sensori ottici FTIR e non è compatibile con i sensori a stato solido per acquisizione live"], ans: 2, expl: "Dalla simulazione: l'acquisizione multispettrale è applicabile anche alle impronte, non solo a volto/sorveglianza."},
  {q: "Un filtro di polarizzazione in un sensore biometrico:", opts: ["Riduce la banda spettrale passante bloccando le lunghezze d'onda fuori dal visibile", "Seleziona la polarizzazione della luce ed elimina i riflessi speculari", "Aumenta la sensibilità del sensore nelle bande NIR e termiche simultaneamente", "Filtra il rumore elettronico generato dal readout del sensore CMOS o CCD"], ans: 1, expl: "Dalla simulazione: il polarizzatore NON riduce la banda spettrale. Seleziona la polarizzazione, elimina riflessi. Può essere integrato nel sensore."},
  {q: "I sensori CMOS e CCD sono praticamente equivalenti in campo biometrico.", opts: ["Falso, il CCD non è più utilizzato in nessuna applicazione biometrica", "Vero, le differenze residue sono trascurabili nei moderni sistemi embedded", "Vero, entrambi offrono global shutter nativo", "Falso, ci sono differenze significative anche se il gap si sta riducendo"], ans: 3, expl: "Dalla simulazione: FALSO. CCD = global shutter nativo, migliore SNR, più costoso. CMOS = rolling shutter, più economico, elaborazione on-chip."},
  {q: "Gli effetti del Rolling Shutter nei sensori CMOS comprendono:", opts: ["Wobble, skew, temporal aliasing e motion blur", "Wobble, skew, spatial aliasing e temporal aliasing", "Wobble, skew, spatial aliasing e chromatic aberration", "Skew, spatial aliasing, temporal aliasing e lens flare"], ans: 1, expl: "Dalla simulazione: QUATTRO effetti — wobble/jello, skew, spatial aliasing (battimento pixel) e temporal aliasing (lampade sfarfallanti)."},
  {q: "La distorsione da Rolling Shutter può essere corretta:", opts: ["Via software con riduzione del rumore infra-pixel", "Solo sostituendo fisicamente il sensore con un Global Shutter di fascia alta", "In nessun modo: è un difetto hardware irreversibile", "Via software stimando la velocità del movimento e riducendo la distorsione"], ans: 3, expl: "Dalla simulazione: correggibile algoritmicamente stimando il movimento. Il rumore infra-pixel (B) è un problema diverso, non correlato."},
  {q: "Per la biometria del volto e delle mani, il numero di bit per pixel non è influente.", opts: ["Falso, ma il miglioramento è trascurabile oltre i 4 bit per la maggior parte dei matcher commerciali", "Vero, ma solo per il volto e non per le mani", "Falso, più bit per pixel migliorano gli algoritmi di enhancement e filtraggio", "Vero, 8 bit sono sempre sufficienti indipendentemente dall'applicazione"], ans: 2, expl: "Dalla simulazione: FALSO. Più bit/pixel = minore quantizzazione = migliori algoritmi. Vale per qualsiasi biometria basata su immagini."},
  {q: "Un dispositivo di conversione analogico-digitale (ADC) è praticamente sempre incluso nei sensori per immagini usati in biometria.", opts: ["Vero: qualsiasi grandezza fisica va convertita in segnale digitale", "Falso: molti sensori biometrici lavorano in analogico puro", "Vero, ma solo nei sensori CCD che producono un output nativamente analogico", "Falso: la conversione avviene nel computer, non nel sensore"], ans: 0, expl: "Dalla simulazione: VERO. Qualsiasi grandezza fisica (fotoni, capacità, temperatura) deve essere convertita in digitale per essere elaborata."},
  {q: "In alcuni sensori avanzati è possibile selezionare il numero di bit per tono di grigio di un singolo pixel.", opts: ["Vero, anche se non è generalizzato a tutti i sensori", "Vero, ma solo nei sensori CMOS e mai nei CCD", "Falso, il numero di bit è determinato esclusivamente dal software", "Falso, i dispositivi sono hardware fisso e non modificabile"], ans: 0, expl: "Dalla simulazione: VERO per dispositivi avanzati. Influenza frame rate e banda trasmessa. Non è generalizzato ma esiste."},
  {q: "Nei sensori CMOS il problema dell'aliasing riguarda:", opts: ["Solo caratteristiche spaziali dell'immagine", "Nessuna delle precedenti: l'aliasing non si verifica nei CMOS moderni", "Sia caratteristiche spaziali sia temporali", "Solo caratteristiche temporali (frequenza di campionamento)"], ans: 2, expl: "Dalla simulazione: spaziale (battimento pattern/griglia pixel) E temporale (luce alternata a frequenza simile al frame rate)."},
  {q: "Esistono sensori biometrici per immagini con filtro polarizzatore integrato.", opts: ["Falso, il polarizzatore è sempre un accessorio esterno da montare sull'ottica", "Falso, integrarlo degraderebbe irreparabilmente la qualità", "Vero, ma solo per applicazioni spaziali e militari", "Vero, e sono utili ad es. per eliminare riflessi su vetri in sorveglianza"], ans: 3, expl: "Dalla simulazione: VERO. Esistono sensori con filtro polarizzatore integrato, utili ad es. per vedere persone attraverso il vetro di un'auto."},
  {q: "La biometria del volto può essere realizzata analizzando il soggetto su bande ottiche diverse dal visibile.", opts: ["Falso: i filtri ottici necessari degradano la risoluzione sotto il minimo accettabile per il matching", "Vero, ma esclusivamente per la liveness detection e non per il riconoscimento dell'identità", "Falso: il volto richiede necessariamente lo spettro visibile per estrarre le feature discriminanti", "Vero: l'analisi su bande diverse (es. infrarosso) rivela caratteristiche non visibili nel solo spettro visibile"], ans: 3, expl: "Dalla simulazione: analizzare il volto su bande diverse dal visibile permette di vedere feature complementari."},
  {q: "Quali delle seguenti affermazioni sono TUTTE corrette? (A) Con immagini ad ampio angolo si possono acquisire più tratti. (B) Con più bit/pixel si possono impiegare algoritmi migliori. (C) Con maggiore risoluzione si analizzano tratti a livelli diversi.", opts: ["Solo B e C sono corrette in condizioni di illuminazione ideale", "Solo A è corretta", "Solo A e B sono corrette", "Tutte e tre (A, B e C) sono corrette"], ans: 3, expl: "Dalla simulazione del prof: A, B e C sono tutte vere. Scegliere solo una o due sarebbe incompleto."},
  {q: "La convoluzione tra un'immagine I e un kernel K si rappresenta come:", opts: ["O = I + K (somma punto a punto nell'intorno spaziale)", "O = I · K (prodotto scalare elemento per elemento)", "O = I ⊕ K (operazione XOR bit a bit sulla matrice)", "O = I * K (dove * indica la convoluzione)"], ans: 3, expl: "Dalla simulazione: O = I * K dove * è l'operatore di convoluzione (non la moltiplicazione scalare). Le altre non hanno senso su matrici."},
  {q: "La scelta di una telecamera con doppio tempo di esposizione è utile nel caso di soggetti IN MOVIMENTO in regioni con gamma di luminosità estrema.", opts: ["Falso, ma solo perché il doppio tempo non esiste per telecamere professionali", "Vero, ma solo se il movimento è lento (< 0.5 m/s)", "Falso: il frame a esposizione lunga sfoca i soggetti in movimento rendendolo inutile", "Vero: l'esposizione combinata mappa accuratamente sia il target in moto che lo sfondo"], ans: 2, expl: "Dalla simulazione: FALSO. Il frame a esposizione lunga sfoca i soggetti in movimento → controproducente."},
  {q: "Una gamma colore di un sensore per immagini superiore a 100 dB è particolarmente utile in applicazioni di:", opts: ["Scansione di documenti d'identità", "Riconoscimento dell'iride in laboratorio", "Acquisizione di impronte digitali a contatto per gestire dita eccessivamente secche o umide", "Videosorveglianza con contrasti ambientali estremi"], ans: 3, expl: "Dalla simulazione: la sorveglianza ha i contrasti più estremi (giorno/notte, sole/ombra). 100 dB ≈ gamma dell'occhio umano."},
  {q: "Il conteggio di persone in ambienti indoor con sistemi a tecnologia 3D:", opts: ["Funziona bene solo in ambienti con illuminazione uniforme e flussi regolari a bassa densità", "Gestisce bene i flussi complessi ma è molto sensibile alle variazioni di illuminazione ambientale", "Funziona solo con flussi unidirezionali e richiede illuminazione NIR controllata supplementare", "Riesce a gestire sia importanti differenze di illuminazione sia flussi complessi"], ans: 3, expl: "Dalla simulazione: la C include entrambi i vantaggi. Scegliere solo A o B sarebbe dare metà risposta."},
  {q: "È possibile inserire funzionalità biometriche su sistemi mobili quali droni.", opts: ["Falso: la capacità computazionale del drone non è adeguata", "Falso: il continuo cambio di punto di vista rende inutilizzabile la biometria", "Vero: principalmente per il riconoscimento del volto in contesti controllati", "Vero: specialmente per sorveglianza e applicazioni similari"], ans: 3, expl: "Dalla simulazione: i droni cambiano punto di vista per risolvere occlusioni. L'elaborazione pesante va su server remoti. Uso: sorveglianza."},
  {q: "La luce NIR (700-900 nm) per i sensori dell'iride viene usata perché:", opts: ["Viene riflessa dalla melanina rivelando la tessitura indipendentemente dal colore dell'occhio", "Viene assorbita selettivamente dalla melanina generando una mappa termica della superficie iridea", "Attraversa la pupilla senza riflessione sulla superficie dell'iride, illuminando la retina sottostante", "Eccita i pigmenti dell'iride producendo una fluorescenza rilevabile dal sensore monocromatico"], ans: 0, expl: "La luce visibile è assorbita dalla melanina (nasconde la tessitura). La NIR viene riflessa, rivelando i pattern."},
  {q: "L'IrisCode standard ha una dimensione di:", opts: ["128 byte per il codice + 128 byte per la maschera", "1024 byte per il codice + 1024 byte per la maschera", "512 byte totali senza maschera", "256 byte per il codice + 256 byte per la maschera"], ans: 3, expl: "256 byte codice + 256 byte maschera di validità. Numero preciso da ricordare."},
  {q: "L'IrisCode memorizza esclusivamente:", opts: ["L'intensità dei pixel dell'iride dopo il filtraggio", "L'informazione di fase delle Wavelet di Gabor 2D", "La posizione e il tipo delle minutiae dell'iride", "Il colore dell'iride normalizzato in scala di grigi"], ans: 1, expl: "Solo la fase → invariante a contrasto, livello di grigio e illuminazione. Massima entropia: 50% probabilità per ogni bit."},
  {q: "Confrontando due IrisCode di persone completamente diverse, la Distanza di Hamming attesa è circa:", opts: ["0.25 — un quarto dei bit differisce", "0.5 — metà dei bit coincide e metà no, per puro caso", "0.0 — i codici sono quasi identici per struttura morfologica dell'occhio", "0.75 — tre quarti dei bit differiscono"], ans: 1, expl: "Distribuzione binomiale centrata a 0.5. Per puro caso, metà dei bit coincide e metà no."},
  {q: "Nel calcolo della Distanza di Hamming tra IrisCode, le maschere servono per:", opts: ["Normalizzare la lunghezza dei due codici a 256 byte compensando le differenze di segmentazione", "Escludere le zone occluse da ciglia, palpebre e riflessi dal calcolo", "Aumentare artificialmente la distanza tra codici diversi per ridurre il tasso di falsi match", "Cifrare il template prima della trasmissione al server per la protezione della privacy dell'utente"], ans: 1, expl: "Senza maschere, i bit nelle zone occluse introdurrebbero rumore casuale alzando la HD. AND logico tra maskA e maskB."},
  {q: "La prima fase dell'algoritmo di Daugman per l'IrisCode utilizza:", opts: ["Un classificatore KNN per la segmentazione", "Un operatore integro-differenziale per localizzare bordi circolari", "Una trasformata di Fourier per la decomposizione frequenziale", "Un filtro di Gabor 2D per estrarre le feature"], ans: 1, expl: "L'operatore integro-differenziale cerca il centro e il raggio di pupilla e iride cercando la massima variazione di luminosità circolare."},
  {q: "L'unwrapping dell'iride nell'algoritmo di Daugman consiste nel:", opts: ["Linearizzare l'iride da coordinate polari (ρ, θ) a cartesiane", "Rimuovere le palpebre e le ciglia dall'immagine", "Applicare la trasformata wavelet di Gabor 2D", "Quantizzare i valori di fase nei quadranti per generare il codice binario"], ans: 0, expl: "Fase 3 di Daugman: trasformazione da coordinate polari a rappresentazione rettangolare (cartesiana)."},
  {q: "Se più del 50% dell'iride è occluso da palpebre, ciglia o riflessi, il sistema dovrebbe:", opts: ["Procedere con il matching usando solo la parte visibile", "Abbassare la soglia di accettazione per compensare", "Riacquisire l'immagine perché l'informazione residua è insufficiente", "Usare un algoritmo alternativo progettato per occlusioni pesanti"], ans: 2, expl: "L'informazione residua è insufficiente per un matching affidabile → riacquisizione necessaria."},
  {q: "L'attacco del CCC al riconoscimento iride del Samsung Galaxy S8 ha utilizzato:", opts: ["Un display OLED ad alta risoluzione posizionato alla distanza focale ottimale del sensore NIR", "Una lente a contatto con il pattern irideo stampato ad altissima risoluzione e indossata dall'attaccante", "Un occhio protesico in vetro con iride dipinta a mano e rivestimento anti-riflesso in materiale ottico", "Una foto IR stampata su stampante laser con una lente a contatto umida sopra per la curvatura 3D"], ans: 3, expl: "La lente serve solo per la curvatura 3D dell'occhio, la stampa è su carta. Attacco Level 1 che inganna un device consumer."},
  {q: "Il riconoscimento dell'iride ha tratto minor beneficio dal Deep Learning rispetto al volto perché:", opts: ["Il Deep Learning non è compatibile con la Distanza di Hamming", "I filtri di Gabor classici raggiungono già efficienze quasi totali sui micro-dettagli locali", "Le CNN non sono in grado di elaborare immagini in scala di grigi", "Non esistono dataset di iridi sufficientemente grandi per evitare l'overfitting delle CNN"], ans: 1, expl: "L'iride si basa su micro-dettagli locali dove i filtri matematici classici (Gabor) sono già quasi perfetti → DL aggiunge poco."},
  {q: "Nell'algoritmo di Daugman, la fase 4 (Trasformata con Gabor Wavelet 2D) produce:", opts: ["Le frequenze spaziali dominanti della texture iridea dopo la normalizzazione", "I valori di fase da quantizzare per generare il codice binario", "I coefficienti di ampiezza delle wavelet usati per calcolare la distanza euclidea", "Una mappa bidimensionale delle discontinuità di intensità sulla superficie iridea"], ans: 1, expl: "La wavelet 2D di Gabor produce i valori di fase, che nella fase 5 vengono quantizzati nei quadranti per generare l'IrisCode binario."},
  {q: "I tre componenti fondamentali di un algoritmo di Machine Learning sono:", opts: ["Training, Validation, Testing", "Input, Processing, Output", "Encoding, Decoding, Classification per mappare le feature in uno spazio latente", "Representation, Evaluation, Optimization"], ans: 3, expl: "Representation (spazio dei modelli), Evaluation (metrica di qualità), Optimization (metodo per minimizzare l'errore)."},
  {q: "Se un sistema formula regole dopo aver elaborato 10.000 campioni osservati, ha usato un apprendimento:", opts: ["Non supervisionato (senza etichette)", "Deduttivo (dal generale al particolare)", "Induttivo (dal particolare al generale)", "Per rinforzo (basato su premi e punizioni)"], ans: 2, expl: "Domanda esame: parte dai dati (particolare) per costruire regole (generale) → Induttivo."},
  {q: "Nella tecnica LOPO, cosa viene mantenuto fuori dal training set?", opts: ["Tutti i campioni appartenenti a una specifica persona", "Un singolo campione per persona, scelto casualmente da ciascuna classe", "I campioni acquisiti con il sensore meno performante del setup sperimentale", "Metà dei campioni di ciascuna persona, selezionati con stratificazione bilanciata"], ans: 0, expl: "LOPO: TUTTI i campioni di un individuo stanno nel test set e MAI nel training, per evitare che la rete impari fattori spurii."},
  {q: "Una cross-validation classica 10-fold dà EER=0.1% sul riconoscimento facciale. Il risultato è inaffidabile perché:", opts: ["L'EER dovrebbe essere calcolato solo su dati non biometrici", "Le stesse persone possono comparire sia in train che in test", "10 fold sono statisticamente troppi per questo tipo di dato", "La CV classica non funziona con immagini RGB"], ans: 1, expl: "Nella k-FCV classica la stessa persona può finire in train e test → la rete impara tratti superficiali → falso EER basso. Serve LOPO."},
  {q: "Il principale scopo della Data Augmentation è:", opts: ["Eliminare i campioni rumorosi dal dataset", "Aumentare la risoluzione spaziale delle immagini", "Ridurre i tempi di addestramento fornendo un gradiente più stabile", "Combattere l'overfitting e migliorare la generalizzazione"], ans: 3, expl: "Rotazioni, variazioni di scala, rumore, cambi di luce → più dati → il modello generalizza meglio e non memorizza il training set."},
  {q: "La Curse of Dimensionality implica che aumentando le feature:", opts: ["Lo spazio cresce e i campioni diventano troppo sparsi e distanti", "Le reti neurali diventano più efficienti", "I modelli lineari iniziano a funzionare meglio dei modelli non lineari a parità di dati", "Il modello diventa più accurato senza bisogno di più dati"], ans: 0, expl: "Con troppe feature lo spazio esplode e i pochi campioni sono troppo distanti → serve una mole esponenziale di dati."},
  {q: "Un Lazy Learner come il KNN si caratterizza perché:", opts: ["Costruisce un modello parametrico compatto durante il training e lo applica in fase di test", "Apprende una funzione di decisione esplicita ottimizzando una loss function durante il training", "Non crea alcun modello ma esegue tutto il calcolo al momento della classificazione", "Genera un albero di decisione durante il training che poi viene potato per ridurre l'overfitting"], ans: 2, expl: "Lazy = memorizzano tutto e lavorano al momento della classificazione. Eager (Alberi, NN) = creano un modello in training."},
  {q: "Se il parametro K del KNN è troppo basso, il sistema:", opts: ["Va in overfitting ed è ipersensibile al rumore locale", "Ha tempi di classificazione troppo lunghi", "Non riesce a classificare nessun campione", "Va in underfitting con confini decisionali troppo lisci"], ans: 0, expl: "K basso → overfitting (sensibile al rumore). K alto → underfitting (vicinato troppo ampio, include classi estranee)."},
  {q: "Nel Deep Learning, l'estrazione delle feature avviene:", opts: ["Sempre manualmente da un esperto del dominio", "Identicamente a quanto avviene nel ML classico", "Solo con l'intervento dell'utente durante il training", "In modo automatico e gerarchico strato per strato"], ans: 3, expl: "Primi strati → bordi. Intermedi → forme geometriche. Ultimi → oggetti complessi. Tutto automatico (gerarchia di astrazione)."},
  {q: "Durante la Backpropagation, nelle reti molto profonde il gradiente può:", opts: ["Solo svanire quasi a zero (Vanishing Gradient)", "Sia svanire sia esplodere, a seconda dell'architettura", "Rimanere sempre stabile grazie alla normalizzazione batch", "Solo esplodere raggiungendo valori infiniti"], ans: 1, expl: "Sia il Vanishing che l'Exploding Gradient sono problemi reali. Il Vanishing è il più comune; le ResNet lo risolvono con skip connections."},
  {q: "Le reti ResNet risolvono il Vanishing Gradient introducendo:", opts: ["Una riduzione automatica del numero di strati durante il training per stabilizzare il gradiente", "Funzioni di attivazione Sigmoid con derivata maggiorata per accelerare la convergenza dei pesi", "Skip connections che permettono ai gradienti di fluire direttamente", "Un numero maggiore di neuroni per strato nascosto compensando la perdita di segnale in profondità"], ans: 2, expl: "Le skip connections permettono ai gradienti di fluire all'indietro senza svanire; la rete impara solo la funzione residua."},
  {q: "Usare una CNN come classificatore multiclasse diretto in biometria (una classe per persona) è pericoloso perché:", opts: ["Le CNN non sono in grado di allineare geometricamente i volti in modo affidabile", "Funziona solo con database di meno di 10 persone", "La rete richiede troppa memoria GPU", "Impedisce il LOPO, non è scalabile e causa Catastrophic Forgetting"], ans: 3, expl: "Tre problemi: impedisce LOPO, ogni nuovo utente richiede riaddestramento totale, il riaddestramento fa dimenticare i vecchi utenti."},
  {q: "La loss ArcFace rispetto alla Softmax classica:", opts: ["Produce embedding con la stessa separazione inter-classe ma riduce il tempo di convergenza", "Impone un margine angolare che compatta i campioni della stessa persona e separa le diverse", "Si limita a ri-pesare le classi durante il training senza introdurre alcun margine angolare nello spazio embedding", "Funziona solo con dataset perfettamente bilanciati per evitare il collasso delle classi minoritarie"], ans: 1, expl: "ArcFace forza compattezza intra-classe e separazione inter-classe → funziona anche con identità nuove. La Softmax generalizza male."},
  {q: "La Triplet Loss del modello FaceNet usa tre immagini con l'obiettivo di:", opts: ["Classificare le tre immagini minimizzando l'errore di cross-entropia congiunta", "Minimizzare la distanza ancora-positivo e massimizzare la distanza ancora-negativo", "Generare immagini sintetiche per la Data Augmentation", "Minimizzare tutte le distanze tra le tre immagini"], ans: 1, expl: "Ancora (riferimento), Positivo (stessa persona) → avvicinare. Negativo (persona diversa) → allontanare."},
  {q: "Il Transfer Learning e il Fine-Tuning sono:", opts: ["Il Transfer Learning è un caso specifico del Fine-Tuning", "Il Fine-Tuning è un caso specifico del Transfer Learning", "Tecniche incompatibili che non possono essere usate insieme", "Esattamente la stessa tecnica con nomi diversi"], ans: 1, expl: "Transfer Learning = concetto generale (riuso conoscenza). Fine-Tuning = implementazione specifica (congeli primi strati, riaddestri la parte finale)."},
  {q: "Il Leakage Informativo nei template biometrici è un problema di privacy perché:", opts: ["Il sensore trasmette il segnale grezzo non cifrato lungo il bus dati verso il matcher", "Il template viene intercettato sul canale di comunicazione tra sensore e modulo di matching", "Il database perde progressivamente i template a causa di errori di scrittura cumulativi", "Il template contiene dati sensibili estraibili oltre alle info per l'identificazione"], ans: 3, expl: "Il vettore numerico nasconde info non autorizzate (età, sesso, salute) che possono essere estratte per profilazione."},
  {q: "Per i tratti biometrici comportamentali (firma dinamica, voce nel tempo) le reti ideali sono:", opts: ["KNN (K-Nearest Neighbors)", "RNN (Reti Neurali Ricorrenti)", "SVM (Support Vector Machines)", "CNN (Reti Neurali Convoluzionali)"], ans: 1, expl: "Le RNN hanno memoria interna per elaborare dati sequenziali e catturare l'evoluzione temporale del segnale."},
  {q: "I tre principi cruciali del ML applicato alla biometria includono: le reti Deep memorizzano il training, serve Cross-Validation, e il terzo è:", opts: ["Il test set deve contenere le stesse persone del training", "In biometria serve LNPO anziché la CV classica", "Servono dataset di almeno 1 milione di campioni", "La loss function deve essere sempre Softmax"], ans: 1, expl: "Terzo principio: la CV classica non basta in biometria, serve LNPO per separare le persone (non solo i campioni)."},
  {q: "L'approccio corretto per usare una CNN in un sistema biometrico scalabile è:", opts: ["Estrattore di embedding, poi confronto con distanze matematiche", "Filtro di qualità per scartare le acquisizioni rumorose prima del matching classico", "Classificatore multiclasse con una classe per utente", "Generatore di immagini sintetiche per arricchire il database"], ans: 0, expl: "Si usa come feature extractor. Si scarta l'ultimo livello di classificazione e si confrontano i vettori con distanze."},
  {q: "Il Rasoio di Occam applicato al Machine Learning suggerisce di:", opts: ["Usare sempre il modello con il maggior numero di parametri addestrabili", "Preferire la soluzione più semplice a parità di efficacia", "Massimizzare la profondità della rete prima di valutare le alternative", "Ridurre il dataset eliminando le feature meno correlate con la label"], ans: 1, expl: "Prima testare algoritmi semplici (KNN, alberi). Passare a reti profonde solo se i modelli semplici sono insufficienti."},
  {q: "Il Teorema di Hastad dimostra che le reti Deep sono preferibili alle Shallow perché:", opts: ["Sono più semplici da addestrare grazie alla backpropagation su meno strati nascosti", "Hanno sempre un numero totale di parametri inferiore a parità di capacità rappresentativa", "Consumano meno risorse computazionali perché riutilizzano i pesi tra strati adiacenti", "Determinati problemi richiedono esponenzialmente più neuroni con un solo strato nascosto"], ans: 3, expl: "Aggiungendo strati in profondità, il numero di nodi necessari crolla drasticamente. La profondità permette il riutilizzo delle feature."},
  {q: "L'Equal Error Rate (EER) è il punto in cui:", opts: ["FMR = FNMR (falsi accetti = falsi rifiuti)", "FMR + FNMR = 1 (complementari)", "FMR = 0 e FNMR = 0 (punto di accuratezza perfetta del classificatore)", "FMR = 1 e FNMR = 0 (tutti accettati)"], ans: 0, expl: "EER: unico punto in cui la percentuale di falsi accetti e falsi rifiuti sono identiche."},
  {q: "Un sistema ha EER del 2%. In produzione il 2% degli impostori entra?", opts: ["No, l'EER vale solo alla soglia corrispondente", "Sì, indipendentemente dalla soglia scelta", "Sì, esattamente il 2% in qualsiasi configurazione", "No, l'EER misura esclusivamente i genuini rifiutati"], ans: 0, expl: "L'EER è un indice di confronto tra sistemi, non il tasso di errore operativo. In pratica il sistema opera su una soglia diversa."},
  {q: "Se si abbassa molto la soglia T in un sistema biometrico:", opts: ["Entrambi diminuiscono simultaneamente", "Entrambi i tassi aumentano simultaneamente", "FMR aumenta e FNMR diminuisce", "FMR diminuisce e FNMR aumenta"], ans: 2, expl: "Soglia bassa → più facile superarla → più impostori entrano (FMR↑) ma meno genuini rifiutati (FNMR↓)."},
  {q: "La curva CMC misura l'accuratezza di:", opts: ["Sistemi di autenticazione (1:1)", "Algoritmi di classificazione multiclasse su dataset chiusi", "Sistemi di identificazione (1:N)", "Sensori biometrici hardware"], ans: 2, expl: "CMC = Cumulative Match Characteristic, esclusivamente per identificazione 1:N. Mostra la probabilità di trovare l'identità nei primi K risultati."},
  {q: "Secondo il materiale del corso, nel riconoscimento positivo FAR e FRR sono:", opts: ["Metriche completamente diverse da FMR e FNMR perché includono policy operative e tentativi multipli", "I nomi usati, nel contesto del riconoscimento positivo, per FMR e FNMR alla soglia scelta", "Errori di acquisizione che includono FTA e FTE", "Misure valide solo per l'identificazione negativa"], ans: 1, expl: "Nel corso il funzionamento del sistema è descritto principalmente da FMR(T) e FNMR(T). Nel caso di riconoscimento positivo, questi tassi vengono chiamati FAR(T) e FRR(T)/FNAR(T), non introdotti come categoria concettuale separata basata su policy operative."},
  {q: "Secondo il materiale del corso, i Failure To Acquire (FTA) rientrano in:", opts: ["Image acquisition errors", "Matching errors", "False Reject Rate (FRR) come sua componente esplicita", "False Match Rate (FMR)"], ans: 0, expl: "Nel materiale del corso, FTA e FTE sono trattati nella categoria degli image acquisition errors. I file non supportano l'affermazione che FRR sia definito come FNMR più FTA."},
  {q: "Ho testato il sistema su 1000 campioni con ZERO errori. Per la Regola del 3:", opts: ["Con il 95% di confidenza l'errore è ≤ 3/1000 = 0.3%", "Devo raggiungere almeno 30 errori per qualsiasi conclusione", "Il sistema ha errore reale = 0 con certezza assoluta", "Il test è completamente inutile"], ans: 0, expl: "Regola del 3: zero errori osservati ≠ zero errori reali. Con 95% di confidenza: p ≤ 3/N."},
  {q: "La Regola del 30 afferma che per stime affidabili dell'errore servono:", opts: ["Almeno 30 errori effettivi osservati", "Almeno 30 persone diverse nel database", "Almeno 30 campioni nel test set", "Almeno 30 fold di cross-validation"], ans: 0, expl: "Per essere sicuri al 90% che l'errore stimato sia entro ±30% dell'errore reale → almeno 30 errori effettivi."},
  {q: "L'FTE (Failure To Enroll) misura:", opts: ["La percentuale di utenti che il sistema non riesce a registrare inizialmente", "La percentuale di utenti rifiutati durante l'uso quotidiano del sistema biometrico", "Il tasso di errore complessivo dell'algoritmo di matching calcolato su base annua", "La percentuale di falsi match causati da template di scarsa qualità nel database"], ans: 0, expl: "FTE = fallimento in fase di enrollment (es. impronte illeggibili). FTA = fallimento in fase operativa."},
  {q: "Nell'identificazione Open-set, a differenza della Closed-set:", opts: ["La soglia decisionale è sempre fissa e non modificabile", "Il database è necessariamente più piccolo", "L'utente potrebbe non essere registrato nel sistema", "Si usa esclusivamente l'autenticazione 1:1"], ans: 2, expl: "Closed-set: l'utente è sicuramente nel DB. Open-set: potrebbe essere sconosciuto → il sistema verifica prima se esiste un match."},
  {q: "In ambito forense si preferisce operare con:", opts: ["FMR alto e FNMR basso (non perdere nessun sospetto)", "Nessun compromesso: entrambi i tassi devono essere zero", "EER il più basso possibile", "FMR basso e FNMR alto (massima sicurezza)"], ans: 0, expl: "In forense: non si vuole perdere nessun criminale (FNMR basso). Si accettano molti falsi match (FMR alto) filtrati manualmente."},
  {q: "Con FMR=10⁻⁴ in verifica e N=10.000 in identificazione, il FNMRN:", opts: ["Rimane uguale al FNMR originale", "Dipende esclusivamente dal tipo di tratto biometrico", "Si dimezza", "Aumenta proporzionalmente a N"], ans: 0, expl: "FNMRN = FNMR (non cambia). È il FMR che esplode: FMRN = 1-(1-FMR)^N."},
  {q: "Perché in biometria non si usa il classico parametro dell'Accuratezza globale?", opts: ["Perché dipende dalle proporzioni di genuini e impostori nel test, restituendo valori fuorvianti", "Perché non esiste una formula matematica per calcolarlo quando i campioni sono acquisiti da sensori diversi", "Perché l'accuratezza dipende dalla soglia operativa scelta dall'amministratore e non dall'algoritmo stesso", "Perché il calcolo richiede troppa potenza computazionale quando il database supera i 10.000 template"], ans: 0, expl: "L'accuratezza globale dipende da quanti genuini vs impostori testano il sistema → valore fuorviante. Si usano FMR, FNMR, EER."},
  {q: "Con la Regola del 3 e N=3000 campioni senza errori, il tasso di errore massimo garantito al 95% è:", opts: ["3/3000 = 0.001 (0.1%)", "30/3000 = 0.01 (1%)", "3/3000 = 0.003 (0.3%)", "0 (zero errori osservati = zero errore reale)"], ans: 0, expl: "3/N = 3/3000 = 0.001 = 0.1%. La D è la trappola: zero errori osservati ≠ zero errori reali."},
  {q: "Il Binning Error con probabilità di errore singola p=0.05 e 2 classificazioni è circa:", opts: ["9.75% (1 − 0.95²)", "Esattamente 10% (2 × 5%)", "5% (uguale alla singola)", "2.5% (5% / 2)"], ans: 0, expl: "Binning Error = 1 − (1−0.05)² = 1 − 0.9025 = 0.0975 ≈ 9.75%. Non è 2×5% ma 2p−p²."},
  {q: "Con FMR=10⁻⁴ in verifica e N=10.000 in identificazione, il FMRN esatto è circa:", opts: ["0.632 (63.2%): dalla formula esatta 1−(1−FMR)^N", "0.001 (0.1%), sostanzialmente uguale", "10⁻⁴ (uguale al valore in verifica)", "1.0 (100%): l'approssimazione lineare N·FMR"], ans: 0, expl: "FMRN = 1−(1−10⁻⁴)^10000 ≈ 0.632. L'approssimazione N·FMR=1 è al limite. Il FMR NON resta uguale."},
  {q: "La differenza tra generazione degli score Online e Offline è:", opts: ["Online genera più confronti impostori perché può ripetere i tentativi senza limiti di tempo operativi", "Offline elabora in tempo reale durante l'uso del sistema, Online salva tutto per analisi statistiche successive", "Online elabora in tempo reale; Offline salva le immagini e genera un numero enorme di confronti successivi", "Online e Offline producono le stesse distribuzioni ma Online richiede hardware dedicato per il calcolo"], ans: 2, expl: "Offline: salvataggio immagini + confronto esaustivo successivo → molti più tentativi impostore senza coinvolgere gli utenti continuamente."},
  {q: "In una valutazione operativa (Operational evaluation) è fondamentale riportare almeno:", opts: ["Il tasso di errore EER calcolato su almeno 10.000 confronti genuini e 10.000 confronti impostori", "Il tipo di sensore, l'algoritmo di matching e il numero totale di utenti registrati nel database", "Il numero totale di transazioni genuine e impostor registrate durante il periodo di valutazione", "Intervalli di confidenza, dimensione del campione, condizioni ambientali e proporzioni genuini/impostori"], ans: 3, expl: "Una evaluation seria richiede CI, dimensione campione, condizioni, proporzioni, non solo un singolo numero."},
  {q: "Raccogliere multiple transactions per person nel test migliora la valutazione perché:", opts: ["Permette di ridurre il numero di volontari richiesti per raggiungere la significatività statistica", "Riduce la varianza delle misurazioni mediando i risultati anomali", "Consente di addestrare meglio i modelli di Machine Learning associati", "Aumenta il numero di confronti genuini e impostori, rendendo le stime statistiche più affidabili"], ans: 3, expl: "Più transazioni per persona = più confronti = distribuzioni più accurate = stime di errore più affidabili."},
  {q: "L'HDR e il WDR in videosorveglianza sono:", opts: ["L'HDR opera in tempo reale via hardware dedicato, il WDR è una post-elaborazione software con latenza", "Entrambe combinano esposizioni multiple ma il WDR usa più frame e l'HDR ne usa solo due fissi", "L'HDR è una tecnica solo per telecamere fisse, il WDR è progettato esclusivamente per telecamere PTZ", "Tecniche diverse: l'HDR può avere latenza, il WDR gestisce i contrasti in tempo reale via hardware"], ans: 3, expl: "HDR = più esposizioni combinate (latenza possibile). WDR = hardware dedicato per sorveglianza, tempo reale."},
  {q: "Il Rolling Shutter è tipico dei sensori:", opts: ["Sia CCD che CMOS in egual misura", "Nessuno dei due: è un artefatto software", "CCD", "CMOS"], ans: 3, expl: "I CMOS leggono riga per riga (Rolling Shutter). I CCD leggono tutti i pixel simultaneamente (Global Shutter nativo)."},
  {q: "Il Global Shutter è ideale per i sistemi biometrici 'on-the-move' perché:", opts: ["Espone tutti i pixel simultaneamente, congelando l'immagine senza deformazioni", "Permette frame rate molto più elevati riducendo i tempi di elaborazione del DSP", "Costa significativamente meno del Rolling Shutter", "Non richiede alcuna illuminazione aggiuntiva"], ans: 0, expl: "Tutti i pixel esposti allo stesso tempo → nessuna deformazione con soggetti in movimento."},
  {q: "I parametri chiave di una telecamera biometrica sono:", opts: ["Solo risoluzione e frame rate", "Solo il numero di megapixel", "Risoluzione, frame rate, SNR e Quantum Efficiency", "Solo risoluzione, bit depth e interfaccia di trasmissione dati"], ans: 2, expl: "Quattro parametri: Risoluzione (dettagli), Frame Rate (velocità), SNR (pulizia segnale), QE (efficienza fotoni→elettroni)."},
  {q: "Le tecnologie di acquisizione 'Attive' si distinguono dalle 'Passive' perché:", opts: ["Richiedono sempre il contatto fisico con il soggetto", "Funzionano esclusivamente di giorno con luce solare", "Catturano solo la radiazione ambientale disponibile", "Usano una propria sorgente di illuminazione controllata"], ans: 3, expl: "Attive = propria sorgente controllata. Passive = usano la luce ambientale."},
  {q: "L'imaging NIR (Near-Infrared) differisce dal Termico (FIR) perché:", opts: ["Il Termico richiede un illuminatore, il NIR è passivo", "Entrambi sono tecnologie attive", "Entrambi sono passivi e catturano lunghezze d'onda diverse dello spettro visibile", "Il NIR richiede illuminatore attivo e rivela pattern superficiali"], ans: 3, expl: "NIR (700-900nm) = attivo, rimbalza sul soggetto. Termico (FIR) = passivo, cattura il calore emesso dal corpo."},
  {q: "Alzare gli ISO in un'acquisizione biometrica introduce:", opts: ["Un aumento del contrasto locale che evidenzia i falsi micro-dettagli della pelle", "Solo un miglioramento della qualità dell'immagine", "Una riduzione del frame rate senza effetti sulla qualità", "Rumore elettronico che distrugge le high-frequency features"], ans: 3, expl: "ISO alti → rumore elettronico → distrugge micro-dettagli → aumento FNMR."},
  {q: "Per il riconoscimento facciale servono almeno 60 pixel tra gli occhi. Con un FOV di 1500mm, i pixel orizzontali necessari sono circa:", opts: ["2500 pixel, per garantire un margine di sicurezza sui bordi dell'inquadratura", "1636 pixel (serve almeno una 2MP)", "1280 pixel (sufficiente una 1MP)", "800 pixel"], ans: 1, expl: "Distanza occhi ~55mm, 60px/55mm = 1.09 px/mm, FOV 1500mm → 1.09 × 1500 = 1636. Una 1MP (1280) non basta."},
  {q: "La Quantum Efficiency (QE) di un sensore misura:", opts: ["La capacità di memoria interna del sensore", "Il rapporto tra fotoni incidenti ed elettroni prodotti", "La velocità di calcolo delle operazioni matriciali", "Il rapporto tra segnale utile e rumore termico generato dal sensore"], ans: 1, expl: "QE = rapporto fotoni/elettroni. Alta QE a 850nm è fondamentale per sistemi biometrici a infrarosso."},
  {q: "Il Depth of Field (DOF) ridotto in un sistema biometrico causa:", opts: ["Migliore isolamento del soggetto dallo sfondo con conseguente aumento dell'accuratezza", "Maggiore sensibilità alla luce ambientale con degrado del rapporto segnale/rumore", "Riduzione del frame rate necessaria per compensare l'apertura del diaframma più ampia", "Immagini sfocate con minime variazioni di posizione dell'utente, aumentando FTA"], ans: 3, expl: "DOF ridotto → minime variazioni di posizione causano sfocatura → Failure To Acquire."},
  {q: "Perché una funzione hash NON funziona per proteggere i template biometrici?", opts: ["Perché l'hash è computazionalmente troppo lento per rispettare i vincoli di latenza del matching real-time", "Perché l'hash richiede che i dati in input abbiano sempre una lunghezza fissa incompatibile con i template", "Perché le funzioni hash non preservano le relazioni spaziali tra le minutiae necessarie per l'allineamento", "Perché l'hash è instabile: un singolo bit diverso nell'input produce un hash completamente diverso"], ans: 3, expl: "Dalla simulazione: l'hash è instabile rispetto a piccole variazioni. Due acquisizioni dello stesso tratto differiscono sempre → hash diversi."},
  {q: "La crittazione tradizionale a chiave asimmetrica NON funziona per i template perché:", opts: ["Le chiavi generate dai tratti biometrici non raggiungono l'entropia minima richiesta dall'algoritmo", "Il tempo di cifratura e decifratura supera la latenza massima accettabile per il matching real-time", "Distrugge la geometria del template impedendo il calcolo di distanze per il matching", "Il template cifrato occupa troppa memoria per essere memorizzato su smart card o Secure Element"], ans: 2, expl: "Dalla simulazione: dopo la crittazione non si possono calcolare distanze/similarità → matching impossibile."},
  {q: "Nella crittografia omomorfica applicata alla biometria, il server conosce:", opts: ["Solo il risultato (accettato/rifiutato) ma non lo score", "Né il match score né il risultato della comparazione", "Solo il match score numerico ma non il risultato", "Sia il match score sia il risultato della comparazione"], ans: 1, expl: "Dalla simulazione: il server esegue il matching su dati cifrati senza capire il risultato. Solo il client interpreta."},
  {q: "La protezione della privacy del template biometrico:", opts: ["Può abbassare l'accuratezza e non è applicabile a tutti i tipi di template", "Funziona esclusivamente con le impronte digitali", "Non è mai stata implementata perché richiede hardware crittografico specializzato sul sensore", "È sempre applicabile a tutti i tratti senza alcuno svantaggio"], ans: 0, expl: "Dalla simulazione: usabile ma può ridurre l'accuratezza. Non adatta a tutti i contesti (es. forense dove serve massima accuratezza)."},
  {q: "Nel Salting biometrico, se l'attaccante possiede sia il template trasformato F(T,K) sia la chiave K:", opts: ["Può autenticarsi iniettando direttamente F(T,K) nel comparatore bypassando il sensore", "Può ricostruire il template originale T perché la trasformazione è invertibile", "Non può fare nulla perché la funzione è non invertibile", "Può solo decifrare l'identità ma non il tratto biometrico"], ans: 1, expl: "Il Salting è invertibile: con F(T,K) e K si risale a T → danno permanente (il tratto non si cambia)."},
  {q: "L'Helper Data nel Key-binding di un Biometric Cryptosystem è:", opts: ["Cifrato con la chiave pubblica dell'utente", "Pubblico per design: da solo non rivela né la chiave né il template", "Eliminato immediatamente dopo l'enrollment", "Segreto e deve essere protetto con la stessa cura della chiave privata"], ans: 1, expl: "L'Helper Data NON è segreto. Da solo non compromette né la chiave né il template originale."},
  {q: "Le 4 proprietà ideali di un metodo di protezione del template sono:", opts: ["Accuracy, Robustness, Interoperability, Speed (ARIS)", "Encryption, Hashing, Salting, Tokenization", "Velocità, Precisione, Scalabilità, Robustezza", "Diversity, Revocability, Non-invertibility, Performance"], ans: 3, expl: "Diversity (no cross-matching), Revocability (annullabile), Non-invertibility (impossibile ricavare l'originale), Performance (nessun degrado)."},
  {q: "L'EU AI Act vieta categoricamente i sistemi biometrici che:", opts: ["Acquisiscono dati biometrici senza il consenso esplicito e documentato dell'interessato", "Usano telecamere in spazi pubblici", "Richiedono il consenso esplicito dell'utente", "Inferiscono attributi sensibili come razza, religione o orientamento sessuale"], ans: 3, expl: "Vieta i sistemi che deducono/inferiscono attributi sensibili. Permette (come 'alto rischio') le categorizzazioni funzionali."},
  {q: "La biometria cancellabile funziona analogamente a:", opts: ["Una password: se compromessa, si cambia la chiave e si genera un nuovo template", "La distruzione fisica del token hardware contenente le credenziali biometriche dell'utente", "L'eliminazione completa del database dei template seguita da un re-enrollment di tutti gli utenti", "La sostituzione del sensore biometrico con un modello diverso per invalidare i template esistenti"], ans: 0, expl: "Se il template trasformato viene rubato, basta cambiare la chiave/funzione → nuovo template, come revocare una password."},
  {q: "Memorizzare solo i template (non le immagini originali) garantisce la privacy?", opts: ["Sì, il template è una rappresentazione numerica astratta da cui non si risale al dato originale", "Sì, purché il template sia memorizzato in un Secure Element con accesso crittografato", "No, ma solo quando il template è memorizzato in chiaro senza alcuna trasformazione cancellabile", "No, esistono tecniche per ricostruire parzialmente l'immagine originale dal template"], ans: 3, expl: "Esistono tecniche di ricostruzione parziale dal template (es. ricostruire un'impronta dalle coordinate delle minuzie)."},
  {q: "Secondo l'International Biometric Group (IBG), i sistemi sono più invasivi per la privacy quando:", opts: ["Sono nascosti, obbligatori, in modalità 1:N, con database centralizzati", "Operano solo in modalità 1:1 con storage locale", "Usano esclusivamente tratti comportamentali", "Sono palesi, volontari e gestiti da enti governativi centralizzati"], ans: 0, expl: "Più invasivi: covert, obbligatori, 1:N, dati a tempo indeterminato, DB centralizzati, tratti fisiologici."},
  {q: "L'uso di sistemi di emotion recognition nell'EU AI Act è:", opts: ["Completamente vietato in qualsiasi contesto senza eccezioni", "Sempre permesso se c'è il consenso dell'utente", "Vietato nei luoghi di lavoro e nelle scuole, indipendentemente dal consenso", "Permesso solo per analisi forense post-evento su mandato della magistratura"], ans: 2, expl: "Vietato in luoghi di lavoro e scuole. In altri contesti: fortemente limitato, classificato come alto rischio."},
  {q: "In Italia, creare un deepfake senza diffonderlo è reato?", opts: ["No, i deepfake non sono regolamentati da alcuna norma dell'ordinamento italiano vigente", "No, l'art. 612-quater c.p. punisce solo la diffusione senza consenso", "Sì, la creazione è sempre punita penalmente indipendentemente dalla successiva diffusione", "Sì, ma esclusivamente se la vittima raffigurata nel deepfake è un soggetto minorenne"], ans: 1, expl: "L'art. 612-quater punisce la diffusione senza consenso (1-5 anni). La sola creazione non configura il reato."},
  {q: "I 4 livelli operativi della sicurezza fisica sono:", opts: ["Deter, Detect, Delay, Respond", "Plan, Do, Check, Act", "Identify, Protect, Detect, Recover", "Monitor, Alert, Block, Report"], ans: 0, expl: "Deter (dissuadere), Detect (rilevare), Delay (ritardare), Respond (rispondere)."},
  {q: "Nel Tailgating, l'intruso supera il varco:", opts: ["Tramite un attacco informatico al controller della porta", "Senza che l'utente autorizzato se ne accorga", "Usando credenziali biometriche rubate", "Con il consenso esplicito dell'utente autorizzato"], ans: 1, expl: "Tailgating = furtivo, senza consenso. Piggybacking = con il consenso/consapevolezza dell'autorizzato."},
  {q: "I sensori Time of Flight (ToF) nei sistemi anti-tailgating servono per:", opts: ["Calcolare la distanza e il volume dei corpi per rilevare più persone in un singolo passaggio", "Ricostruire il profilo 3D del volto di ciascun individuo per il riconoscimento facciale nel varco", "Misurare la temperatura corporea degli individui in transito per rilevare anomalie fisiologiche", "Analizzare la velocità di camminata dei soggetti per classificare comportamenti sospetti nel varco"], ans: 0, expl: "ToF = misura distanza e volume dei corpi, separando le sagome per rilevare accodamenti."},
  {q: "I componenti principali di un ABC Gate includono:", opts: ["Porte di ingresso e uscita, lettore di documenti, dispositivi di acquisizione/verifica biometrica, sensori di sicurezza, display informativi", "Lettore RFID per e-Passport, scanner bagagli a raggi X, tornello motorizzato di uscita, pannello di controllo remoto e display di stato", "Telecamera facciale ad alta risoluzione, server cloud dedicato per il matching biometrico, QR code reader, sensore termico e altoparlante", "Terminale RTP dedicato con sistema VIS/EES integrato, smartphone del viaggiatore come secondo fattore, varco bidirezionale e metal detector"], ans: 0, expl: "Nel materiale del corso, l'architettura di un ABC Gate comprende porte di ingresso/uscita, lettore di documenti, dispositivi biometrici, sensori di sicurezza e signalling/display informativi."},
  {q: "Nel processo Two-step segregato di un e-Gate:", opts: ["Tutto avviene in una singola cabina chiusa (mantrap)", "Si effettuano due acquisizioni dello stesso tratto a distanza di tempo", "Il passaporto è letto in un chiosco esterno, poi il varco serve alla verifica biometrica", "Il passeggero interagisce contemporaneamente con il lettore di passaporti e la telecamera biometrica"], ans: 2, expl: "Nel Two-step esistono due possibilità: integrato e segregato. Questa risposta descrive il caso segregato, in cui lettura documento e verifica biometrica avvengono in due punti distinti."},
  {q: "Lo standard ICAO Doc 9303 stabilisce che il tratto biometrico primario per gli e-Passport è:", opts: ["L'iride", "L'impronta digitale", "La firma digitale", "Il volto (Face)"], ans: 3, expl: "Il volto è obbligatorio per l'interoperabilità mondiale. Impronte e iride sono secondarie opzionali."},
  {q: "Il modello RBAC (Role-Based Access Control) assegna l'accesso in base a:", opts: ["Il ruolo dell'utente all'interno dell'organizzazione", "La discrezione del proprietario della risorsa", "Gli attributi dinamici di utente, risorsa e contesto ambientale", "Le etichette di sicurezza imposte dal sistema operativo"], ans: 0, expl: "MAC = etichette SO, DAC = proprietario decide, RBAC = ruolo nell'organizzazione, ABAC = attributi dinamici."},
  {q: "L'Autenticazione Continua (Silente) verifica l'identità:", opts: ["Solo quando l'utente esegue operazioni sensibili come transazioni o accessi privilegiati", "Tramite periodici prompt che richiedono di scansionare nuovamente l'impronta o il volto", "Costantemente durante l'intera sessione d'uso analizzando tratti comportamentali", "Solo al momento del login iniziale e poi alla scadenza del timeout della sessione attiva"], ans: 2, expl: "Analizza in background battitura, modo di tenere il telefono, pattern di navigazione. Revoca l'accesso se il comportamento cambia."},
  {q: "Nelle Biometric Payment Cards (Match-on-Card), il template è memorizzato:", opts: ["Nel terminale POS del commerciante", "Nel chip sicuro della carta (Secure Element)", "In un'area protetta del database cloud gestito dal circuito MasterCard/Visa", "Nel cloud del circuito di pagamento"], ans: 1, expl: "Match-on-Card: template nel Secure Element, matching interno alla carta. Nessun dato biometrico trasmesso all'esterno."},
  {q: "I tre fattori classici di autenticazione dell'identità sono:", opts: ["PIN, password e OTP (tutti fattori di conoscenza)", "Volto, impronta e iride (tutti fattori biometrici)", "Token hardware, smart card e certificato X.509 (tutti fattori di possesso)", "Qualcosa che sai, qualcosa che hai, qualcosa che sei"], ans: 3, expl: "Sai (PIN, password), Hai (badge, token RFID), Sei (biometria). Multi-fattore = combinazione di più fattori."},
  {q: "I principali svantaggi dei sistemi biometrici monomodali sono:", opts: ["Costo computazionale elevato del matching e necessità di hardware dedicato per ogni tratto", "Bassa accuratezza intrinseca e impossibilità di operare in modalità di identificazione 1:N", "Elevato FTE e necessità di enrollment multiplo per compensare la scarsa qualità dei campioni", "Rumore nei dati, variazioni intraclasse, non-universalità e vulnerabilità allo spoofing"], ans: 3, expl: "Quattro limiti intrinseci: rumore, variazioni intraclasse, non-universalità, vulnerabilità allo spoofing."},
  {q: "La categoria 'Multiple Instances' nei sistemi multibiometrici indica:", opts: ["Combinazione di tratti fisicamente diversi", "Diverse istanze dello stesso tratto", "Acquisizioni multiple dello stesso identico tratto", "Diversi sensori per lo stesso tratto"], ans: 1, expl: "Multiple Instances = istanze diverse (es. due dita diverse). Multiple Samples = acquisizioni multiple dello stesso tratto."},
  {q: "Il livello di fusione più diffuso nei sistemi multimodali è:", opts: ["Livello Decisione (combinazione booleana Accetta/Rifiuta)", "Livello Matching Score (aggregazione punteggi)", "Livello Sensore, combinando fisicamente i dati raw prima dell'estrazione delle feature", "Livello Feature (fusione vettori)"], ans: 1, expl: "Nel materiale sui sistemi multimodali, il Match Score Level è introdotto esplicitamente come il più diffuso. La precedente formulazione riferita agli ABC non è supportata in modo diretto dai file del corso."},
  {q: "Secondo il materiale del corso, un sistema multimodale gerarchico (a cascata):", opts: ["Acquisisce i tratti in cascata in base al risultato precedente; per ridurre il tempo medio di verifica conviene acquisire prima i tratti più accurati", "Attiva tutti i sensori in parallelo e fonde i risultati a livello di score; per ridurre il tempo si usa la sum rule normalizzata", "Seleziona un solo tratto casualmente a ogni sessione e usa gli altri come backup; l'ordine viene determinato dal quality checker", "Acquisisce prima il tratto più veloce da elaborare e ricorre al più accurato solo quando lo score risulta al di sotto della soglia"], ans: 0, expl: "Nei lucidi i sistemi gerarchici lavorano in cascata a seconda del risultato precedente. Per ridurre il tempo medio di verifica, il corso dice esplicitamente di acquisire per primi i tratti più accurati, non semplicemente quelli più veloci."},
  {q: "Nella Quality-based Fusion, se l'impronta è sporca ma il volto è ben illuminato:", opts: ["Il sistema deve rifiutare l'utente e richiedere una nuova acquisizione completa", "Il sistema deve mediare equamente i due score indipendentemente dalla qualità", "Il sistema deve usare solo l'impronta per coerenza", "Il sistema deve basare la decisione prevalentemente sul volto"], ans: 3, expl: "La fusione intelligente dà più peso al tratto con qualità migliore per evitare falsi rifiuti causati dal rumore."},
  {q: "Assumendo indipendenza tra i due eventi di fallimento, il FTE di un sistema multimodale con impronta (FTE=4%) e iride (FTE=7%) è:", opts: ["0.28% (0.04 × 0.07)", "11% (4% + 7%)", "7% (il peggiore dei due)", "4% (il migliore dei due)"], ans: 0, expl: "Nel materiale del corso il calcolo del FTE multimodale come prodotto dei fallimenti richiede l'ipotesi di indipendenza tra i due eventi. In tal caso: 0.04 × 0.07 = 0.0028 = 0.28%."},
  {q: "Un sistema multimodale può ridurre FTE e FTA rispetto ai singoli sistemi monomodali perché:", opts: ["Se un tratto fallisce l'acquisizione, un altro può comunque funzionare", "Aumenta il numero di tentativi permessi", "Usa sensori più costosi e quindi migliori", "Elimina i falsi rifiuti causati dall'invecchiamento dei singoli tratti"], ans: 0, expl: "La multimodalità offre ridondanza: se un tratto fallisce (FTE/FTA), l'altro compensa."},
  {q: "Per fondere score da matcher con scale diverse (0-1000 e 0-1), prima della sum rule servono:", opts: ["Solo l'omogeneizzazione del significato", "Omogeneizzazione e poi normalizzazione", "Solo la normalizzazione alla stessa scala", "Nessun pre-processing: la sum rule gestisce scale diverse"], ans: 1, expl: "Due passi distinti: prima tutto in distanze O tutto in similitudini, poi stessa scala (es. min-max)."},
  {q: "Nella fusione a livello di Rank, la normalizzazione degli score:", opts: ["È necessaria per convertire i rank in probabilità prima della fusione con la sum rule", "È necessaria solo quando i matcher producono liste di lunghezza diversa tra loro", "È fondamentale per compensare le differenze di scala tra i matcher prima del confronto", "Non è necessaria: il rango è ordinale e dipende solo dall'ordine relativo"], ans: 3, expl: "Il rango è ordinale (1°, 2°, 3°...) → ordine relativo, non valore assoluto. Non serve normalizzare. Svantaggio: si perde l'info sulla magnitudine."},
  {q: "Gli 8 punti di vulnerabilità di un sistema biometrico iniziano con:", opts: ["Il canale di comunicazione esterno", "Il database dei template", "Il modulo di decisione", "Il sensore di acquisizione"], ans: 3, expl: "1) Sensore → 2) Canale sensore-estrattore → 3) Estrattore → 4-5) Matcher → 6) DB → 7) Canale DB → 8) Decisione."},
  {q: "Un Adversarial Attack modifica l'input biometrico in modo:", opts: ["Evidente, per facilitare il debug durante il testing", "Aggiungendo rumore gaussiano uniforme su tutta l'immagine per abbassare il SNR", "Visibile e grossolano, facilmente riconoscibile dall'utente", "Impercettibile all'occhio umano, causando errori macroscopici nel classificatore"], ans: 3, expl: "Perturbazioni impercettibili ma che causano errori macroscopici nel classificatore (misclassificazione o mancato riconoscimento)."},
  {q: "L'attacco di tipo 'Poisoning' agisce durante:", opts: ["Il deployment, modificando l'input al momento dell'uso", "L'enrollment, rubando il template dell'utente", "Il training, modificando i dati di addestramento o le etichette", "Il transito sul canale di comunicazione, iniettando pacchetti alterati nel flusso di rete"], ans: 2, expl: "Evasion = deployment. Poisoning = training (inserisce backdoor). Extraction = ruba il modello. Inference = dati privati."},
  {q: "In un attacco Black Box, l'attaccante genera adversarial examples:", opts: ["Solo su modelli open-source pubblicamente disponibili", "Casualmente, senza alcun modello di riferimento", "Su un modello surrogato, sperando nella transferability al modello target", "Sfruttando un attacco di forza bruta sullo spazio delle feature latenti"], ans: 2, expl: "Black Box = nessun accesso ai parametri del target. Si sfrutta la transferability: attacchi generati su un surrogato possono trasferirsi."},
  {q: "Secondo ISO 30107, una maschera in silicone 3D ultra-realistica personalizzata (alto costo) corrisponde al:", opts: ["Livello 1 (A): attacchi a basso costo", "Livello 2 (B): attacchi a costo medio", "Livello 3 (C): attacchi ad alto costo e massimo realismo", "Nessun livello: non è classificata come Presentation Attack"], ans: 2, expl: "Level 1 = foto/video/carta. Level 2 = maschere commerciali medio costo. Level 3 = su misura, ultra-realistiche, alto costo."},
  {q: "La Liveness Detection verifica se il tratto biometrico appartiene a:", opts: ["Un utente autorizzato con credenziali valide", "Un soggetto vivo e presente al momento dell'acquisizione", "Un template non corrotto nel database", "Un utente che ha aggiornato di recente il proprio template tramite template update"], ans: 1, expl: "Sottoinsieme della PAD: analizza anatomia, fisiologia (rPPG/battito), reazioni involontarie e challenge-response."},
  {q: "L'rPPG (remote photoplethysmography) rileva i deepfake analizzando:", opts: ["I movimenti macroscopici delle espressioni facciali nel dominio temporale", "I metadati EXIF e le tracce di compressione JPEG nel file video analizzato", "La coerenza temporale tra il movimento labiale e la traccia audio sintetica", "Le micro-variazioni di colore sulla pelle causate dal flusso sanguigno"], ans: 3, expl: "L'rPPG rileva pulsazioni cardiache tramite variazioni cromatiche impercettibili. Un deepfake non genera fisiologia sottocutanea."},
  {q: "Negli attacchi non cooperativi all'impronta, il calco viene creato a partire da:", opts: ["Il template numerico estratto dal database e riconvertito in immagine con tecniche inverse", "Tracce latenti rubate da superfici, poi fotografate e elaborate", "Una scansione 3D del dito ottenuta con il consenso del soggetto durante un finto enrollment", "Un'impronta sintetica generata da una GAN addestrata su dataset di impronte pubblici"], ans: 1, expl: "Non cooperativo = impronta rubata da superfici latenti, fotografata, elaborata, stampata → 'gummy fingers'."},
  {q: "Le MasterPrints sono pericolose perché:", opts: ["Contengono virus informatici nascosti nel template", "Hanno caratteristiche così comuni da coincidere casualmente con molti utenti", "Funzionano solo con sensori ottici di vecchia generazione", "Sfruttano vulnerabilità di buffer overflow nei matcher AFIS governativi"], ans: 1, expl: "Impronte con feature molto comuni → 'grimaldello biometrico' che forza sistemi con soglie troppo permissive."},
  {q: "La Challenge-Response contro i deepfake è efficace perché:", opts: ["Un deepfake pre-registrato non può rispondere a sfide casuali e imprevedibili in tempo reale", "Il sistema analizza la coerenza labiale tra audio e video rilevando i ritardi tipici della sintesi vocale", "Le sfide richiedono all'utente di fornire informazioni personali che un sistema generativo non possiede", "Il protocollo confronta i metadati EXIF del video in ingresso con quelli attesi dalla telecamera registrata"], ans: 0, expl: "Sfida casuale e diversa ogni volta. Il deepfake richiede tempo di calcolo → ritardo o distorsioni durante il cambio di posa."},
  {q: "Un Injection Attack si differenzia dallo spoofing fisico classico perché:", opts: ["Compromette il flusso dati digitale sostituendo il segnale della telecamera con un software", "Presenta un artefatto fisico (foto, maschera, gummy finger) direttamente davanti alla telecamera", "Sfrutta vulnerabilità del database SQL per iniettare template falsi nella tabella degli utenti registrati", "Intercetta il canale di comunicazione tra matcher e modulo di decisione alterando lo score trasmesso"], ans: 0, expl: "Injection = frodatore sostituisce il segnale con fotocamera virtuale o inietta codice nella rete, bypassando la cattura live."},
  {q: "Un attaccante proietta un video deepfake su uno schermo davanti alla telecamera biometrica. Questo è:", opts: ["Nessuno dei due: è un attacco informatico", "Esclusivamente spoofing al sensore", "Esclusivamente un attacco deepfake", "Una combinazione di deepfake e spoofing"], ans: 3, expl: "Deepfake = creazione del contenuto sintetico. Spoofing = presentazione dello schermo al sensore. I due si combinano."},
  {q: "La differenza tra attacchi Diretti (Tipo 1) e Indiretti (Tipo 2-8) agli e-Gate è:", opts: ["I Diretti colpiscono il sensore con tratti falsi", "Gli Indiretti colpiscono il sensore, i Diretti il software", "I Diretti sono sempre più pericolosi degli Indiretti", "Non esiste alcuna differenza nel framework di classificazione"], ans: 0, expl: "Diretti (Tipo 1) = spoofing al sensore. Indiretti (Tipo 2-8) = intercettazione canali, manipolazione moduli, corruzione DB."},
  {q: "Una 'bona fide presentation' è:", opts: ["Una presentazione con template pre-registrato", "Una presentazione effettuata con il supporto esplicito di un operatore di sicurezza", "Una presentazione genuina e legittima del tratto biometrico reale al sensore", "Un Presentation Attack di Livello 3"], ans: 2, expl: "Bona fide = presentazione genuina, in buona fede. Si contrappone alla Presentation Attack (tentativo di frode)."},
  {q: "I sistemi di riconoscimento venoso del palmo sono immuni allo spoofing?", opts: ["Sì, è fisicamente impossibile falsificare il pattern venoso", "No, il CCC ha dimostrato che si possono usare fotocamere IR e modelli in cera", "No, i sensori termici possono essere ingannati da pattern venosi riscaldati artificialmente", "Sì, perché usano l'infrarosso che non può essere fotografato"], ans: 1, expl: "CCC 2018: violato Fujitsu PalmSecure con fotocamera IR convertita → immagine venosa rubata → modelli in cera e stampe."},
  {q: "Le minacce principali ai sistemi di verifica vocale (ASV) sono:", opts: ["Solo replay e voice conversion, senza contare la sintesi vocale TTS", "Esclusivamente imitazione umana e sintesi vocale text-to-speech", "Imitazione, replay, voice conversion e sintesi vocale (TTS)", "Solo imitazione (mimicry) e replay di registrazioni audio preesistenti"], ans: 2, expl: "Quattro: Imitazione, Replay, Voice Conversion, TTS. Vall-E (Microsoft) clona una voce con 3 secondi di audio."},
  {q: "Le 4 categorie di manipolazione Deepfake facciale sono:", opts: ["Face Swapping, Face Morphing, Voice Cloning, Facial Attribute Editing", "Face Swapping, Face Reenactment, Talking Face Generation, Facial Attribute Editing", "Face Swapping, Face Reenactment, Face Morphing, Facial Attribute Editing", "Face Reenactment, Talking Face Generation, Facial Attribute Editing, Voice Conversion"], ans: 1, expl: "Swapping (sostituzione volto), Reenactment (manipolazione espressioni), Talking Face (foto+audio), Attribute Editing (singoli tratti)."},
  {q: "Un video deepfake in cui il volto originale resta ma le labbra vengono manipolate per far dire qualcosa di diverso è:", opts: ["Face Swapping", "Face Morphing dinamico generato tramite reti GAN in tempo reale", "Talking Face Generation", "Face Reenactment / Lip-sync manipulation"], ans: 3, expl: "Face Swap = cambia identità. Lip-sync/Reenactment = identità resta, cambia il contenuto del parlato."},
  {q: "La Synthetic Identity Fraud differisce dalla frode d'identità classica perché:", opts: ["Utilizza un'identità reale rubata integrandola con documenti contraffatti per superare i controlli", "Sfrutta vulnerabilità nei protocolli di enrollment biometrico per sovrascrivere template esistenti", "Clona integralmente l'identità digitale di una vittima replicando i suoi template biometrici nel database", "Crea un'identità completamente nuova combinando dati reali rubati con informazioni inventate"], ans: 3, expl: "Classica = furto identità reale completa. Sintetica = identità nuova mixando dati reali (es. CF vero) con dati inventati."},
  {q: "La Re-identificazione (Re-ID) ha come obiettivo:", opts: ["Riconoscere lo stesso individuo in telecamere o momenti diversi senza identità dichiarata", "Aggiornare continuamente il template di un utente nel database man mano che il tratto invecchia", "Registrare nuovi utenti nel database biometrico acquisendo campioni da telecamere diverse", "Cancellare un template compromesso e riacquisire il tratto biometrico con un nuovo sensore"], ans: 0, expl: "Re-ID: collegare apparizioni della stessa persona in inquadrature diverse, senza bisogno di conoscere il nome."},
  {q: "La Person Re-ID (a livello corpo) viene usata al posto del Face Recognition quando:", opts: ["Il sistema opera in modalità 1:1", "Il volto è ben visibile e frontale", "Il volto è distante, non visibile o a bassa risoluzione", "Il soggetto indossa dispositivi di mascheramento come occhiali scuri o sciarpe"], ans: 2, expl: "Person Re-ID = silhouette, outfit, gait. Si usa quando il volto non è disponibile in qualità sufficiente."},
  {q: "La Gait Recognition identifica una persona tramite:", opts: ["La temperatura corporea rilevata durante il movimento", "L'impronta digitale acquisita durante la camminata", "Il modo di camminare (silhouette, ritmo del passo, oscillazione braccia)", "L'analisi dei pattern di pressione plantare tramite solette sensorizzate"], ans: 2, expl: "Statico (silhouette, proporzioni) e Dinamico (cinematica). Utile quando il volto non è visibile."},
  {q: "La tecnica HOOF (Histogram of Oriented Optical Flow) crea:", opts: ["Una sequenza temporale di pose scheletriche estratte frame per frame dalla silhouette del soggetto", "Una firma numerica del movimento basata sugli istogrammi delle direzioni dei vettori di flusso ottico", "Una mappa di calore spazio-temporale che evidenzia le zone a maggiore variazione cinematica", "Un modello probabilistico della cadenza del passo basato sulla trasformata di Fourier del segnale"], ans: 1, expl: "HOOF = vettori flusso ottico raggruppati in istogrammi per direzione → firma robusta del movimento."},
  {q: "La Proof of Personhood (PoP) differisce dall'autenticazione biometrica perché:", opts: ["La PoP richiede sempre l'identificazione nominale e un documento d'identità valido", "L'autenticazione verifica l'umanità del soggetto, la PoP verifica la sua identità anagrafica", "La PoP verifica che sei un umano unico e reale, non necessariamente chi sei", "La PoP usa esclusivamente tratti comportamentali, l'autenticazione solo tratti fisiologici"], ans: 2, expl: "Autenticazione: 'sei chi dici?'. PoP: 'sei un umano reale e unico?' Può essere anonima (WorldCoin con ZKP)."},
  {q: "Secondo il materiale del corso, nella blockchain di WorldCoin viene registrata:", opts: ["Una prova crittografica dell'esistenza/unicità umana, non il nome dell'utente", "L'IrisCode completo dell'utente cifrato con la chiave pubblica dell'Orb che lo ha acquisito", "La foto originale dell'iride acquisita dall'Orb, compressa e firmata digitalmente dal dispositivo", "Un template biometrico reversibile che consente la riacquisizione dell'iride in caso di smarrimento"], ans: 0, expl: "Il materiale dice che il codice viene inviato nel database globale/blockchain e chiarisce che sulla blockchain non finisce il nome, ma una prova crittografica della tua esistenza umana. La foto originale viene cancellata dall'Orb."},
  {q: "Dopo l'enrollment iniziale con l'Orb di WorldCoin, per usare i servizi l'utente deve:", opts: ["Autenticarsi sull'Orb più vicino per generare una nuova prova a conoscenza zero", "Tornare periodicamente all'Orb per riacquisire l'iride", "Presentare un documento d'identità cartaceo", "Usare il World ID dallo smartphone tramite ZKP, senza più bisogno dell'Orb"], ans: 3, expl: "L'Orb serve solo per l'enrollment. Dopo: World ID su smartphone, autenticazione via ZKP."},
  {q: "BeCAPTCHA si distingue dal CAPTCHA classico perché:", opts: ["Analizza i micro-movimenti del mouse e i pattern di battitura sulla tastiera del PC", "Analizza il comportamento motorio dell'utente sullo smartphone", "Richiede un login biometrico con impronta o volto", "Usa puzzle matematici di complessità crescente"], ans: 1, expl: "BeCAPTCHA = puramente comportamentale, nessun puzzle visivo. Usa GAN per un ciclo attacco/difesa continuo."},
  {q: "reCAPTCHA v3 analizza il comportamento dell'utente su una pagina web tramite:", opts: ["L'analisi della cronologia di navigazione recente e la correlazione con i pattern di acquisto dell'utente", "Segnali come la traiettoria del mouse all'apertura, il pattern di scroll e il timing di digitazione vs paste nei campi", "L'impronta digitale del browser (canvas fingerprint, font installati) confrontata con un database di bot noti", "La verifica della coerenza tra indirizzo IP, fuso orario del dispositivo e lingua del sistema operativo"], ans: 1, expl: "Segnali concreti: baseline all'apertura pagina, comportamento durante scroll, focus su campo + typing vs paste."},
  {q: "La Deepfake Detection e l'Inverse Turing Test NON sono la stessa cosa perché:", opts: ["Entrambi verificano solo il comportamento dell'interlocutore", "Entrambi analizzano solo il contenuto video", "Sono esattamente equivalenti ma con nomi diversi", "L'ITT verifica se l'interlocutore è umano o bot"], ans: 3, expl: "ITT = 'chi sta interagendo è umano o bot?' (biometria comportamentale). Deepfake Detection = 'questo media è sintetico?' (computer vision)."},
  {q: "Nel contesto World ID, 'Face Auth' è:", opts: ["Un meccanismo per verificare che il dispositivo sia ancora in possesso del legittimo proprietario del World ID, senza l'Orb", "Il protocollo di enrollment iniziale che registra il volto dell'utente nell'Orb e genera la prova crittografica", "Il sistema di recupero dell'account World ID che confronta un selfie con l'IrisCode memorizzato sulla blockchain", "Il modulo anti-spoofing integrato nell'Orb che analizza la texture facciale con sensori NIR e di profondità"], ans: 0, expl: "Face Auth verifica il possesso del World ID tramite il volto, senza necessità di tornare all'Orb."},
  {q: "Nella firma dinamica (online), il Dynamic Time Warping (DTW) è necessario perché:", opts: ["Due firme della stessa persona possono avere velocità e ritmi locali diversi pur essendo autentiche", "Le firme tendono a dilatarsi o restringersi globalmente a seconda dello spazio disponibile sulla tavoletta", "La firma è un tratto fisiologico invariante e il DTW compensa solo le differenze di risoluzione del sensore", "Il DTW elimina il rumore ad alta frequenza introdotto dal digitalizzatore hardware durante l'acquisizione"], ans: 0, expl: "La firma varia in velocità e ritmo locale ad ogni esecuzione. Il DTW allinea temporalmente due sequenze con velocità diverse."},
