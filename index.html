  {q: "Una firma dinamica acquisisce, oltre alla forma grafica:", opts: ["La postura complessiva della mano e del polso rispetto al piano della tavoletta grafica", "Esclusivamente la traiettoria spaziale 2D e la sequenza dei tratti nell'ordine di esecuzione", "Parametri temporali come velocità, accelerazione, inclinazione e pressione della penna nel tempo", "Le coordinate 3D della punta della penna ricostruite tramite sensori inerziali integrati nello stilo"], ans: 2, expl: "La firma online cattura velocità, accelerazione, inclinazione, pressione, tempo — tutti nel dominio temporale. Molto più ricca della offline."},
  {q: "Nella firma offline, tecniche come Extended Shadow Code e Adaptive SIFT-SURF servono per:", opts: ["Acquisire la firma in tempo reale dalla tavoletta grafica durante la sessione", "Cifrare il template della firma per garantire la protezione della privacy", "Estrarre feature discriminanti dall'immagine statica della firma", "Convertire la firma offline in una sequenza temporale equivalente alla firma online"], ans: 2, expl: "La firma offline ha solo l'immagine statica: servono tecniche di estrazione feature visive per il matching."},
  {q: "Voce, mano e firma come tratti biometrici condividono:", opts: ["Alta resistenza allo spoofing grazie alla componente comportamentale difficile da replicare", "Elevata permanenza nel tempo, comparabile a quella dell'iride e delle impronte digitali", "Alta unicità inter-individuale, sufficiente per l'identificazione 1:N anche su database nazionali", "Bassa unicità e permanenza relativa, adatti principalmente ad autenticazione 1:1 o 1:N con N piccolo"], ans: 3, expl: "Sono tratti con discriminatività inferiore a iride/impronta. Adatti a verifica o identificazione su piccola scala, non 1:N con milioni."},
  {q: "Mano, volto, voce e firma vengono usati soprattutto in autenticazione 1:1 e non in identificazione 1:N grande perché:", opts: ["Richiedono sensori costosi e specializzati che non sono disponibili su larga scala nei punti di accesso", "La variabilità intraclasse è troppo bassa, causando un eccesso di false accettazioni nei confronti 1:N", "Hanno unicità relativamente bassa: la discriminatività non è sufficiente per distinguere tra milioni di individui", "Soffrono di un FTE troppo elevato per essere utilizzati come tratto primario in sistemi di identificazione"], ans: 2, expl: "Tratti con discriminatività limitata: sufficienti per verificare un claim (1:1) ma non per cercare tra milioni di persone."},
  {q: "La differenza tra identity claim esplicita e implicita è:", opts: ["Non esiste alcuna differenza nel framework biometrico", "L'implicita richiede sempre un documento d'identità", "L'esplicita usa la biometria, l'implicita usa le password", "Nell'esplicita l'utente dichiara la propria identità"], ans: 3, expl: "Esplicita: l'utente fornisce attivamente un identificatore. Implicita: il sistema deduce l'identità senza dichiarazione (es. riconoscimento facciale passivo)."},
  {q: "Un 'zero-effort impostor attempt' è:", opts: ["Un tentativo in cui un impostore casuale presenta il proprio tratto genuino senza tentare di imitare la vittima", "Un tentativo in cui l'impostore presenta un artefatto biometrico generico non personalizzato sulla vittima", "Un tentativo in cui l'impostore sfrutta una vulnerabilità nota del matcher senza presentare alcun tratto", "Un tentativo in cui l'impostore replica il tratto della vittima usando una tecnica di spoofing a basso costo"], ans: 0, expl: "Zero-effort: l'impostore non fa nulla di speciale, presenta semplicemente il proprio tratto. Active impostor: tenta attivamente di imitare/frodare."},
  {q: "In un sistema biometrico distribuito, il modulo tipicamente remoto è:", opts: ["Il modulo di decisione", "Il display per l'utente", "Il database dei template e/o il modulo di matching", "Il modulo di Feature Extraction, per scaricare il carico computazionale dai client leggeri"], ans: 2, expl: "In sistemi distribuiti, il matching e il DB sono spesso remoti (server). Il sensore è locale dove si trova l'utente."},
  {q: "In un sistema on-card, sulla smart card risiedono:", opts: ["Solo il template, senza capacità di matching", "Template e software di matching solo nel caso specifico Match-on-Card", "Solo il software di matching senza dati biometrici", "Nessun dato biometrico: tutto è nel server centrale"], ans: 0, expl: "Nel sistema on-card generico il template risiede sulla carta; il matching può essere esterno. Quando anche il motore di matching è sulla carta si parla più precisamente di Match-on-Card."},
  {q: "La differenza tra on-card generico e Match-on-Card specifico è:", opts: ["Sono la stessa cosa: entrambi indicano matching e storage sulla carta", "On-card può significare solo storage del template", "On-card è sempre più sicuro del Match-on-Card grazie alla cifratura HW", "Match-on-Card memorizza il template sul server, non sulla carta stessa"], ans: 1, expl: "On-card = termine generico (almeno il template sulla carta). Match-on-Card = il matching engine è ANCHE sulla carta."},
  {q: "La differenza tra Eigenfaces e l'approccio ad attributi nel riconoscimento del volto è:", opts: ["Le Eigenfaces sono un tipo di attributo", "Le Eigenfaces rappresentano il volto in uno spazio ridotto tramite PCA", "Entrambi estraggono vettori numerici ma le Eigenfaces lavorano a livello locale anziché globale", "L'approccio ad attributi usa solo il colore della pelle"], ans: 1, expl: "Eigenfaces = approccio olistico (PCA sullo spazio dei volti). Attributi = codifica di proprietà semantiche discrete del volto."},
  {q: "La differenza tra BrightID, Proof of Humanity e Human Passport è:", opts: ["Tutte si basano sulla scansione dell'iride tramite hardware proprietario per la verifica dell'unicità", "BrightID usa il riconoscimento facciale, Proof of Humanity la voce, Human Passport le impronte digitali", "Usano approcci diversi alla PoP: BrightID si basa su vouching sociale, Proof of Humanity su video+vouching", "Proof of Humanity e Human Passport usano vouching sociale, mentre BrightID si basa su biometria dell'iride"], ans: 2, expl: "Sono approcci diversi alla Proof of Personhood: vouching sociale, video+comunità, biometria+crittografia."},
  {q: "L'Orb di WorldCoin effettua la liveness detection usando:", opts: ["L'analisi delle micro-variazioni cromatiche della pelle causate dal flusso sanguigno tramite rPPG", "Sensori NIR e sensori di profondità per verificare la tridimensionalità e la presenza fisica reale del soggetto", "Un protocollo challenge-response che impone all'utente di eseguire un task specifico mostrato sul display", "L'analisi della riflessione speculare e della dilatazione pupillare provocata da un flash visibile pulsato"], ans: 1, expl: "L'Orb usa NIR + sensori di profondità per distinguere un occhio vero (3D, riflessi NIR coerenti) da foto, schermi o protesi."},
  {q: "L'Orb di WorldCoin usa specificamente la luce NIR e sensori di profondità perché:", opts: ["Il NIR penetra la cornea raggiungendo la retina, e i sensori di profondità misurano lo spessore del cristallino", "I sensori di profondità ricostruiscono la mappa venosa perioculare e il NIR verifica la vitalità del tessuto", "Il NIR misura la dilatazione pupillare dinamica e i sensori di profondità calcolano la distanza interpupillare", "Il NIR rivela la tessitura dell'iride e i sensori di profondità verificano la tridimensionalità contro foto e schermi piatti"], ans: 3, expl: "NIR = tessitura iride indipendente dal colore. Profondità = 3D → scarta foto, schermi, protesi piatte."},
  {q: "Le categorie di metodi per la Proof of Personhood oltre alla biometria includono:", opts: ["Riconoscimento vocale, analisi della firma dinamica, scansione retinica e verifica documentale", "Vouching sociale, challenge comportamentali, dispositivi hardware sicuri, verifica documentale", "Challenge cognitivi, verifica documentale, riconoscimento facciale e analisi della digitazione", "Vouching sociale, riconoscimento dell'iride, challenge comportamentali e token crittografici"], ans: 1, expl: "La PoP combina: biometria, vouching sociale, challenge comportamentali, HW sicuro, verifica documentale."},
  {q: "La differenza tra 'decision error rates' e 'matching errors' è:", opts: ["Sono sinonimi perfetti", "I decision errors sono sempre inferiori ai matching errors", "I matching errors includono i FTA, i decision errors no", "I matching errors sono algoritmici (FMR/FNMR)"], ans: 3, expl: "Matching errors = errori algoritmici puri (FMR/FNMR). Decision error rates = nel riconoscimento positivo corrispondono a FAR/FRR. FTA e FTE rientrano in una terza categoria separata: image acquisition errors."},
  {q: "I sistemi biometrici distribuiti sono comuni nell'identificazione e rari nell'autenticazione perché:", opts: ["L'identificazione 1:N richiede accesso a un database centrale ampio", "L'autenticazione richiede sempre più potenza di calcolo", "Non esiste alcuna correlazione tra architettura e modalità operativa", "L'identificazione è sempre più veloce dell'autenticazione"], ans: 0, expl: "1:N necessita del DB completo → tipicamente su server remoto. 1:1 può funzionare con solo il template locale (es. on-card, on-sensor)."},
  {q: "Nel modulo di matching, la decisione a soglia (score ≥ T → accetta) fa parte del matching module stesso?", opts: ["No, la decisione è delegata a un modulo esterno che applica policy di sicurezza contestuali", "No, il matching restituisce solo la lista ordinata dei candidati senza confronto con soglia", "Sì, nel modello classico il modulo di matching comprende anche la decisione basata sulla soglia", "No, il matching calcola solo lo score e la decisione è sempre gestita dal sistema operativo"], ans: 2, expl: "Nel modello classico del corso, il modulo di matching include sia il calcolo dello score sia l'algoritmo di decisione, tipicamente il confronto con una soglia."},
  {q: "La template selection durante l'enrollment differisce dal template update durante l'autenticazione perché:", opts: ["La selection sceglie i campioni migliori alla registrazione", "Sono la stessa operazione eseguita in momenti diversi", "La selection aggiorna i template, l'update li seleziona", "Nessuna delle due è realmente implementata nei sistemi commerciali"], ans: 0, expl: "Selection = enrollment (scegli i migliori campioni iniziali). Update = uso quotidiano (aggiungi nuovi campioni dopo match ad alta confidenza)."},
  {q: "La template selection manuale durante l'enrollment può essere utile perché:", opts: ["Consente di acquisire un numero maggiore di campioni per aumentare la robustezza del template finale", "Velocizza il processo di enrollment riducendo il numero di acquisizioni necessarie per ogni utente", "Garantisce la privacy escludendo automaticamente i campioni che contengono informazioni sensibili", "Permette a un operatore esperto di scartare campioni di scarsa qualità che il sistema potrebbe non rilevare"], ans: 3, expl: "Un operatore può identificare problemi qualitativi (es. dito sporco, posa scorretta) che il quality checker automatico potrebbe non rilevare."},
  {q: "La differenza tra template update online e offline è:", opts: ["L'online richiede la supervisione di un operatore, l'offline è automatico", "L'offline avviene in tempo reale ad ogni accesso, l'online in batch periodici", "L'update online avviene in tempo reale durante l'uso", "L'online aggiorna solo il template, l'offline riaddestra anche il matcher"], ans: 2, expl: "Online = real-time durante ogni accesso riuscito. Offline = batch periodici, con analisi più approfondita dei nuovi campioni."},
  {q: "La differenza tra approccio supervisionato e semi-supervisionato nel template update è:", opts: ["Nel supervisionato un operatore valida i nuovi campioni", "Il supervisionato non usa mai dati biometrici", "Non esiste alcuna differenza", "Il semi-supervisionato richiede sempre un operatore umano"], ans: 0, expl: "Supervisionato = operatore umano che valida. Semi-supervisionato = auto-update quando lo score supera una soglia molto severa (self-update)."},
  {q: "La variabilità intraclasse rappresenta:", opts: ["La differenza tra tratti biometrici di tipo diverso dello stesso individuo", "La somiglianza tra campioni di persone diverse che causa false accettazioni", "La differenza tra più acquisizioni dello stesso tratto della stessa persona", "La variazione del rumore ambientale che influenza la qualità dell'acquisizione"], ans: 2, expl: "Intraclasse = stessa persona, acquisizioni diverse (rumore, posa, invecchiamento). Interclasse = persone diverse che si somigliano."},
  {q: "La similitudine interclasse indica:", opts: ["Il livello di correlazione tra le feature estratte da due tratti biometrici diversi della stessa persona", "La variabilità tra acquisizioni dello stesso individuo", "L'elevata somiglianza tra campioni di individui del tutto diversi", "La correlazione tra illuminazione e qualità del template"], ans: 2, expl: "Interclasse = persone diverse ma con tratti simili. Bassa distanza interclasse → difficoltà di discriminazione → più false acceptance."},
  {q: "Se il Quality Checker valuta un campione come di qualità insufficiente, il sistema deve:", opts: ["Procedere comunque con il matching usando una soglia più bassa", "Terminare la sessione e bloccare l'utente", "Richiedere all'utente una nuova acquisizione", "Memorizzare il campione nel database per futura analisi"], ans: 2, expl: "Se la qualità è insufficiente → riacquisizione. Usare un campione scadente aumenterebbe FMR e FNMR."},
  {q: "Il volto è un tratto difficile da riconoscere in modo robusto perché:", opts: ["Subisce forti variazioni per illuminazione, posa, espressione, invecchiamento e occlusioni", "Ha un numero di feature discriminanti troppo elevato per i classificatori lineari standard", "La distanza interclasse è troppo alta e causa un eccesso sistematico di falsi rifiuti", "I sensori RGB richiedono calibrazioni frequenti che degradano la ripetibilità dell'acquisizione"], ans: 0, expl: "Il volto varia enormemente per illuminazione, posa, espressione, invecchiamento, accessori. Alta variabilità intraclasse."},
  {q: "L'anti-spoofing con dilatazione pupillare è un metodo con:", opts: ["Iride statica e imaging attivo", "Iride dinamica e imaging attivo", "Iride statica e imaging passivo", "Iride dinamica e imaging passivo"], ans: 1, expl: "Dinamica (osserva cambiamento pupilla nel tempo) + imaging attivo (illuminazione variata per provocare la dilatazione)."},
  {q: "L'analisi FFT di una singola immagine per rilevare pattern Moiré è un metodo con:", opts: ["Iride statica e imaging attivo", "Iride statica e imaging passivo", "Iride dinamica e imaging attivo", "Iride dinamica e imaging passivo"], ans: 1, expl: "Statica (singola immagine) + passivo (nessuno stimolo al soggetto). Le micro-saccadi invece sarebbero dinamiche+passive."},
  {q: "Le GAN (Generative Adversarial Networks) in biometria possono:", opts: ["Solo attaccare i sistemi esistenti", "Solo difendere i sistemi dagli attacchi", "Generare dati sintetici per arricchire i dataset di training", "Sostituire completamente l'estrattore di feature tradizionale con un classificatore puramente generativo"], ans: 2, expl: "Le GAN generano volti sintetici realistici per simulare condizioni difficili e arricchire i dataset di addestramento."},
  {q: "I pericoli di riutilizzare modelli pre-addestrati in biometria includono:", opts: ["Nessun pericolo: è sempre vantaggioso", "Il degrado inaccettabile della velocità di elaborazione durante la fase di inference in tempo reale", "L'impossibilità matematica di applicare la loss ArcFace su pesi pre-addestrati con Softmax", "L'importazione di bias intrinseci e la potenziale vulnerabilità ad attacchi avversari mirati"], ans: 3, expl: "Bias del dataset originale (accuratezza disomogenea per etnia/età) + vulnerabilità ad Adversarial Attacks."},
  {q: "La distanza Cosine Similarity è spesso preferita alla Euclidea nel matching neurale perché:", opts: ["Funziona solo con CNN e non con altre architetture", "Produce sempre risultati numericamente superiori alla Euclidea", "Si concentra sulla direzione dei vettori anziché sulla magnitudine", "Richiede hardware GPU dedicato molto più costoso rispetto al calcolo della distanza Euclidea"], ans: 2, expl: "Cosine = angolo tra vettori → robusta per rappresentazioni ad alta dimensionalità dove la magnitudine può variare."},
  {q: "La Sicurezza e la Privacy in un sistema biometrico sono:", opts: ["Concetti sovrapposti: la Privacy include autenticazione e la Sicurezza include il consenso", "Concetti distinti: la Sicurezza garantisce autenticazione e integrità", "Concetti complementari: la Sicurezza protegge i dati e la Privacy ne regola l'accesso fisico", "Concetti equivalenti: entrambe mirano a impedire l'accesso non autorizzato al template"], ans: 1, expl: "Sicurezza = autenticazione, integrità, confidenzialità, non ripudio. Privacy = in più: protezione dati personali + controllo/consenso."},
  {q: "Lo Sharenting è un rischio biometrico perché:", opts: ["I minori usano i dispositivi biometrici dei genitori creando conflitti nei template del sistema", "I genitori iscrivono i figli a servizi che richiedono enrollment biometrico senza il loro consenso", "Le app di parental control acquisiscono e memorizzano dati biometrici dei minori senza cifratura", "La pubblicazione compulsiva di foto dei figli sui social espone i loro dati biometrici fin dalla nascita"], ans: 3, expl: "Foto ad alta risoluzione sui social = dataset gratuiti per IA biometriche. Sharenting espone l'identità dei minori."},
  {q: "I dati di processo aziendali (timestamp, velocità, errori) possono diventare tracciamento biometrico illegale quando:", opts: ["Vengono usati esclusivamente per report mensili aggregati senza riferimento a singoli dipendenti", "Sono condivisi internamente in riunione di team per analisi collettiva delle prestazioni di gruppo", "Vengono aggregati e confrontati nel tempo per profilare un singolo individuo in modo occulto", "L'analisi comportamentale sul posto di lavoro è sempre esclusa dal GDPR indipendentemente dall'uso"], ans: 2, expl: "Se usati per profilare/monitorare la produttività individuale in modo occulto → tracciamento biometrico illegale."},
  {q: "Il framework classico degli attacchi biometrici distingue tra:", opts: ["Attacchi diretti al sensore e attacchi indiretti al database", "Attacchi al sistema e attacchi sugli ingressi", "Attacchi cooperativi e attacchi non cooperativi", "Attacchi passivi di intercettazione e attacchi attivi di iniezione"], ans: 1, expl: "Due pilastri: attacchi al sistema (DoS, manomissione HW, violazione rete) e attacchi sugli ingressi (spoofing/PAD, adversarial)."},
  {q: "L'evoluzione degli standard video H.264 → H.265 → H.266 punta a:", opts: ["Aumentare la risoluzione massima supportata mantenendo lo stesso bitrate e la stessa CPU", "Spostare l'elaborazione del codec interamente lato server per alleggerire le telecamere edge", "Dimezzare il bitrate a parità di qualità, a costo di maggiore potenza di calcolo", "Ridurre i costi hardware dei decoder eliminando la necessità di GPU dedicate per la decodifica"], ans: 2, expl: "Ogni generazione dimezza circa il bitrate mantenendo la qualità, ma richiede CPU/GPU più potenti per la decodifica."},
  {q: "OSNet (Omni-Scale Network) è un'architettura progettata specificamente per:", opts: ["Il riconoscimento dell'iride tramite filtri multi-scala adattati alla texture locale", "Il rilevamento e tracciamento di veicoli in scenari di sorveglianza autostradale", "La Person Re-ID, catturando informazioni a scale multiple contemporaneamente", "La generazione di embedding vocali robusti per la verifica del parlante in ambienti rumorosi"], ans: 2, expl: "OSNet cattura dettagli locali e globali simultaneamente per generare un embedding vettoriale per la Re-ID."},
  {q: "Lo standard ONVIF serve per:", opts: ["Standardizzare il formato dei template biometrici per l'interscambio tra database governativi", "Definire le metriche di qualità delle immagini biometriche acquisite da sensori certificati", "Garantire interoperabilità tra dispositivi di sicurezza su rete di produttori diversi", "Cifrare i template biometrici in transito tra il sensore e il server di matching remoto"], ans: 2, expl: "ONVIF = standard universali per interoperabilità tra telecamere, sensori e sistemi di accesso di vendor diversi."},
  {q: "L'Intelligent Face Compression applica:", opts: ["Solo compressione dello sfondo, lasciando il volto non compresso", "Nessuna compressione: trasmette l'immagine raw", "Compressione minore sui volti e maggiore sullo sfondo", "Compressione uniforme su tutta l'immagine"], ans: 2, expl: "Mantiene alta qualità sui volti (dettagli cruciali) e comprime lo sfondo statico per risparmiare banda."},
  {q: "La strategia 'Zero Trust' per la prevenzione frodi si basa su:", opts: ["Mai fidarsi, verificare sempre lungo tutto il ciclo di vita del cliente", "Usare esclusivamente biometria fisiologica", "Bloccare tutti gli accessi esterni alla rete", "Affidarsi esclusivamente alla crittografia end-to-end senza controlli sui client"], ans: 0, expl: "Validazione continua dell'identità, biometria comportamentale per bot, IA per anomalie invisibili all'occhio umano."},
  {q: "Il rischio 'Harvest Now, Decrypt Later' riguarda:", opts: ["La raccolta di dati cifrati oggi per decifrarli con futuri computer quantistici", "L'uso di template biometrici estratti da volti pre-puberali che cambieranno crescendo", "L'obsolescenza programmata dei sensori biometrici", "L'accumulo di template in formato non crittografato su server cloud insicuri"], ans: 0, expl: "Attaccanti archiviano dati criptati oggi, in attesa che i computer quantistici rompano la crittografia attuale."},
  {q: "L'autenticazione acustica (VoiceGesture, LipPass) usa lo smartphone come:", opts: ["Sonar Doppler che emette suoni ad alta frequenza e analizza i riflessi dei movimenti labiali", "Telecamera frontale per analizzare il movimento labiale e confrontarlo con un modello visivo registrato", "Microfono direzionale per registrare e confrontare le caratteristiche spettrali della voce dell'utente", "Altoparlante che emette una sequenza challenge audio e microfono che verifica la risposta vocale corretta"], ans: 0, expl: "Emette suoni ~20kHz e analizza i riflessi dal microfono durante il parlato → mappa i gesti articolatori unici."},
  {q: "Qual è la differenza tra un 'genuine attempt' e un 'impostor attempt'?", opts: ["Il genuine è più lento dell'impostor", "L'autenticazione è intrinsecamente più vulnerabile agli attacchi di spoofing su rete pubblica", "Sono la stessa cosa: entrambi sono tentativi legittimi", "Nel genuine l'utente presenta il proprio tratto reale"], ans: 3, expl: "Genuine = utente legittimo che presenta il proprio tratto. Impostor = qualcuno che (intenzionalmente o meno) presenta un tratto che non corrisponde al template."},
  {q: "Un sistema distribuito per l'identificazione 1:N è più comune di uno per l'autenticazione 1:1 perché:", opts: ["L'identificazione richiede un database centrale ampio accessibile via rete", "L'autenticazione 1:1 richiede più potenza di calcolo distribuita su più nodi", "L'identificazione necessita di latenza minima ottenibile solo con architetture edge", "L'autenticazione 1:1 non è compatibile con i protocolli di rete standard"], ans: 0, expl: "1:N necessita del DB completo → server remoto. 1:1 può usare template locale (on-card, on-sensor)."},
  {q: "Le tre fasi di test standardizzate per valutare un sistema biometrico sono:", opts: ["Training, Validation, Testing", "Enrollment, Verification, Identification", "Technology, Scenario, Operational", "Accuracy, Speed, Security"], ans: 2, expl: "Technology (algoritmi), Scenario (simulazioni controllate), Operational (valutazione reale sul campo)."},
  {q: "Lo Zoo di Doddington: le 'Capre' (Goats) causano:", opts: ["Molti falsi rifiuti a causa di alta variabilità intraclasse", "Nessun problema di riconoscimento", "False accettazioni per somiglianza con altri", "Saturazione del database a causa della continua necessità di template update"], ans: 0, expl: "Pecore = ideali. Capre = molti falsi rifiuti. Agnelli = false accettazioni passive. Lupi = manipolazione attiva."},
  {q: "Nello Zoo di Doddington, gli Agnelli (Lambs) causano false accettazioni perché:", opts: ["Presentano alta variabilità intraclasse che confonde il matcher durante il confronto con la gallery", "Manipolano intenzionalmente il proprio tratto biometrico per impersonare un altro utente registrato", "Hanno un tratto biometrico instabile che produce score molto diversi a ogni acquisizione successiva", "Hanno bassa distanza interclasse naturale, risultando simili ad altri per caso"], ans: 3, expl: "Lamb = naturalmente simile ad altri → false acceptance senza intenzione fraudolenta. I Lupi invece frodano attivamente."},
  {q: "Nello Zoo di Doddington, i Lupi (Wolves):", opts: ["Hanno bassa variabilità intraclasse", "Manipolano intenzionalmente il tratto per frodare il sistema", "Generano molti falsi rifiuti per variabilità", "Sfruttano vulnerabilità del software di matching per forzare un buffer overflow"], ans: 1, expl: "I Lupi manipolano attivamente il tratto (soprattutto comportamentale) per impersonare un altro utente."},
  {q: "Il Rank-1 nella curva CMC indica:", opts: ["La percentuale di volte in cui l'identità corretta è al primo posto della lista", "La probabilità di trovare l'identità corretta tra le prime 5 posizioni", "Il rapporto percentuale tra false accettazioni e tentativi genuini al primo tentativo", "La soglia ottimale per il sistema"], ans: 0, expl: "Rank-1 = identità corretta al primo posto. Rank-5 = tra le prime cinque posizioni."},
  {q: "Nella rivendicazione d'identità, la Positiva e la Negativa differiscono perché:", opts: ["Nella Positiva l'utente dichiara di essere registrato", "La Negativa è sempre più veloce della Positiva", "La Positiva usa la biometria, la Negativa le password", "Sono la stessa cosa con nomi diversi"], ans: 0, expl: "Positiva: 'sono nel sistema, fatemi entrare'. Negativa: 'non sono nel sistema, non ho già richiesto questo servizio'."},
  {q: "Il Penetration Rate in un algoritmo di Binning indica:", opts: ["Il tasso di errore del classificatore nella fase iniziale di assegnazione al bin", "La percentuale del database che deve essere scansionata per completare una ricerca", "La velocità di acquisizione del sensore misurata in campioni elaborati al secondo", "Il rapporto tra falsi rifiuti e false accettazioni all'interno di un singolo bin"], ans: 1, expl: "Rate basso = sistema veloce. Si valuta come il rapporto tra confronti necessari e dimensione totale del DB."},
  {q: "Le minutiae più utilizzate nei sistemi automatici di impronte (Livello II) sono:", opts: ["Core e Delta", "Arch, Loop e Whorl", "Terminazioni e biforcazioni", "L'orientamento globale dei ridge e la frequenza spaziale"], ans: 2, expl: "Ne esistono 150+ tipologie, ma i sistemi automatici (FBI) usano principalmente terminazioni e biforcazioni."},
  {q: "Il Crossing Number CN=1 in un'immagine binarizzata di impronta indica:", opts: ["Una biforcazione", "Un punto su un ridge normale", "Un poro sudoriparo isolato dal resto della cresta", "Una terminazione (fine cresta)"], ans: 3, expl: "CN=1 → terminazione. CN=2 → ridge normale (nessuna minutia). CN=3 → biforcazione."},
  {q: "Il Crossing Number CN=2 indica:", opts: ["Un delta, ovvero il punto di divergenza tra tre creste papillari", "Un punto su un ridge normale, non una minutia", "Una minutia complessa formata da due biforcazioni adiacenti sullo stesso ridge", "Una biforcazione, ovvero il punto in cui un ridge si divide in due rami"], ans: 1, expl: "CN=2 = punto su ridge normale, NON è una minutia. Trappola: lo studente potrebbe pensare che ogni CN sia una minutia."},
  {q: "Le tre macro-categorie di classificazione delle impronte al Livello I (globale) sono:", opts: ["Minutia, Ridge, Valley", "Arch, Loop, Whorl", "Core, Delta, Ridge", "Terminazione, Biforcazione, Punto isolato"], ans: 1, expl: "Arch (arco), Loop (cappio), Whorl (vortice). La A è Livello II."},
  {q: "Il Livello III dell'impronta (pori, conformazioni intra-cresta) richiede una risoluzione minima di:", opts: ["Qualsiasi risoluzione è sufficiente", "1000 DPI", "500 DPI", "250 DPI"], ans: 1, expl: "Dettagli microscopici → sensori ottimi e almeno 1000 DPI. Il 500 DPI è sufficiente per il Livello II (minutiae)."},
  {q: "Il Quality Checker nel flusso biometrico si posiziona:", opts: ["Subito dopo l'acquisizione, per verificare la bontà del campione prima dell'estrazione delle feature", "Tra l'estrazione delle feature e il matching, per filtrare i vettori con entropia insufficiente", "Prima dell'acquisizione, per calibrare automaticamente i parametri del sensore sul soggetto", "Dopo il matching, per scartare gli score generati da campioni con rapporto segnale/rumore basso"], ans: 0, expl: "Il Quality Checker valuta il campione appena acquisito. Se la qualità è insufficiente → riacquisizione."},
  {q: "La funzione di attivazione ReLU in una CNN:", opts: ["Converte l'output dell'ultimo strato in probabilità percentuali normalizzate per ogni classe", "Azzera i valori negativi mantenendo intatti i positivi, velocizzando l'addestramento", "Moltiplica tutti i valori per un fattore di scala appreso durante la fase di backpropagation", "Normalizza l'output tra 0 e 1 per facilitare la convergenza della loss function durante il training"], ans: 1, expl: "ReLU = max(0, x). Semplifica l'apprendimento. Non confondere con Softmax (probabilità) o Pooling (riduzione dimensione)."},
  {q: "La funzione Softmax nell'ultimo strato di una CNN serve per:", opts: ["Azzezzare i valori negativi", "Convertire i valori grezzi in probabilità percentuali per ogni classe", "Ridurre la dimensionalità dei dati", "Massimizzare la distanza inter-classe e minimizzare la distanza intra-classe nell'embedding"], ans: 1, expl: "Softmax trasforma il vettore di output in probabilità (somma = 100%) per decretare la classe vincente."},
  {q: "Il Pooling (Max-Pooling) in una CNN serve per:", opts: ["Convertire l'immagine in scala di grigi prima di passarla ai filtri di convoluzione", "Estrarre feature di livello superiore combinando i risultati di più filtri convoluzionali", "Ridurre le dimensioni spaziali e rendere il sistema invariante a piccole traslazioni", "Applicare i filtri di convoluzione con stride variabile per aumentare il campo recettivo"], ans: 2, expl: "Pooling riduce dimensioni, abbatte parametri, e dà robustezza a piccoli spostamenti dell'oggetto nell'immagine."},
  {q: "L'architettura dominante per i tratti fisiologici basati su immagini (volto, iride, impronta) è:", opts: ["SVM (Support Vector Machines) con kernel RBF radiale", "CNN (Reti Neurali Convoluzionali)", "KNN (K-Nearest Neighbors)", "RNN (Reti Neurali Ricorrenti)"], ans: 1, expl: "Le CNN sono lo standard assoluto per elaborare immagini: filtri spaziali + pooling codificano pattern locali e globali."},
  {q: "AlexNet è storicamente importante perché:", opts: ["È l'unica rete convoluzionale che non richiede operazioni di pooling spaziale", "È stata progettata specificamente per l'estrazione di minutiae dalle impronte digitali", "Riesce a completare l'addestramento su ImageNet senza l'uso di schede video (GPU)", "È una CNN pre-addestrata su oltre 1 milione di immagini, usata come base per Transfer Learning"], ans: 3, expl: "AlexNet: riconosce 1000 categorie, storicamente uno dei modelli più usati come punto di partenza per il TL."},
  {q: "L'approccio 'Dividi et Impera' nel Deep Learning consiste nel:", opts: ["Usare solo metà dei layer della rete", "Frammentare il problema usando più reti a cascata", "Usare una singola rete enorme per risolvere tutto in un colpo", "Dividere il dataset in parti uguali"], ans: 1, expl: "NON dare un'immagine gigante a una sola rete. Usare reti in cascata per sotto-problemi specifici."},
  {q: "La differenza tra un Image Classifier e un Object Detector è:", opts: ["Il Classifier non può elaborare immagini", "Il Classifier dà un'etichetta globale", "Sono la stessa cosa con nomi diversi", "L'Object Detector è sempre più lento"], ans: 1, expl: "Classifier = 'Cane: Sì/No'. Object Detector = 'Cane presente alle coordinate (x1,y1,x2,y2)'."},
  {q: "Gli Autoencoders sono architetture usate in apprendimento non supervisionato con struttura:", opts: ["Lineare, senza strati nascosti", "Ricorrente, con memoria interna", "A stella: un nodo centrale distribuisce le informazioni a più decoder specializzati", "A clessidra: encoder comprime, decoder ricostruisce l'input"], ans: 3, expl: "Encoder comprime → rappresentazione latente → Decoder ricostruisce. Scopre pattern salienti senza etichette."},
  {q: "Le lacune principali del DL nei sistemi biometrici reali includono:", opts: ["Solo il costo dell'energia elettrica", "Solo la lentezza del training", "Mancanza di dati realistici, risorse limitate su mobile", "L'impossibilità di usare la distanza Coseno sugli embedding generati dall'ultimo strato"], ans: 2, expl: "Tre criticità: dati realistici scarsi, modelli pesanti per mobile, scalabilità 1:N su milioni di identità."},
  {q: "Le telecamere PTZ (Pan-Tilt-Zoom) rispetto alle fisse:", opts: ["Possono ruotare, inclinare e zoomare per seguire attivamente soggetti sospetti", "Offrono un campo visivo più ampio ma non supportano l'analisi video con algoritmi AI", "Costano significativamente meno delle fisse grazie alla minore complessità ottica", "Richiedono connessioni analogiche dedicate per gestire la latenza dei motori interni"], ans: 0, expl: "PTZ = motorizzate: rotazione 360°, inclinazione, zoom per seguire un soggetto da lunghe distanze."},
  {q: "I vantaggi delle telecamere IP Edge rispetto alle analogiche includono:", opts: ["Maggiore risoluzione ottica nativa grazie a sensori CCD con global shutter di ultima generazione", "Calcolo distribuito a bordo camera, multi-streaming e interoperabilità via ONVIF", "Totale immunità agli attacchi informatici di tipo Denial of Service grazie alla connessione analogica", "Costo di installazione inferiore perché non richiedono cablaggio di rete né alimentazione PoE dedicata"], ans: 1, expl: "Edge computing, multi-streaming, standard aperti ONVIF. Le analogiche (CCD alta gamma) hanno comunque buon WDR."},
  {q: "Nei decibel (dB) per telecamere di sorveglianza, il rapporto si esprime come:", opts: ["20 × log₁₀(I₁/I₀) per segnali video", "10 × log₁₀(I₁/I₀)", "I₁ / I₀ senza logaritmo", "L'integrale del rapporto segnale/rumore sull'intero spettro visibile"], ans: 0, expl: "Per i segnali video: 20 × log₁₀(I₁/I₀). Scala logaritmica perché l'illuminazione varia di molti ordini di grandezza."},
  {q: "Il Fraud-as-a-Service (FaaS) consiste in:", opts: ["Un servizio bancario antifrode che analizza le transazioni sospette dei clienti in tempo reale", "Gruppi criminali che vendono strumenti di frode AI-ready, tutorial e dati rubati nel Dark Web", "Una piattaforma cloud certificata per la validazione sicura e distribuita dei template biometrici", "Un programma governativo di formazione sulla sicurezza biometrica destinato agli operatori di frontiera"], ans: 1, expl: "FaaS abbassa la barriera d'ingresso: anche frodatori dilettanti possono lanciare attacchi sofisticati su larga scala."},
  {q: "Secondo il materiale del corso, la differenza tra identificazione positiva e negativa è:", opts: ["La positiva verifica l'appartenenza a una lista di abilitati, la negativa controlla che il soggetto non sia in blacklist o non usi identità multiple", "La positiva confronta il campione con un singolo template dichiarato in modalità 1:1, la negativa confronta con l'intero database in modalità 1:N", "La negativa usa sempre database di dimensioni ridotte rispetto alla positiva per velocizzare la ricerca tramite binning gerarchico", "Non esiste alcuna differenza operativa tra le due: sono nomi intercambiabili per lo stesso processo di confronto biometrico 1:N"], ans: 0, expl: "Nel corso, identificazione positiva e negativa sono due usi diversi dell'identificazione. La conferma di un'identità dichiarata ('sei chi dici?') appartiene invece all'autenticazione/verifica 1:1, come nell'esempio del bancomat."},
  {q: "Tra le ulteriori azioni per le applicazioni ABC/eGates, il materiale del corso include:", opts: ["Procedure di emergenza e anomalie, formazione e operatività del personale, feedback dei viaggiatori per migliorare il signalling", "Eliminazione completa del personale umano dai varchi perché i sistemi ABC sono progettati come totalmente unattended", "Adozione obbligatoria della sola iride on-the-move come tratto primario in tutti gli aeroporti con e-Gate di terza generazione", "Sostituzione progressiva di VIS, RTP ed EES con un unico database biometrico locale scollegato dalla rete europea SIS II"], ans: 0, expl: "Il materiale del corso elenca esplicitamente procedure di emergenza e anomalie, formazione e operatività del personale e feedback dei viaggiatori per migliorare il signalling. Per questo una domanda su Exception Handling formulata in modo troppo operativo era meno ancorata al testo."},
  {q: "Nel materiale del corso, i mobile devices nelle applicazioni ABC servono principalmente a:", opts: ["Supportare le guardie di frontiera nell'autenticazione del viaggiatore, nei controlli documentali approfonditi e nelle interrogazioni dei database centrali", "Sostituire completamente eGate, lettori di documenti e postazioni manuali gestite dal personale in ogni scenario operativo", "Consentire esclusivamente al viaggiatore di completare da remoto l'intero processo di frontiera senza ulteriori verifiche fisiche", "Rimpiazzare progressivamente i database europei VIS, RTP ed EES con un'applicazione mobile offline gestita dal singolo aeroporto"], ans: 0, expl: "Nel materiale del corso, i mobile devices aiutano le guardie di frontiera ad autenticare i viaggiatori, svolgere controlli documentali approfonditi e interrogare i database centrali. La formulazione sullo smartphone del viaggiatore era troppo specifica rispetto ai file del corso."},
  {q: "Secondo il materiale del corso, il Registered Traveler Program (RTP) è:", opts: ["Un programma volontario per viaggiatori frequenti, pre-registrati/pre-vetted, con raccolta di marcatori biometrici per garantire un attraversamento veloce", "Un sistema obbligatorio per tutti i viaggiatori extracomunitari che sostituisce completamente l'Entry/Exit System e il VIS europeo", "Un servizio riservato esclusivamente ai cittadini extra-UE senza e-Passport, basato solo sul riconoscimento facciale da telecamera PTZ", "Un sistema mobile che usa esclusivamente lo smartphone personale del viaggiatore per enrollment e verifica senza alcun lettore fisico"], ans: 0, expl: "Nel materiale del corso, l'RTP è presentato come programma volontario per viaggiatori frequenti. I viaggiatori RTP sono pre-vetted, i marcatori biometrici vengono raccolti e il programma deve garantire un attraversamento rapido."},
  {q: "Nel sistema biometrico, il 'Genuino' e l''Impostore' si distinguono perché:", opts: ["Sono entrambi utenti autorizzati con livelli di accesso diversi", "Il genuino è l'utente legittimo", "Il genuino usa password, l'impostore usa biometria", "Non esiste una distinzione formale nel framework biometrico"], ans: 1, expl: "Genuino = utente con i requisiti per accedere. Impostore = utente non autorizzato."},
  {q: "La regola di decisione fondamentale in un sistema di verifica biometrica è:", opts: ["Se il match score è positivo, accetta; se negativo, rifiuta", "Se il match score S ≥ soglia T, accetta come genuino", "Il sistema accetta sempre e registra gli score per analisi offline", "Se l'immagine è a fuoco, accetta; se sfocata, rifiuta"], ans: 1, expl: "Score ≥ T → Genuino (accettato). Score < T → Impostore (rifiutato). La soglia T determina il bilanciamento FMR/FNMR."},
  {q: "Un template biometrico è:", opts: ["L'immagine grezza del tratto biometrico memorizzata nel database dopo la compressione", "Il vettore dei pesi della rete neurale addestrata specificamente sul tratto dell'utente", "La rappresentazione matematica sintetica delle feature estratte dal dato biometrico", "L'insieme dei parametri di calibrazione del sensore associati a ciascun utente registrato"], ans: 2, expl: "Template = rappresentazione compatta e matematica (es. IrisCode, coordinate minuzie). Non è l'immagine grezza."},
  {q: "Le due macro-fasi operative di un sistema biometrico sono:", opts: ["Input dei dati grezzi e Output della decisione finale del sistema", "Training del modello di matching e Testing sulle nuove acquisizioni", "Estrazione delle feature e classificazione vettoriale nello spazio latente", "Enrollment (registrazione) e Riconoscimento (matching + decisione)"], ans: 3, expl: "Enrollment = registrazione iniziale con salvataggio in galleria. Riconoscimento = acquisizione probe + matching + decisione."},
  {q: "I 4 moduli di un sistema biometrico completo sono:", opts: ["Sensore, Estrazione Feature, Matcher, Decisione", "Sensore, Quality Checker, Matcher, Database", "Acquisizione, Normalizzazione, Classificatore, Logger", "Enrollment, Estrazione Feature, Matching, Logging"], ans: 0, expl: "Sensore (acquisizione) → Feature Extraction → Matcher (confronto probe/gallery) → Decisione (score vs soglia)."},
  {q: "L'architettura Match-on-Sensor (Match-in-Sensor) si distingue perché:", opts: ["Il sensore acquisisce e trasmette il template cifrato al microcontrollore host per il matching sicuro", "Il template risiede nel Secure Element della smart card e il sensore esegue solo l'acquisizione grezza", "Il matching avviene nel server remoto ma il sensore esegue localmente l'estrazione delle feature e il QC", "Il matching avviene localmente nel sensore, riducendo l'esposizione dei dati biometrici verso l'esterno"], ans: 3, expl: "Nel Match-in-Sensor il confronto biometrico viene eseguito nel sensore stesso. Non è corretto far dipendere la definizione dal fatto che anche crittografia e anti-spoofing avvengano sempre tutti internamente."},
  {q: "La variabilità intraclasse è causata da fattori come:", opts: ["Somiglianza morfologica tra individui diversi della stessa etnia o fascia d'età", "Invecchiamento, diversa posa, rumore del sensore e variazioni ambientali", "Variazioni sistematiche introdotte dalla calibrazione periodica del sensore", "Differenze nella risoluzione e nel tipo di compressione dei template nel database"], ans: 1, expl: "Intraclasse = stessa persona in acquisizioni diverse. Causata da invecchiamento, posa, rumore, ambiente."},
  {q: "I punti di forza dell'impronta digitale come tratto biometrico includono:", opts: ["Assoluta stabilità nel tempo e immunità alle alterazioni dovute a lavori manuali usura", "Alta accuratezza, facilità di acquisizione, tecnologia matura e possibilità di usare più dita", "Minima variabilità intraclasse e impossibilità totale di acquisizione latente", "Uso di fotocamere commerciali RGB a basso costo invece di sensori ottici dedicati"], ans: 1, expl: "Quattro punti di forza. Debolezza principale: ~4% della popolazione non fornisce impronte leggibili."},
  {q: "Le debolezze dell'impronta digitale includono il fatto che circa il 4% della popolazione:", opts: ["Ha creste papillari con orientamento troppo uniforme per il classificatore", "Presenta impronte con frequenza di ridge fuori dal range dei sensori standard", "Genera template con entropia insufficiente per un matching discriminativo", "Non riesce a fornire un'impronta leggibile"], ans: 3, expl: "Il 4% non può fornire impronte leggibili (FTE). Inoltre: possibile degrado nel tempo e disagio psicologico (associazione forense)."},

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleOptions(questions) {
  return questions.map(q => {
    const correctText = q.opts[q.ans];
    const indices = Array.from({length: q.opts.length}, (_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    const newOpts = indices.map(i => q.opts[i]);
    const newAns = newOpts.indexOf(correctText);
    return { ...q, opts: newOpts, ans: newAns };
  });
}

function BiometriaQuiz() {
  const [mode, setMode] = useState("menu");
  const [questions, setQuestions] = useState([]);

  const [elapsed, setElapsed] = useState(0);

  const [masteredCount, setMasteredCount] = useState(0);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [showResetFinal, setShowResetFinal] = useState(false);
  const [showCert, setShowCert] = useState(false);
  const [certName, setCertName] = useState(() => {
    try { return localStorage.getItem("biometria_cert_name") || ""; } catch(e) { return ""; }
  });
  const [certGenerated, setCertGenerated] = useState(false);

    try { return parseInt(localStorage.getItem("biometria_streak_current")) || 0; } catch(e) { return 0; }
  });
  const [bestStreak, setBestStreak] = useState(() => {
    try { return parseInt(localStorage.getItem("biometria_streak_best")) || 0; } catch(e) { return 0; }
  });

  const timerRef = useRef(null);

  const STREAK_LEVELS = [
    {min:250, fires:"💀", msg:"Cooooosa?! 250 di fila?! Se non prendi 30L sei un pollo 😜", duration:4000, style:"skull"},
    {min:200, fires:"🔥🔥🔥🔥🔥🔥", msg:"200 di fila!", duration:2500, style:"epic"},
    {min:100, fires:"🔥🔥🔥🔥🔥", msg:"100 di fila!", duration:2500, style:"big"},
    {min:50,  fires:"🔥🔥🔥🔥", msg:"50 di fila!", duration:2000, style:"big"},
    {min:20,  fires:"🔥🔥🔥", msg:"20 di fila!", duration:2000, style:"big"},
    {min:10,  fires:"🔥🔥", msg:"10 di fila!", duration:2000, style:"big"},
    {min:5,   fires:"🔥", msg:"5 di fila!", duration:2000, style:"big"},
  ];
  const getStreakFires = (s) => {
    if (s >= 250) return "💀";
    if (s >= 200) return "🔥🔥🔥🔥🔥🔥";
    if (s >= 100) return "🔥🔥🔥🔥🔥";
    if (s >= 50) return "🔥🔥🔥🔥";
    if (s >= 20) return "🔥🔥🔥";
    if (s >= 10) return "🔥🔥";
    if (s >= 5) return "🔥";
    if (s >= 1) return "🔥";
    return "";
  };
  const saveStreak = (current, best) => {
    try {
      localStorage.setItem("biometria_streak_current", current.toString());
      localStorage.setItem("biometria_streak_best", best.toString());
    } catch(e) {}
  };
  const triggerStreakToast = (newStreak) => {
    const level = STREAK_LEVELS.find(l => newStreak === l.min);
    if (!level) return;
    if (streakToastTimer.current) clearTimeout(streakToastTimer.current);
    setStreakToast({...level, count: newStreak});
    streakToastTimer.current = setTimeout(() => setStreakToast(null), level.duration);
  };
  const incrementStreak = () => {
    const newStreak = streak + 1;
    const newBest = Math.max(bestStreak, newStreak);
    setStreak(newStreak);
    setBestStreak(newBest);
    saveStreak(newStreak, newBest);
    triggerStreakToast(newStreak);
  };
  const resetStreak = () => {
    setStreak(0);
    try { localStorage.setItem("biometria_streak_current", "0"); } catch(e) {}
  };


  // localStorage helpers for ripasso
  const getRipassoSet = () => {
    try {
      const raw = localStorage.getItem("biometria_ripasso");
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch(e) { return new Set(); }
  };
  const saveRipassoSet = (s) => {
    try { localStorage.setItem("biometria_ripasso", JSON.stringify([...s])); } catch(e) {}
  };
  const addToRipasso = (questionText) => {
    const s = getRipassoSet();
    const idx = QUESTIONS.findIndex(q => q.q === questionText);
    if (idx !== -1) { s.add(idx); saveRipassoSet(s); }
  };
  const removeFromRipasso = (questionText) => {
    const s = getRipassoSet();
    const idx = QUESTIONS.findIndex(q => q.q === questionText);
    if (idx !== -1) { s.delete(idx); saveRipassoSet(s); }
  };

  // localStorage helpers for mastered (250/250 counter)
  const getMasteredSet = () => {
    try {
      const raw = localStorage.getItem("biometria_mastered");
      return raw ? new Set(JSON.parse(raw)) : new Set();

  };
  const saveMasteredSet = (s) => {

    const s = getMasteredSet();
    const idx = QUESTIONS.findIndex(q => q.q === questionText);
    if (idx !== -1) { s.add(idx); saveMasteredSet(s); }

  const resetAllProgress = () => {
    try {
      localStorage.removeItem("biometria_ripasso");
      localStorage.removeItem("biometria_mastered");
      localStorage.removeItem("biometria_cert_name");
      localStorage.removeItem("biometria_streak_current");
      localStorage.removeItem("biometria_streak_best");

    setRipassoCount(0);
    setMasteredCount(0);

    setStreak(0);
    setBestStreak(0);

      setRipassoCount(getRipassoSet().size);
      setMasteredCount(getMasteredSet().size);

  const startQuiz = (count, sim = false) => {
    const shuffled = shuffleOptions(shuffle(QUESTIONS).slice(0, count));
    setQuestions(shuffled);
    setCurrent(0);
    setSelected(null);
    setRevealed(false);
    setScore(0);
    setWrong([]);
    setStartTime(Date.now());
    setElapsed(0);
    setIsSimulation(sim);
    setIsRipasso(false);
    setTimeLimit(sim ? 3600 : null);
    setShowExitConfirm(false);
    setMode("quiz");
  };

  const startRipasso = () => {
    const ripassoIndices = getRipassoSet();
    if (ripassoIndices.size === 0) return;
    const ripassoQuestions = [...ripassoIndices].map(i => QUESTIONS[i]).filter(Boolean);
    const shuffled = shuffleOptions(shuffle(ripassoQuestions));
    setQuestions(shuffled);
    setCurrent(0);
    setSelected(null);
    setRevealed(false);
    setScore(0);
    setWrong([]);
    setStartTime(Date.now());
    setElapsed(0);
    setIsSimulation(false);
    setIsRipasso(true);
    setTimeLimit(null);
    setShowExitConfirm(false);
    setMode("quiz");
  };

  const startConquista = () => {
    const mastered = getMasteredSet();
    const unconquered = QUESTIONS.map((q, i) => ({...q, _origIdx: i})).filter((_, i) => !mastered.has(i));
    if (unconquered.length === 0) return;
    const picked = shuffle(unconquered).slice(0, Math.min(20, unconquered.length));
    const shuffled = shuffleOptions(picked);
    setQuestions(shuffled);
    setCurrent(0);
    setSelected(null);
    setRevealed(false);
    setScore(0);
    setWrong([]);
    setStartTime(Date.now());
    setElapsed(0);
    setIsSimulation(false);
    setIsRipasso(false);
    setTimeLimit(null);
    setShowExitConfirm(false);
    setMode("quiz");
  };

      timerRef.current = setInterval(() => {
        const e = Math.floor((Date.now() - startTime) / 1000);
        setElapsed(e);
        if (isSimulation && e >= 3600) {
          clearInterval(timerRef.current);
          setMode("results");
        }
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [mode, startTime, isSimulation]);

  const handleSelect = (idx) => { if (!revealed) setSelected(idx); };

  const handleConfirm = () => {
    if (selected === null) return;
    setRevealed(true);
    const q = questions[current];
    if (selected === q.ans) {
      setScore(s => s + 1);
      if (isRipasso) removeFromRipasso(q.q);
      addToMastered(q.q);
      incrementStreak();
    } else {
      setWrong(w => [...w, { ...q, userAns: selected }]);
      addToRipasso(q.q);
      resetStreak();
    }
  };

  const handleNext = () => {
    if (current + 1 >= questions.length) {
      clearInterval(timerRef.current);
      setMode("results");
    } else {
      setCurrent(c => c + 1);
      setSelected(null);
      setRevealed(false);

  const formatCountdown = (s) => { const r = Math.max(0, 3600 - s); return formatTime(r); };

  const calcGrade = (sc, tot) => {
    if (!isSimulation) return null;
    const ratio = sc / tot;
    const ref = 24/40; // 24/40 = 18
    if (ratio < ref) {
      return Math.max(0, Math.ceil(ratio / ref * 18));
    }
    if (ratio >= 1.0) return 31; // 30L
    const g = Math.ceil(18 + (ratio - ref) / (1 - ref) * 12);

      <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#e0e0e0",fontFamily:"'JetBrains Mono','Fira Code',monospace",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:11,color:"#888"}}>Domande apprese</span>
              <span style={{fontSize:13,fontWeight:900,color: masteredCount >= 250 ? "#00ff88" : masteredCount >= 188 ? "#44aaff" : masteredCount >= 125 ? "#ff8800" : "#ff4444"}}>{masteredCount}/{QUESTIONS.length}</span>
            </div>
            <div style={{height:6,background:"#1a1a2e",borderRadius:3,overflow:"hidden",marginBottom: (streak > 0 || bestStreak > 0) ? 8 : 0}}>
              <div style={{height:"100%",borderRadius:3,transition:"width 0.5s ease",width:`${(masteredCount/QUESTIONS.length)*100}%`,background: masteredCount >= 250 ? "#00ff88" : masteredCount >= 188 ? "#44aaff" : masteredCount >= 125 ? "#ff8800" : "#ff4444"}}/>
            </div>
            {streak > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom: bestStreak > 0 ? 4 : 0}}>
                <span style={{fontSize:11,color:"#888"}}>Streak attuale</span>
                <span style={{fontSize:12,fontWeight:700,color:"#ff8800"}}>{getStreakFires(streak)} {streak}</span>
              </div>
            )}
            {bestStreak > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#888"}}>Miglior streak</span>
                <span style={{fontSize:12,fontWeight:700,color:"#ffd700"}}>{getStreakFires(bestStreak)} {bestStreak}</span>
              </div>
            )}
          </div>

          {/* Reset — ghost button, very discreet */}
          {masteredCount > 0 && (
            <p onClick={() => setShowResetConfirm(true)} style={{color:"#2a2a2a",fontSize:9,marginTop:12,cursor:"pointer",transition:"color 0.2s"}} onMouseEnter={e=>e.target.style.color="#555"} onMouseLeave={e=>e.target.style.color="#2a2a2a"}>Reset progresso</p>
          )}

          {/* Reset confirm — step 1 */}
          {showResetConfirm && !showResetFinal && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"#1a1a2e",border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
                <p style={{fontSize:13,marginBottom:6,color:"#ff8888",fontWeight:700}}>Attenzione</p>
                <p style={{fontSize:12,marginBottom:16,color:"#ccc"}}>Stai per cancellare tutto il progresso: domande apprese, domande da ripassare, streak attuale e record streak. Questa azione è irreversibile.</p>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={() => setShowResetFinal(true)} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>CONTINUA</button>
                  <button onClick={() => {setShowResetConfirm(false);setShowResetFinal(false);}} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>ANNULLA</button>
                </div>
              </div>
            </div>
          )}

          {/* Reset confirm — step 2 (final) */}
          {showResetConfirm && showResetFinal && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"#1a1a2e",border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
                <p style={{fontSize:13,marginBottom:6,color:"#ff4444",fontWeight:700}}>Sei davvero sicuro?</p>
                <p style={{fontSize:12,marginBottom:16,color:"#ccc"}}>Perderai {masteredCount} domande apprese, {ripassoCount} domande nel ripasso e il tuo record streak di {bestStreak}. Non si può tornare indietro.</p>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={resetAllProgress} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>SÌ, CANCELLA TUTTO</button>
                  <button onClick={() => {setShowResetConfirm(false);setShowResetFinal(false);}} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>ANNULLA</button>
                </div>
              </div>
            </div>
          )}


          {/* Certificate modal */}
          {showCert && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
              {/* Confetti */}
              {[...Array(40)].map((_,i) => (
                <div key={i} style={{
                  position:"fixed",
                  top:"-10px",
                  left: `${Math.random()*100}%`,
                  width: `${6+Math.random()*8}px`,
                  height: `${6+Math.random()*8}px`,
                  background: ["#ff4444","#ffd700","#00ff88","#44aaff","#aa44ff","#ff8800","#ff69b4","#00ccff"][i%8],
                  borderRadius: Math.random()>0.5 ? "50%" : "2px",
                  animation: `confetti-fall ${2+Math.random()*3}s linear ${Math.random()*2}s infinite, confetti-sway ${1+Math.random()*2}s ease-in-out ${Math.random()}s infinite alternate`,
                  zIndex:1001,
                  pointerEvents:"none"
                }}/>
              ))}

              <div style={{background:"#0a0a0f",borderRadius:12,padding:0,maxWidth:420,width:"100%",position:"relative",zIndex:1002}}>
                {!certGenerated ? (
                  <div style={{padding:32,textAlign:"center"}}>
                    <p style={{fontSize:40,marginBottom:8}}>🏆</p>
                    <h2 style={{color:"#ffd700",fontSize:20,marginBottom:8,fontFamily:"inherit"}}>HAI COMPLETATO TUTTO!</h2>
                    <p style={{color:"#aaa",fontSize:12,marginBottom:24}}>Tutte le 250 domande apprese. Inserisci il tuo nome per generare il certificato.</p>
                    <input
                      type="text"
                      value={certName}
                      onChange={e => setCertName(e.target.value)}
                      placeholder="Il tuo nome"
                      style={{width:"100%",padding:"10px 14px",background:"#111118",border:"1px solid #333",borderRadius:4,color:"#fff",fontSize:14,fontFamily:"inherit",outline:"none",textAlign:"center",marginBottom:16}}
                    />
                    <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                      <button onClick={() => {if(certName.trim()){try{localStorage.setItem("biometria_cert_name",certName.trim())}catch(e){} setCertGenerated(true);}}}
                        style={{padding:"10px 24px",background: certName.trim()?"#ffd700":"#333",color:certName.trim()?"#0a0a0f":"#666",border:"none",borderRadius:4,fontWeight:700,cursor:certName.trim()?"pointer":"default",fontFamily:"inherit",fontSize:13,transition:"all 0.2s"}}>
                        GENERA CERTIFICATO
                      </button>
                      <button onClick={() => setShowCert(false)}
                        style={{padding:"10px 24px",background:"transparent",color:"#555",border:"1px solid #333",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
                        CHIUDI
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{padding:0}}>
                    {/* Certificate */}
                    <div style={{
                      margin:20,
                      padding:32,
                      border:"2px solid #ffd700",
                      borderRadius:8,
                      background:"linear-gradient(145deg, #0d0d14, #111122)",
                      animation:"cert-glow 3s ease-in-out infinite",
                      textAlign:"center"
                    }}>
                      <p style={{fontSize:10,color:"#ffd700",letterSpacing:4,marginBottom:16,textTransform:"uppercase"}}>Certificato di Preparazione</p>
                      <div style={{width:40,height:1,background:"#ffd700",margin:"0 auto 16px",opacity:0.5}}/>
                      <p style={{fontSize:12,color:"#888",marginBottom:8,lineHeight:1.6}}>Si attesta che</p>
                      <p style={{fontSize:22,color:"#fff",fontWeight:900,marginBottom:8}}>{certName}</p>
                      <p style={{fontSize:12,color:"#888",lineHeight:1.6,marginBottom:16}}>
                        ha completato con successo tutte le <span style={{color:"#ffd700",fontWeight:700}}>250</span> domande del
                      </p>
                      <p style={{fontSize:14,color:"#ff4444",fontWeight:700,marginBottom:16}}>Super Test di Tecniche e Applicazioni Biometriche</p>
                      <div style={{width:40,height:1,background:"#ffd700",margin:"0 auto 20px",opacity:0.5}}/>
                      <p style={{fontSize:10,color:"#666",marginBottom:4}}>Firmato</p>
                      <p style={{fontSize:14,color:"#ccc",fontStyle:"italic"}}>Gabriele Lannutti</p>
                      <p style={{fontSize:9,color:"#444",marginTop:16}}>{new Date().toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})}</p>
                    </div>
                    <div style={{textAlign:"center",padding:"0 20px 20px"}}>
                      <button onClick={() => setShowCert(false)}
                        style={{padding:"10px 24px",background:"transparent",color:"#ffd700",border:"1px solid #ffd700",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
                        CHIUDI
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // RESULTS
  if (mode === "results") {
    const pct = Math.round((score/questions.length)*100);
    const grade = calcGrade(score, questions.length);
    const gradeLabel = isSimulation ? (grade >= 18 ? `VOTO STIMATO: ${grade >= 31 ? "30 e Lode" : grade}/30` : `VOTO STIMATO: ${grade}/30 (INSUFFICIENTE)`) : null;
    const pctColor = pct>=90?"#00ff88":pct>=75?"#44aaff":pct>=60?"#ff8800":"#ff4444";
    const verdict = pct>=90?"ECCELLENTE":pct>=75?"BUONO":pct>=60?"SUFFICIENTE":"INSUFFICIENTE";
    return (
      <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#e0e0e0",fontFamily:"'JetBrains Mono',monospace",padding:20,overflowY:"auto"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <h1 style={{color:pctColor,fontSize:28,textAlign:"center"}}>{verdict}</h1>
          {isSimulation && grade !== null && <p style={{textAlign:"center",fontSize:20,color:grade>=18?"#00ff88":"#ff4444",fontWeight:900}}>{gradeLabel}</p>}
          <div style={{textAlign:"center",marginBottom:20}}>
            <span style={{fontSize:44,color:pctColor,fontWeight:900}}>{score}/{questions.length}</span>
            <span style={{color:"#888",fontSize:13,display:"block"}}>({pct}%) — Tempo: {formatTime(elapsed)}</span>
          </div>
          {wrong.length>0&&(<div>
            <h2 style={{color:"#ff4444",fontSize:15,borderBottom:"1px solid #333",paddingBottom:8}}>ERRORI DA RIPASSARE ({wrong.length})</h2>
            {wrong.map((w,i)=>(
              <div key={i} style={{background:"#1a1a2e",borderLeft:"3px solid #ff4444",padding:12,marginBottom:10,borderRadius:4,fontSize:11}}>
                <p style={{color:"#ff8888",fontWeight:700,marginBottom:6}}>{w.q}</p>
                <p style={{color:"#ff4444"}}>Tua: {LETTERS[w.userAns]}. {w.opts[w.userAns]}</p>
                <p style={{color:"#00ff88"}}>Corretta: {LETTERS[w.ans]}. {w.opts[w.ans]}</p>
                <p style={{color:"#888",fontStyle:"italic",marginTop:4}}>{w.expl}</p>
              </div>
            ))}
          </div>)}
          <button onClick={()=>setMode("menu")} style={{display:"block",margin:"20px auto",padding:"12px 30px",background:"#ff4444",color:"#0a0a0f",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>TORNA AL MENU</button>
        </div>
      </div>
    );
  }

  // QUIZ
  const q = questions[current];
  return (
    <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#e0e0e0",fontFamily:"'JetBrains Mono',monospace",display:"flex",flexDirection:"column"}}>
      {showExitConfirm && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#1a1a2e",border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
            <p style={{fontSize:14,marginBottom:16}}>Vuoi davvero abbandonare il test?<br/>Il progresso verrà perso.</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={confirmExit} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>SÌ, ESCI</button>
              <button onClick={cancelExit} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>ANNULLA</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid #222",fontSize:12}}>
        <span style={{color:"#ff4444",fontWeight:700}}>{current+1}/{questions.length}</span>
        <div style={{display:"flex",gap:16}}>
          <span style={{color:"#00ff88"}}>✓ {score}</span>
          <span style={{color:"#ff4444"}}>✗ {wrong.length}</span>
          {streak > 0 && <span style={{color:"#ff8800"}}>{getStreakFires(streak)} {streak}</span>}
        </div>
        <span style={{color: isSimulation && (3600-elapsed)<300 ? "#ff4444" : "#888"}}>{isSimulation ? formatCountdown(elapsed) : formatTime(elapsed)}</span>
        <button onClick={handleExit} style={{background:"transparent",border:"1px solid #555",color:"#888",fontSize:10,padding:"4px 10px",borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>ESCI</button>
      </div>
      <div style={{height:3,background:"#1a1a2e"}}><div style={{height:"100%",background: isSimulation?"#ff4444":"#44aaff",width:`${((current+1)/questions.length)*100}%`,transition:"width 0.3s"}}/></div>
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:16,maxWidth:700,margin:"0 auto",width:"100%"}}>
        <p style={{fontSize:14,lineHeight:1.5,color:"#fff",fontWeight:600,marginBottom:20,minHeight:50}}>{q.q}</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,flex:1}}>
          {q.opts.map((opt,i)=>{
            let bg="transparent",border="#333",col="#ccc";
            if(revealed){
              if(i===q.ans){bg="#0a2e0a";border="#00ff88";col="#00ff88"}
              else if(i===selected){bg="#2e0a0a";border="#ff4444";col="#ff4444"}
            } else if(i===selected){bg="#1a1a3e";border="#44aaff";col="#44aaff"}
            return(
              <button key={i} onClick={()=>handleSelect(i)}
                style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:bg,border:`1.5px solid ${border}`,color:col,fontSize:12,fontFamily:"inherit",cursor:revealed?"default":"pointer",borderRadius:4,textAlign:"left",lineHeight:1.4,transition:"all 0.15s"}}>
                <span style={{fontWeight:900,minWidth:18,color:border==="#333"?"#666":col}}>{LETTERS[i]}.</span>
                <span>{opt}</span>
              </button>
            );
          })}
        </div>
        {revealed&&(
          <div style={{background:"#111122",border:"1px solid #333",borderRadius:4,padding:12,marginTop:12,fontSize:11,lineHeight:1.5}}>
            <span style={{color:selected===q.ans?"#00ff88":"#ff4444",fontWeight:900}}>{selected===q.ans?"✓ CORRETTO":"✗ SBAGLIATO"}</span>
            <p style={{color:"#aaa",marginTop:6}}>{q.expl}</p>
          </div>
        )}
        {/* Streak toast — above confirm button */}
        {streakToast && (
          <div style={{
            display:"flex",
            justifyContent:"center",
            marginTop:8,
            animation: "toast-in 0.3s ease-out"
          }}>
            <div style={{
              padding: streakToast.style==="skull" ? "16px 24px" : streakToast.style==="epic" ? "12px 20px" : "10px 18px",
              background: streakToast.style==="skull" ? "rgba(100,0,180,0.95)" : streakToast.style==="epic" ? "rgba(170,68,255,0.2)" : "rgba(255,136,0,0.15)",
              border: streakToast.style==="skull" ? "2px solid #aa44ff" : streakToast.style==="epic" ? "1px solid rgba(170,68,255,0.5)" : "1px solid rgba(255,136,0,0.3)",
              borderRadius:8,
              textAlign:"center",
              animation: streakToast.style==="skull" ? "toast-skull-shake 0.8s ease-in-out" : streakToast.style==="epic" ? "toast-epic-pulse 1.5s ease-in-out infinite" : "toast-glow-pulse 1.5s ease-in-out infinite"
            }}>
              <p style={{
                fontSize: streakToast.style==="skull" ? 18 : streakToast.style==="epic" ? 15 : 14,
                fontWeight:700,
                color: streakToast.style==="skull" ? "#fff" : streakToast.style==="epic" ? "#aa44ff" : "#ff8800",
                fontFamily:"inherit",
                margin:0
              }}>
                {streakToast.fires} {streakToast.msg}
              </p>
            </div>
          </div>
        )}
        <div style={{marginTop:12,display:"flex",gap:10}}>
          {!revealed?(
            <button onClick={handleConfirm} disabled={selected===null}
              style={{flex:1,padding:"12px",background:selected!==null?"#44aaff":"#222",color:selected!==null?"#000":"#555",border:"none",fontSize:14,fontWeight:900,cursor:selected!==null?"pointer":"default",borderRadius:4,fontFamily:"inherit",transition:"all 0.2s"}}>
              CONFERMA
            </button>
          ):(
            <button onClick={handleNext}
              style={{flex:1,padding:"12px",background:"#ff4444",color:"#0a0a0f",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>
              {current+1>=questions.length?"VEDI RISULTATI":"PROSSIMA →"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(BiometriaQuiz));
  </script>
</body>
</html>
